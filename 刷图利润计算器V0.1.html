const SK='poe-calc-v6',uid=()=>Math.random().toString(36).slice(2,10);
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
const fmtTime=t=>{if(!t)return'—';const d=new Date(t);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`};
const ICO={
  plus:'➕',trash:'🗑️',edit:'✏️',check:'✅',copy:'📋',chevRight:'▶️',
  settings:'⚙️',map:'🗺️',dollar:'💰',barChart:'📊',book:'📖',
  info:'ℹ️',help:'💡',clock:'🕐',tag:'🏷️',layers:'📚',note:'📝',
  arrowRight:'➡️',exchange:'💱',download:'📥',upload:'📤',
  search:'🔍',x:'❌',save:'💾',
};
function ico(n,c){return`<span class="ico ${c||''}">${ICO[n]||''}</span>`}
function tip(t,p){return`<span class="tip ${p||''}"><span class="tip-icon">💡</span><span class="tip-content">${t}</span></span>`}
// 中文名
const D='神圣石',C='混沌石';

const DEFAULTS=[
  {id:'d1',name:'T16 迷雾刷图',map:'T16 墓地',dcRatio:170,items:[
    {id:'i1',name:'地图',unit:'C',price:30},{id:'i2',name:'迷雾宝珠',unit:'D',price:1},
    {id:'i3',name:'甲虫',unit:'D',price:1},{id:'i4',name:'星盘',unit:'D',price:0.1},
    {id:'i5',name:'通货钉子',unit:'D',price:0.46}],results:[]},
  {id:'d2',name:'裂隙刷图',map:'T16 丛林谷',dcRatio:170,items:[
    {id:'i1',name:'地图',unit:'C',price:15},{id:'i2',name:'裂隙石',unit:'D',price:0.5},
    {id:'i3',name:'甲虫',unit:'D',price:0.8},{id:'i4',name:'星盘',unit:'D',price:0.1}],results:[]}
];

let configs=[],activeId='',editingConfig=false,editingItemId=null,convMode='c2d',currentTab='cost',expandedRecord=null,sidebarSearch='';

function load(){
  let first=true;
  try{const r=localStorage.getItem(SK);if(r){const s=JSON.parse(r);configs=s.configs||[];activeId=s.activeId||'';first=false}}catch(e){}
  if(!configs.length)configs=JSON.parse(JSON.stringify(DEFAULTS));
  if(!activeId||!configs.find(c=>c.id===activeId))activeId=configs[0].id;
  currentTab=first?'guide':'cost';
}
function save(){try{localStorage.setItem(SK,JSON.stringify({configs,activeId}))}catch(e){}}
function AA(){return configs.find(c=>c.id===activeId)||configs[0]}
function c2d(c,r){return r>0?c/r:0}
function d2c(d,r){return d*r}
function iD(item,r){return item.unit==='D'?item.price:c2d(item.price,r)}
function totalCostD(){const a=AA();let t=0;a.items.forEach(i=>{t+=iD(i,a.dcRatio)});return t}
function uName(u){return u==='D'?D:C}

let toastT;
function toast(m){clearTimeout(toastT);const e=document.getElementById('toast');e.innerHTML=`<span class="toast-dot"></span>${esc(m)}`;e.style.display='block';e.style.animation='none';e.offsetHeight;e.style.animation='';toastT=setTimeout(()=>e.style.display='none',2200)}

function refreshTotals(){const a=AA();let t=0;a.items.forEach(i=>{t+=iD(i,a.dcRatio)});const eD=document.getElementById('total-d'),eC=document.getElementById('total-c');if(eD)eD.textContent=t.toFixed(3)+' D';if(eC)eC.textContent=(t*a.dcRatio).toFixed(1)+' C'}
function refreshItemCalc(item){const a=AA(),dv=iD(item,a.dcRatio),cv=dv*a.dcRatio;const eD=document.getElementById('id-'+item.id),eC=document.getElementById('ic-'+item.id);if(eD)eD.textContent=dv.toFixed(3)+'D';if(eC)eC.textContent=cv.toFixed(1)+'C'}
function refreshAllItems(){AA().items.forEach(refreshItemCalc)}
function refreshConv(){const a=AA(),inp=document.getElementById('conv-input');if(!inp)return;const v=parseFloat(inp.value)||0;const r=convMode==='c2d'?c2d(v,a.dcRatio):d2c(v,a.dcRatio);const dec=convMode==='c2d'?4:1;const el=document.getElementById('conv-result-val');if(el)el.textContent=inp.value?r.toFixed(dec):'—'}

// ========== CONFIRM DELETE MODAL ==========
function confirmDelete(message,onConfirm){
  let old=document.getElementById('modal-ov');if(old)old.remove();
  const ov=document.createElement('div');ov.id='modal-ov';ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal confirm-modal">
    <h3>${ico('trash')} 确认删除</h3>
    <div class="cm-warn">${message}</div>
    <div class="cm-hint">请输入 <code>确认</code> 以继续操作</div>
    <input class="cm-input" id="cm-inp" placeholder="请输入"确认"" autocomplete="off">
    <div class="cm-actions">
      <button class="btn" id="cm-cancel">取消</button>
      <button class="btn btn-confirm-del" id="cm-ok">${ico('trash','ico-sm')} 确认删除</button>
    </div>
  </div>`;
  ov.onclick=e=>{if(e.target===ov)ov.remove()};
  document.body.appendChild(ov);
  const inp=document.getElementById('cm-inp'),okBtn=document.getElementById('cm-ok');
  inp.focus();
  inp.oninput=()=>{
    const match=inp.value.trim()==='确认';
    okBtn.classList.toggle('enabled',match);
    inp.classList.toggle('valid',match);
  };
  inp.onkeydown=e=>{if(e.key==='Enter'&&inp.value.trim()==='确认'){ov.remove();onConfirm()}};
  okBtn.onclick=()=>{if(inp.value.trim()==='确认'){ov.remove();onConfirm()}};
  document.getElementById('cm-cancel').onclick=()=>ov.remove();
}

// ========== IMPORT / EXPORT ==========
function exportData(){
  const json=JSON.stringify({configs,activeId},null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`poe-calc-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('数据已导出');
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.configs||!Array.isArray(data.configs)){toast('文件格式错误');return}
        confirmDelete(`将导入 <strong>${data.configs.length} 个配置</strong>，当前所有数据会被覆盖，此操作不可撤销。`,()=>{
          configs=data.configs;activeId=data.activeId||configs[0]?.id||'';
          save();render();toast(`已导入 ${configs.length} 个配置`);
        });
      }catch(err){toast('JSON 解析失败')}
    };
    reader.readAsText(file);
  };
  inp.click();
}

      it.onclick=()=>{activeId=c.id;editingConfig=false;editingItemId=null;expandedRecord=null;save();render()};
      list.appendChild(it);
    });
  }else{
    list.innerHTML=`<div class="sidebar-empty">${ico('search','ico-sm')} 没有找到匹配的配置</div>`;
  }
  sb.appendChild(list);

  // Wire search — oninput only updates list, no full render to keep focus
  const searchInp=document.getElementById('sb-search');
  const clearBtn=document.getElementById('sb-clear');
  searchInp.oninput=function(){
    sidebarSearch=this.value;
    clearBtn.style.display=sidebarSearch?'flex':'none';
    // Re-render only the list portion
    const keyword=sidebarSearch.trim().toLowerCase();
    const filtered=keyword?configs.filter(c=>c.name.toLowerCase().includes(keyword)||c.map.toLowerCase().includes(keyword)):configs;
    list.innerHTML='';
    if(filtered.length){
      filtered.forEach(c=>{
        const it=document.createElement('button');it.className='sidebar-item'+(c.id===activeId?' active':'');
        const ms=c.map.replace(/^T\d+\s*/,'');
        it.innerHTML=`${ico('map','ico-sm')} <span style="flex:1;overflow:hidden;text-overflow:ellipsis">${esc(c.name)}</span><span class="tag">${esc(ms||c.map)}</span>`;
        it.onclick=()=>{activeId=c.id;editingConfig=false;editingItemId=null;expandedRecord=null;save();render()};
        list.appendChild(it);
      });
    }else{
      list.innerHTML=`<div class="sidebar-empty">${ico('search','ico-sm')} 没有找到匹配的配置</div>`;
    }
  };
  clearBtn.onclick=()=>{sidebarSearch='';searchInp.value='';clearBtn.style.display='none';searchInp.oninput();searchInp.focus()};

  const actions=document.createElement('div');actions.className='sidebar-actions';
  const addBtn=document.createElement('button');addBtn.className='btn btn-primary';addBtn.style.cssText='width:100%;justify-content:center';addBtn.innerHTML=`${ico('plus','ico-sm')} 新建配置`;
  addBtn.onclick=()=>{const n={id:uid(),name:'新配置',map:'T16',dcRatio:170,items:[{id:uid(),name:'地图',unit:'C',price:0}],results:[]};configs.push(n);activeId=n.id;editingConfig=true;editingItemId=null;currentTab='cost';save();render();toast('新配置已创建')};
  actions.appendChild(addBtn);
  const r1=document.createElement('div');r1.className='row';
  const dupBtn=document.createElement('button');dupBtn.className='btn btn-sm';dupBtn.style.cssText='flex:1;justify-content:center';dupBtn.innerHTML=`${ico('copy','ico-sm')} 复制`;
  dupBtn.onclick=()=>{const a=AA(),d=JSON.parse(JSON.stringify(a));d.id=uid();d.name+=' (副本)';d.items.forEach(i=>i.id=uid());d.results.forEach(r=>r.id=uid());configs.push(d);activeId=d.id;save();render();toast('配置已复制')};
  const delBtn=document.createElement('button');delBtn.className='btn btn-sm btn-danger';delBtn.style.cssText='flex:1;justify-content:center';delBtn.innerHTML=`${ico('trash','ico-sm')} 删除`;
  delBtn.onclick=()=>{if(configs.length<=1){toast('至少保留一个配置');return}confirmDelete(`确定删除配置「<strong>${esc(AA().name)}</strong>」？该配置下的所有物品和利润记录将一并删除，此操作不可撤销。`,()=>{const idx=configs.findIndex(c=>c.id===activeId);configs=configs.filter(c=>c.id!==activeId);activeId=configs[Math.max(0,idx-1)].id;save();render();toast('配置已删除')})};
  r1.appendChild(dupBtn);r1.appendChild(delBtn);actions.appendChild(r1);
  // Import / Export
  const r2=document.createElement('div');r2.className='row';
  const expBtn=document.createElement('button');expBtn.className='btn btn-sm';expBtn.style.cssText='flex:1;justify-content:center';expBtn.innerHTML=`${ico('download','ico-sm')} 导出`;expBtn.onclick=exportData;
  const impBtn=document.createElement('button');impBtn.className='btn btn-sm';impBtn.style.cssText='flex:1;justify-content:center';impBtn.innerHTML=`${ico('upload','ico-sm')} 导入`;impBtn.onclick=importData;
  r2.appendChild(expBtn);r2.appendChild(impBtn);actions.appendChild(r2);

// ========== MAIN ==========
function renderMain(){
  const main=document.getElementById('main');main.innerHTML='';
  const a=AA();
  if(editingConfig){
    const ep=document.createElement('div');ep.className='edit-panel';
    ep.innerHTML=`<div class="edit-fields">
      <div class="field"><label>配置名称 ${tip('为这套刷图方案起个名字，方便识别和切换','tip-below')}</label><input id="m-name" class="w160"></div>
      <div class="field"><label>地图 ${tip('要刷的地图名称和等级，如 T16 墓地','tip-below')}</label><input id="m-map" class="w160"></div>
      <div class="field"><label>1D = ?C ${tip('${D}与${C}的兑换比例，影响所有换算','tip-below')}</label><input id="m-ratio" type="number" class="w100"></div>
      <button class="btn btn-primary" id="m-done">${ico('check','ico-sm')} 完成编辑</button>
    </div>`;
    main.appendChild(ep);
    const mN=document.getElementById('m-name'),mM=document.getElementById('m-map'),mR=document.getElementById('m-ratio');
    mN.value=a.name;mM.value=a.map;mR.value=a.dcRatio;
    mN.oninput=function(){a.name=this.value;save()};
    mM.oninput=function(){a.map=this.value;save()};
    mR.oninput=function(){a.dcRatio=parseFloat(this.value)||0;save();refreshAllItems();refreshTotals();refreshConv()};
    document.getElementById('m-done').onclick=()=>{editingConfig=false;save();render();toast('已保存')};
  } else {
    const ph=document.createElement('div');ph.className='page-header';
    ph.innerHTML=`<div class="page-header-top"><div class="page-title">${esc(a.name)}</div><button class="btn" id="p-edit">${ico('settings','ico-sm')} 编辑配置</button></div>
      <div class="page-meta"><div class="page-meta-item">${ico('map','ico-sm')} 地图 <span class="v blue">${esc(a.map)}</span></div><div class="page-meta-item">${ico('exchange','ico-sm')} 汇率 <span class="v accent">1D = ${a.dcRatio}C</span></div><div class="page-meta-item">${ico('tag','ico-sm')} 物品 <span class="v">${a.items.length}项</span></div><div class="page-meta-item">${ico('barChart','ico-sm')} 记录 <span class="v">${a.results.length}条</span></div></div>`;
    main.appendChild(ph);
    document.getElementById('p-edit').onclick=()=>{editingConfig=true;render()};
  }
  // Tabs — guide last
  const tabNav=document.createElement('div');tabNav.className='tab-nav';
  [{id:'cost',icon:'tag',label:'成本配置'},{id:'records',icon:'barChart',label:'利润记录'},{id:'converter',icon:'exchange',label:'汇率换算'},{id:'guide',icon:'book',label:'使用引导'}].forEach(t=>{
    const btn=document.createElement('button');btn.className='tab-btn'+(currentTab===t.id?' active':'');
    btn.innerHTML=`${ico(t.icon,'ico-sm')} ${t.label}`;
    btn.onclick=()=>{currentTab=t.id;render()};
    tabNav.appendChild(btn);
  });
  main.appendChild(tabNav);
  if(currentTab==='cost')renderCostTab(main,a);
  else if(currentTab==='converter')renderConvTab(main,a);
  else if(currentTab==='records')renderRecordsTab(main,a);
  else if(currentTab==='guide')renderGuideTab(main,a);
}

// ========== COST TAB ==========
function renderCostTab(main,a){
  const card=document.createElement('div');card.className='card';
  card.innerHTML=`<div class="card-bar amber"></div>
    <div class="card-header"><div class="card-title">${ico('tag')} 单图投入物品 ${tip('每次开图消耗的所有物品及价格，系统根据汇率自动换算','tip-below tip-left')}</div><button class="btn btn-primary btn-sm" id="add-item">${ico('plus','ico-sm')} 添加物品</button></div>
    <div><div class="item-header-row"><span class="col-name">物品</span><span class="col-unit">单位 ${tip('计价货币：${C}(C) 或 ${D}(D)','tip-below')}</span><span class="col-price">价格 ${tip('物品单价，自动换算为另一种货币','tip-below')}</span><span class="col-d">≈ ${D} ${tip('按汇率换算后的${D}等值','tip-below')}</span><span class="col-c">≈ ${C} ${tip('按汇率换算后的${C}等值','tip-below')}</span><span class="col-actions"></span></div><div id="rows"></div></div>`;
  let tD=0;a.items.forEach(i=>{tD+=iD(i,a.dcRatio)});const tC=tD*a.dcRatio;
  const tr=document.createElement('div');tr.className='total-row';
  tr.innerHTML=`<span class="total-label">单图总成本 ${tip('所有物品合计，即每开一张图的固定投入','tip-below tip-left')}</span><div class="total-values"><span class="total-d" id="total-d">${tD.toFixed(3)} D</span><span class="total-eq">≈</span><span class="total-c" id="total-c">${tC.toFixed(1)} C</span></div>`;
  card.appendChild(tr);main.appendChild(card);
  const rowsC=document.getElementById('rows');
  a.items.forEach(item=>buildRow(rowsC,item,a));
  document.getElementById('add-item').onclick=()=>{const ni={id:uid(),name:'新物品',unit:'C',price:0};a.items.push(ni);editingItemId=ni.id;save();render()};
}

function buildRow(container,item,a){
  const dv=iD(item,a.dcRatio),cv=dv*a.dcRatio;
  const row=document.createElement('div');row.className='item-row';
  if(editingItemId===item.id){
    row.innerHTML=`<div class="col-name"><input class="inp-n" placeholder="物品名"></div>
      <div class="col-unit"><select class="inp-u"><option value="C">${C}</option><option value="D">${D}</option></select></div>
      <div class="col-price"><input class="inp-p" type="number" step="0.01" style="text-align:right"></div>
      <span class="col-d" id="id-${item.id}">${dv.toFixed(3)}D</span>
      <span class="col-c" id="ic-${item.id}">${cv.toFixed(1)}C</span>
      <div class="col-actions"><button class="btn-icon i-ok" title="完成">${ico('check')}</button><button class="btn-icon danger i-rm" title="删除">${ico('trash')}</button></div>`;
    container.appendChild(row);
    const nI=row.querySelector('.inp-n'),pI=row.querySelector('.inp-p'),uS=row.querySelector('.inp-u');
    nI.value=item.name;pI.value=item.price;uS.value=item.unit;
    nI.oninput=function(){item.name=this.value;save()};
    pI.oninput=function(){item.price=parseFloat(this.value)||0;save();refreshItemCalc(item);refreshTotals()};
    uS.onchange=function(){item.unit=this.value;save();refreshItemCalc(item);refreshTotals()};
    row.querySelector('.i-ok').onclick=()=>{editingItemId=null;save();render()};
    row.querySelector('.i-rm').onclick=()=>{confirmDelete(`确定删除物品「<strong>${esc(item.name)}</strong>」？`,()=>{a.items=a.items.filter(i=>i.id!==item.id);if(editingItemId===item.id)editingItemId=null;save();render();toast('物品已删除')})};
    setTimeout(()=>nI.focus(),0);
  }else{
    row.innerHTML=`<span class="col-name" style="font-weight:500">${esc(item.name)}</span>
      <span class="col-unit" style="font-size:11px;font-weight:600;color:${item.unit==='D'?'var(--amber)':'var(--blue)'}">${uName(item.unit)}</span>
      <span class="col-price" style="font-family:var(--mono);font-size:12px;color:var(--text-secondary)">${item.price}${item.unit}</span>
      <span class="col-d" id="id-${item.id}">${dv.toFixed(3)}D</span>
      <span class="col-c" id="ic-${item.id}">${cv.toFixed(1)}C</span>
      <div class="col-actions"><button class="btn-icon i-ed" title="编辑">${ico('edit')}</button><button class="btn-icon danger i-rm" title="删除">${ico('trash')}</button></div>`;
    container.appendChild(row);
    row.querySelector('.i-ed').onclick=()=>{editingItemId=item.id;render()};
    row.querySelector('.i-rm').onclick=()=>{confirmDelete(`确定删除物品「<strong>${esc(item.name)}</strong>」？`,()=>{a.items=a.items.filter(i=>i.id!==item.id);save();render();toast('物品已删除')})};
  }
}

// ========== CONVERTER TAB ==========

      <button class="conv-tab${convMode==='c2d'?' active':''}" id="cv-c2d">${C} → ${D}</button>

      <div class="conv-result-box"><span class="conv-result-val" id="conv-result-val">—</span><span class="conv-result-unit">${tu}</span></div>

    <div class="preset-row">${presets.map(p=>`<button class="btn pst" data-v="${p}">${p}${fu}</button>`).join('')}</div>`;

  const c2=document.createElement('div');c2.className='card';

    <div class="card-title" style="margin-bottom:16px">${ico('info')} 汇率信息</div>
    <div class="ratio-display">${ico('dollar','ico-sm')} 当前汇率 ${tip('影响所有成本和利润的换算，可在编辑配置中修改','tip-below tip-left')}：<strong>1 ${D} = ${a.dcRatio} ${C}</strong></div>
    <div class="ratio-display">${ico('tag','ico-sm')} 单图成本 ${tip('成本配置中所有物品价格的合计','tip-below tip-left')}：<strong>${tD.toFixed(3)} D</strong> ≈ <strong style="color:var(--blue)">${tC.toFixed(1)} C</strong></div>
    <div style="margin-top:14px"><button class="btn" id="edit-ratio-btn">${ico('settings','ico-sm')} 修改汇率</button></div>`;
  grid.appendChild(c2);main.appendChild(grid);
  document.getElementById('cv-c2d').onclick=()=>{convMode='c2d';render()};
  document.getElementById('cv-d2c').onclick=()=>{convMode='d2c';render()};
  document.getElementById('conv-input').oninput=refreshConv;
  document.querySelectorAll('.pst').forEach(b=>{b.onclick=()=>{document.getElementById('conv-input').value=b.dataset.v;refreshConv()}});
  document.getElementById('edit-ratio-btn').onclick=()=>{editingConfig=true;render()};
}

// ========== RECORDS TAB ==========
function renderRecordsTab(main,a){
  const wrap=document.createElement('div');
  if(a.results.length){
    const tp=a.results.reduce((s,r)=>s+(r.earning-r.cost),0),ap=tp/a.results.length;
    const pcl=v=>v>=0?'color:var(--green)':'color:var(--red)',sgn=v=>v>=0?'+':'';
    wrap.innerHTML=`<div class="summary-grid">
      <div class="summary-card"><div class="card-bar amber"></div><div class="summary-label">总场次 ${tip('已记录的刷图总次数','tip-below tip-left')}</div><div class="summary-value" style="color:var(--amber)">${a.results.length}</div></div>
      <div class="summary-card"><div class="card-bar green"></div><div class="summary-label">总利润 (D) ${tip('所有记录的利润合计','tip-below')}</div><div class="summary-value" style="${pcl(tp)}">${sgn(tp)}${tp.toFixed(3)}</div></div>
      <div class="summary-card"><div class="card-bar green"></div><div class="summary-label">场均利润 (D) ${tip('总利润÷总场次','tip-below')}</div><div class="summary-value" style="${pcl(ap)}">${sgn(ap)}${ap.toFixed(3)}</div></div>
      <div class="summary-card"><div class="card-bar blue"></div><div class="summary-label">场均利润 (C) ${tip('按当前汇率换算','tip-below tip-right')}</div><div class="summary-value" style="${pcl(ap)}">${sgn(ap)}${(ap*a.dcRatio).toFixed(1)}</div></div>
    </div>`;
  }
  const bar=document.createElement('div');bar.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:14px';
  bar.innerHTML=`<div style="font-size:13px;color:var(--text-secondary)">${ico('layers','ico-sm')} 共 ${a.results.length} 条记录</div><div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" id="add-res">${ico('plus','ico-sm')} 新增记录</button>${a.results.length?`<button class="btn btn-sm btn-danger" id="clr-res">${ico('trash','ico-sm')} 清空全部</button>`:''}</div>`;
  wrap.appendChild(bar);main.appendChild(wrap);
  const list=document.createElement('div');
  if(a.results.length){
    a.results.slice().reverse().forEach((r,ri)=>{
      const i=a.results.length-1-ri,num=i+1,profit=r.earning-r.cost;
      const pc=profit>=0?'var(--green)':'var(--red)',ps=profit>=0?'+':'',isExp=expandedRecord===r.id;
      const el=document.createElement('div');el.className='record-item'+(isExp?' expanded':'');
      let sum=`<div class="record-summary" data-rid="${r.id}">
        <span class="record-num">#${num}</span>
        <div class="record-chips">
          <span class="record-chip"><span class="label">收益</span><span style="color:var(--amber)">${r.earning.toFixed(3)}D</span></span>
          <span class="record-chip"><span class="label">成本</span><span style="color:var(--text-secondary)">${r.cost.toFixed(3)}D</span></span>
          <span class="record-chip"><span class="label">利润</span><span style="color:${pc};font-weight:600">${ps}${profit.toFixed(3)}D</span></span>
          <span class="record-chip" style="color:var(--text-dim);font-size:11px">${ico('clock','ico-sm')} ${fmtTime(r.time)}</span>
        </div>
        <div class="record-actions">
          <button class="btn-icon btn-sm rec-edit" data-rid="${r.id}" title="编辑" style="width:24px;height:24px">${ico('edit','ico-sm')}</button>
          <button class="btn-icon btn-sm danger rec-del" data-rid="${r.id}" title="删除" style="width:24px;height:24px">${ico('trash','ico-sm')}</button>
        </div>
        <span class="record-arrow">${ico('chevRight','ico-sm')}</span>
      </div>`;
      let det=`<div class="record-detail"><div class="detail-grid">
        <div class="detail-item"><div class="dl">收益 (${D})</div><div class="dv" style="color:var(--amber)">${r.earning.toFixed(4)} D</div></div>
        <div class="detail-item"><div class="dl">收益 (${C})</div><div class="dv" style="color:var(--blue)">${(r.earning*a.dcRatio).toFixed(1)} C</div></div>
        <div class="detail-item"><div class="dl">成本 (${D})</div><div class="dv">${r.cost.toFixed(4)} D</div></div>
        <div class="detail-item"><div class="dl">成本 (${C})</div><div class="dv">${(r.cost*a.dcRatio).toFixed(1)} C</div></div>
        <div class="detail-item"><div class="dl">利润 (${D})</div><div class="dv" style="color:${pc}">${ps}${profit.toFixed(4)} D</div></div>
        <div class="detail-item"><div class="dl">利润 (${C})</div><div class="dv" style="color:${pc}">${ps}${(profit*a.dcRatio).toFixed(1)} C</div></div>
        <div class="detail-item"><div class="dl">${ico('clock','ico-sm')} 记录时间</div><div class="dv" style="font-size:13px">${fmtTime(r.time)}</div></div>
        <div class="detail-item"><div class="dl">${ico('exchange','ico-sm')} 使用汇率</div><div class="dv">1D = ${r.ratio||a.dcRatio}C</div></div>
      </div>`;
      if(r.costItems&&r.costItems.length){
        det+=`<div class="detail-note" style="margin-top:10px"><div class="dl">${ico('tag','ico-sm')} 成本明细</div><div class="detail-cost-list">`;
        r.costItems.forEach(ci=>{det+=`<div class="detail-cost-item"><span style="color:var(--text-secondary)">${esc(ci.name)}</span><span style="font-family:var(--mono);color:var(--amber)">${ci.dVal.toFixed(3)}D</span></div>`});
        det+=`</div></div>`;
      }
      if(r.note) det+=`<div class="detail-note"><div class="dl">${ico('note','ico-sm')} 备注</div><div class="dv">${esc(r.note)}</div></div>`;
      det+=`</div>`;
      el.innerHTML=sum+det;list.appendChild(el);
    });
  }else{
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">🗺️</div><div class="empty-text">还没有记录，点击「新增记录」开始追踪利润</div></div>`;
  }
  main.appendChild(list);
  document.getElementById('add-res').onclick=()=>openRecordModal();
  const cr=document.getElementById('clr-res');if(cr)cr.onclick=()=>{confirmDelete(`确定清空「<strong>${esc(a.name)}</strong>」的全部 <strong>${a.results.length}</strong> 条利润记录？此操作不可撤销。`,()=>{a.results=[];expandedRecord=null;save();render();toast('记录已清空')})};
  document.querySelectorAll('.record-summary').forEach(el=>{el.onclick=e=>{if(e.target.closest('.rec-edit')||e.target.closest('.rec-del'))return;expandedRecord=expandedRecord===el.dataset.rid?null:el.dataset.rid;render()}});
  document.querySelectorAll('.rec-edit').forEach(b=>{b.onclick=e=>{e.stopPropagation();openRecordModal(b.dataset.rid)}});
  document.querySelectorAll('.rec-del').forEach(b=>{b.onclick=e=>{e.stopPropagation();const rid=b.dataset.rid;const rec=a.results.find(r=>r.id===rid);const idx=a.results.indexOf(rec);confirmDelete(`确定删除第 <strong>${idx+1}</strong> 条利润记录？此操作不可撤销。`,()=>{a.results=a.results.filter(r=>r.id!==rid);if(expandedRecord===rid)expandedRecord=null;save();render();toast('已删除')})}});
}

// ========== MODAL ==========
function openRecordModal(editId){
  const a=AA(),isEdit=!!editId,rec=isEdit?a.results.find(r=>r.id===editId):null,costD=totalCostD();
  let old=document.getElementById('modal-ov');if(old)old.remove();
  const ov=document.createElement('div');ov.id='modal-ov';ov.className='modal-overlay';
  const snap=a.items.map(i=>({name:i.name,unit:i.unit,price:i.price,dVal:iD(i,a.dcRatio)}));
  ov.innerHTML=`<div class="modal">
    <h3>${isEdit?`${ico('edit')} 编辑记录`:`${ico('plus')} 新增刷图记录`}</h3>
    <div class="field"><label>本次收益 (${D}) ${tip('填写本次刷图获得的总${D}数量','tip-below tip-left')}</label><input type="number" step="0.01" placeholder="例如: 2.5" id="m-earning" class="big"></div>
    <div class="modal-hint">当前单图成本: <span style="color:var(--amber);font-family:var(--mono)">${costD.toFixed(3)} D</span> ≈ <span style="color:var(--blue);font-family:var(--mono)">${(costD*a.dcRatio).toFixed(1)} C</span></div>
    <div class="field"><label>${ico('note','ico-sm')} 备注（可选）</label><textarea id="m-note" placeholder="记录掉落信息、特殊情况等..."></textarea></div>
    <div class="modal-actions"><button class="btn" id="m-cancel">取消</button><button class="btn btn-primary" id="m-ok">${ico('check','ico-sm')} ${isEdit?'保存修改':'确认添加'}</button></div>
  </div>`;
  ov.onclick=e=>{if(e.target===ov)ov.remove()};
  document.body.appendChild(ov);
  const eI=document.getElementById('m-earning'),nI=document.getElementById('m-note');
  if(isEdit){eI.value=rec.earning;nI.value=rec.note||''}
  eI.focus();
  function submit(){const v=parseFloat(eI.value);if(isNaN(v)){toast('请输入有效数值');return}if(isEdit){rec.earning=v;rec.note=nI.value.trim()}else{a.results.push({id:uid(),earning:v,cost:costD,ratio:a.dcRatio,costItems:snap,note:nI.value.trim(),time:Date.now()})}ov.remove();save();render();toast(isEdit?'已更新':'已添加')}
  eI.onkeydown=e=>{if(e.key==='Enter')submit()};
  document.getElementById('m-cancel').onclick=()=>ov.remove();
  document.getElementById('m-ok').onclick=submit;
}

function render(){renderSidebar();renderMain()}
load();render();
</script>
