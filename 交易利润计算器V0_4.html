<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流放之路 · 通货交易利润计算器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#1e1e1e; --panel:#262626; --card:#2f2f2f; --card-hov:#383838;
  --border:#3d3d3d; --border-lt:#4a4a4a;
  --text:#ececec; --text2:#b4b4b4; --text3:#6e6e6e;
  --accent:#cc785c; --accent-bg:rgba(204,120,92,0.15); --accent-sh:rgba(204,120,92,0.18);
  --green:#4caf7d; --green-bg:rgba(76,175,125,0.12);
  --red:#e05252; --red-bg:rgba(224,82,82,0.12);
  --blue:#5b9bd5; --amber:#d4a843; --purple:#9b72cf;
  --font:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;min-height:100vh;overflow:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
input:focus,textarea:focus,select:focus{outline:none;}input[type="number"]::-webkit-inner-spin-button{opacity:0;}
button{font-family:var(--font);cursor:pointer;transition:all 0.15s ease;}
.layout{display:flex;height:100vh;overflow:hidden;}

/* Sidebar */
.sidebar{width:220px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width 0.22s cubic-bezier(.4,0,.2,1);}
.sidebar.collapsed{width:52px;}
.sidebar-logo{padding:14px 10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;overflow:hidden;}
.sidebar-logo-texts{flex:1;min-width:0;overflow:hidden;transition:opacity 0.15s,width 0.22s;}
.sidebar.collapsed .sidebar-logo-texts{opacity:0;width:0;pointer-events:none;}
.sidebar-logo-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;white-space:nowrap;}
.sidebar-logo-sub{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;}
.sidebar-search{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:6px 10px 6px 28px;border-radius:7px;transition:border-color 0.15s,box-shadow 0.15s;}
.sidebar-search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-sh);}
.sidebar-search::placeholder{color:var(--text3);}
.sidebar-search-wrap{position:relative;padding:8px 8px 4px;}
.sidebar-search-icon{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:12px;}
.sidebar-toggle{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;line-height:1;}
.sidebar-toggle:hover{background:var(--card-hov);color:var(--text);border-color:var(--border-lt);}
.sidebar-section-label{padding:12px 10px 5px;font-size:10px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;overflow:hidden;white-space:nowrap;transition:opacity 0.15s;}
.sidebar.collapsed .sidebar-section-label{opacity:0;pointer-events:none;}
.sidebar-items{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 6px;}
.sidebar-nav-btn{width:100%;display:flex;align-items:center;gap:8px;background:transparent;border:none;border-radius:7px;padding:7px 8px;margin-bottom:2px;color:var(--text2);font-size:13px;text-align:left;transition:all 0.15s ease;overflow:hidden;}
.sidebar-nav-btn:hover{background:var(--card-hov);color:var(--text);}
.sidebar-nav-btn.active{background:var(--accent-bg);color:var(--accent);}
.item-avatar{width:28px;height:28px;border-radius:7px;flex-shrink:0;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text3);transition:all 0.15s;}
.sidebar-nav-btn.active .item-avatar{background:var(--accent-bg);border-color:rgba(204,120,92,0.4);color:var(--accent);}
.sidebar-nav-btn:hover .item-avatar{border-color:var(--border-lt);color:var(--text2);}
.item-label-wrap{flex:1;min-width:0;overflow:hidden;transition:opacity 0.15s,max-width 0.22s;}
.sidebar.collapsed .item-label-wrap{opacity:0;max-width:0;pointer-events:none;}
.sidebar-nav-btn .item-profit{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;white-space:nowrap;flex-shrink:0;transition:opacity 0.15s;}
.sidebar.collapsed .item-profit{opacity:0;width:0;overflow:hidden;padding:0;}
.sidebar-nav-btn .item-profit.pos{color:var(--green);}
.sidebar-nav-btn .item-profit.neg{color:var(--red);}
.sidebar-nav-btn .item-del{background:none;border:none;color:var(--text3);font-size:11px;padding:2px 4px;border-radius:3px;line-height:1;flex-shrink:0;transition:color 0.15s,opacity 0.15s;}
.sidebar-nav-btn .item-del:hover{color:var(--red);}
.sidebar.collapsed .item-del{opacity:0;width:0;overflow:hidden;padding:0;}
.sidebar.collapsed .sidebar-nav-btn{position:relative;justify-content:center;padding:7px 0;}
/* Sidebar actions bottom */
.sidebar-actions{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.sidebar.collapsed .sidebar-actions-expanded{opacity:0;max-height:0;overflow:hidden;pointer-events:none;transition:opacity 0.15s,max-height 0.22s;}
.sidebar-actions-expanded{transition:opacity 0.15s,max-height 0.22s;max-height:200px;display:flex;flex-direction:column;gap:7px;}
.sidebar-actions-collapsed{display:none;flex-direction:column;gap:6px;}
.sidebar.collapsed .sidebar-actions-collapsed{display:flex;}
.sa-input-wrap{margin-bottom:2px;}
.sa-row{display:flex;gap:8px;}
/* Full-width accent btn */
.sa-btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:7px;padding:8px 10px;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;transition:background 0.15s,box-shadow 0.15s;}
.sa-btn-primary:hover{background:#b8674d;box-shadow:0 2px 8px rgba(204,120,92,0.25);}
/* Ghost btn (half width) */
.sa-btn-ghost{flex:1;background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:7px;padding:6px 6px;font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px;transition:background 0.15s,border-color 0.15s,color 0.15s;white-space:nowrap;}
.sa-btn-ghost:hover{background:var(--card-hov);border-color:var(--border-lt);color:var(--text);}
/* Danger ghost btn */
.sa-btn-danger{flex:1;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:7px;padding:6px 6px;font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px;transition:background 0.15s;white-space:nowrap;opacity:0.85;}
.sa-btn-danger:hover{background:var(--red-bg);opacity:1;}
/* Collapsed icon-only btn */
.sa-btn-icon{width:36px;height:36px;background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:7px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.sa-btn-icon:hover{background:var(--card-hov);color:var(--text);border-color:var(--border-lt);}
.sa-btn-icon-accent{width:36px;height:36px;background:var(--accent);border:none;color:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.sa-btn-icon-accent:hover{background:#b8674d;}
.input-add{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;padding:7px 10px;border-radius:7px;margin-bottom:6px;transition:border-color 0.15s,box-shadow 0.15s;}
.input-add:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-sh);}
.input-add.err{border-color:var(--red)!important;}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:flex;align-items:center;gap:14px;padding:13px 28px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.topbar-title{font-size:13px;color:var(--text2);}
.topbar-spacer{flex:1;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:7px;font-size:13px;}
.btn-ghost:hover{background:var(--card-hov);color:var(--text);border-color:var(--border-lt);}
.tabbar{display:flex;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;overflow-x:auto;}
.tabbar::-webkit-scrollbar{height:0;}
.tab-btn{background:none;border:none;padding:11px 16px;font-size:13px;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s;}
.tab-btn:hover{color:var(--text2);}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent);}
.scroll-area{flex:1;overflow-y:auto;}
.content{max-width:1400px;margin:0;padding:28px 36px;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px 22px;transition:border-color 0.15s;}
.card:hover{border-color:var(--border-lt);}
.card-bar{height:3px;border-radius:10px 10px 0 0;margin:-20px -22px 18px;}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field-group{display:flex;gap:12px;}
.field{flex:1;min-width:0;}
.field-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;}
.field-wrap{display:flex;align-items:center;gap:6px;}
.field-input{flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;padding:7px 10px;border-radius:7px;transition:border-color 0.15s,box-shadow 0.15s;}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-sh);}
.field-suffix{font-size:12px;color:var(--text3);white-space:nowrap;}
.field-stat{font-size:11px;color:var(--text3);margin-top:5px;}
.trade-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.trade-icon{font-size:18px;}
.trade-title{font-size:14px;font-weight:600;color:var(--text);}
.trade-sub{font-size:11px;color:var(--text3);}
.trade-example{font-size:11px;color:var(--text3);margin:-4px 0 12px 0;font-style:italic;padding:5px 10px;background:var(--bg);border-radius:5px;border-left:2px solid var(--border-lt);}
.profit-summary{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:16px;padding:13px 16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;}
.profit-summary.pos{border-color:rgba(76,175,125,0.3);background:var(--green-bg);}
.profit-summary.neg{border-color:rgba(224,82,82,0.25);background:var(--red-bg);}
.profit-summary-label{font-size:12px;color:var(--text3);}
.profit-summary-val{font-size:16px;font-weight:700;font-family:monospace;}
.profit-summary-val.pos{color:var(--green);}
.profit-summary-val.neg{color:var(--red);}
.profit-summary-stat{font-size:13px;color:var(--text2);}
.section-heading{display:flex;align-items:center;gap:10px;margin:24px 0 12px;}
.section-heading-text{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap;}
.section-heading-line{flex:1;height:1px;background:var(--border);}

/* Results */
.metrics-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px;}
.metric-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px 14px;text-align:center;}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:6px;}
.metric-val{font-size:20px;font-weight:700;font-family:monospace;}
.metric-val.pos{color:var(--green);}.metric-val.neg{color:var(--red);}.metric-val.amber{color:var(--amber);}
.best-card{background:var(--green-bg);border:1px solid rgba(76,175,125,0.3);border-radius:10px;padding:16px 18px;margin-bottom:14px;}
.best-card.neg{background:var(--red-bg);border-color:rgba(224,82,82,0.25);}
.best-card-title{font-size:13px;font-weight:600;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.best-card-title.neg{color:var(--red);}
.tag{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600;}
.tag.pos{background:rgba(76,175,125,0.25);color:var(--green);}.tag.neg{background:var(--red-bg);color:var(--red);}.tag.rec{background:var(--accent);color:#fff;}
.combo-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;transition:border-color 0.15s;}
.combo-card:hover{border-color:var(--border-lt);}
.combo-card.best{border-color:rgba(76,175,125,0.3);background:var(--green-bg);}
.combo-card.losing{opacity:0.72;}
.combo-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.combo-label{display:flex;align-items:center;gap:8px;}
.rank-dot{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--bg);color:var(--text3);flex-shrink:0;}
.rank-dot.top{background:var(--green);color:#fff;}
.combo-name{font-size:14px;font-weight:500;color:var(--text);}
.combo-profit{font-size:15px;font-weight:700;font-family:monospace;}
.combo-profit.pos{color:var(--green);}.combo-profit.neg{color:var(--red);}
.combo-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.combo-stat{background:var(--bg);border-radius:7px;padding:10px 8px;text-align:center;border:1px solid var(--border);}
.combo-stat-label{font-size:10px;color:var(--text3);margin-bottom:3px;}
.combo-stat-val{font-size:12px;font-weight:600;font-family:monospace;color:var(--text2);}

/* Rate / Cost */
.rate-hero{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:28px;margin-bottom:16px;}
.rate-big-input{width:130px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:monospace;font-size:26px;font-weight:700;padding:10px 14px;border-radius:8px;text-align:center;transition:border-color 0.15s,box-shadow 0.15s;}
.rate-big-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-sh);}
.rate-unit{font-size:16px;color:var(--text2);}
.gold-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px 22px;}
.gold-inputs{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.gold-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.gold-stat{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:14px;text-align:center;}
.gold-stat-label{font-size:11px;color:var(--text3);margin-bottom:5px;}
.gold-stat-val{font-size:20px;font-weight:700;font-family:monospace;color:var(--amber);}
.net-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
.net-cell{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:12px;text-align:center;}
.net-label{font-size:11px;color:var(--text3);margin-bottom:4px;}
.net-val{font-size:16px;font-weight:700;font-family:monospace;}

/* Records */
.rec-wrap{display:flex;height:100%;overflow:hidden;}
.rec-list-col{width:300px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--panel);overflow:hidden;}
.rec-toolbar{padding:14px 12px 10px;border-bottom:1px solid var(--border);}
.rec-search{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;padding:7px 10px;border-radius:7px;margin-bottom:8px;transition:border-color 0.15s,box-shadow 0.15s;}
.rec-search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-sh);}
.rec-search::placeholder{color:var(--text3);}
.rec-new-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:7px;padding:8px;font-size:13px;font-weight:500;}
.rec-new-btn:hover{background:#b8674d;}
.rec-tags-bar{display:flex;gap:5px;flex-wrap:wrap;padding:8px 12px;border-bottom:1px solid var(--border);}
.rec-tag-chip{padding:3px 9px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--font);transition:all 0.12s;}
.rec-tag-chip.on{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.rec-tag-chip:hover{color:var(--text2);}
.rec-list-body{flex:1;overflow-y:auto;padding:6px;}
.rec-card{background:var(--card);border:1px solid var(--border);border-left:3px solid transparent;border-radius:8px;padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:all 0.15s;}
.rec-card:hover{background:var(--card-hov);border-color:var(--border-lt);}
.rec-card.sel{background:var(--card-hov);border-color:var(--border-lt);}
.rec-card-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:4px;}
.rec-card-title{font-size:13px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rec-card-time{font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0;}
.rec-card-preview{font-size:12px;color:var(--text3);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:6px;}
.rec-card-tags{display:flex;gap:4px;flex-wrap:wrap;}
.rtag{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500;}
.rt0{background:rgba(91,155,213,0.2);color:var(--blue);}
.rt1{background:rgba(76,175,125,0.2);color:var(--green);}
.rt2{background:rgba(212,168,67,0.2);color:var(--amber);}
.rt3{background:rgba(224,82,82,0.2);color:var(--red);}
.rt4{background:rgba(155,114,207,0.2);color:var(--purple);}
.rt5{background:rgba(204,120,92,0.2);color:var(--accent);}
.rec-detail-col{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.rec-detail-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);}
.rec-dbar{display:flex;align-items:center;gap:10px;padding:13px 20px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.rec-dtitle{flex:1;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);font-family:var(--font);font-size:17px;font-weight:600;padding:3px 0;transition:border-color 0.15s;}
.rec-dtitle:focus{border-bottom-color:var(--border-lt);}
.rec-dtitle::placeholder{color:var(--text3);}
.rec-dbody{flex:1;padding:18px 24px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
.rec-dmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--text3);font-family:monospace;}
.rec-color-row{display:flex;align-items:center;gap:8px;}
.rec-color-label{font-size:12px;color:var(--text3);}
.rec-cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.12s;}
.rec-cdot.on{border-color:#fff;transform:scale(1.2);}
.rec-tag-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.rec-tag-inp{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:4px 10px;border-radius:12px;width:110px;transition:border-color 0.15s;}
.rec-tag-inp:focus{border-color:var(--accent);}
.rec-tag-inp::placeholder{color:var(--text3);}
.rec-del-tag{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;padding:0 2px;line-height:1;}
.rec-del-tag:hover{color:var(--red);}
.rec-content{flex:1;width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text2);font-family:var(--font);font-size:13px;padding:14px;border-radius:8px;resize:none;line-height:1.8;min-height:260px;transition:border-color 0.15s,box-shadow 0.15s;}
.rec-content:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-sh);color:var(--text);}
.rec-content::placeholder{color:var(--text3);}
.rec-dfoot{display:flex;align-items:center;gap:8px;padding:12px 24px;border-top:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.rec-dfoot-right{margin-left:auto;display:flex;gap:8px;}
.btn-danger{background:transparent;border:1px solid var(--border);color:var(--text3);padding:7px 14px;border-radius:7px;font-size:13px;}
.btn-danger:hover{border-color:var(--red);color:var(--red);background:var(--red-bg);}
.btn-save{background:var(--accent);color:#fff;border:none;padding:7px 20px;border-radius:7px;font-size:13px;font-weight:500;}
.btn-save:hover{background:#b8674d;}
.btn-save:disabled{opacity:0.45;cursor:not-allowed;}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:7px;font-size:13px;}
.btn-cancel:hover{background:var(--card-hov);}

/* Compare / History */
.data-table{border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.data-table-head{display:grid;gap:10px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;}
.dtr{display:grid;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;transition:background 0.12s;}
.dtr:last-child{border-bottom:none;}
.dtr:hover{background:var(--card-hov);}
.dtr.top{background:var(--green-bg);}
.col-name{font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.col-best{color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;}
.col-mono{font-family:monospace;}
.col-pos{color:var(--green);}.col-neg{color:var(--red);}.col-muted{color:var(--text2);}
.gh{grid-template-columns:150px 52px 90px 130px 1fr 1fr 70px;}
.ch{grid-template-columns:150px 1fr 100px 100px 120px 120px;}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.chip{padding:4px 12px;border-radius:5px;font-size:12px;cursor:pointer;font-family:var(--font);border:1px solid var(--border);background:transparent;color:var(--text3);transition:all 0.12s;}
.chip.on{background:var(--card-hov);border-color:var(--border-lt);color:var(--text);}
.chip.danger:hover{border-color:var(--red);color:var(--red);background:var(--red-bg);}
.h-restore{background:transparent;border:1px solid var(--border);color:var(--text3);padding:3px 9px;border-radius:5px;font-size:11px;cursor:pointer;transition:all 0.12s;}
.h-restore:hover{border-color:var(--blue);color:var(--blue);}

/* Snapshots */
.snap-toolbar{display:flex;gap:8px;margin-bottom:10px;}
.snap-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;padding:7px 10px;border-radius:7px;transition:border-color 0.15s,box-shadow 0.15s;}
.snap-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-sh);}
.btn-snap{background:var(--card);border:1px solid var(--border-lt);color:var(--text2);padding:7px 14px;border-radius:7px;font-size:13px;white-space:nowrap;}
.btn-snap:hover{background:var(--card-hov);color:var(--text);}
.snap-item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin-bottom:6px;}
.snap-item:hover{border-color:var(--border-lt);}
.snap-info{flex:1;min-width:0;}
.snap-name{font-size:13px;font-weight:500;color:var(--text);}
.snap-meta{font-size:11px;color:var(--text3);}
.btn-sa{background:transparent;border:1px solid var(--border);color:var(--text3);padding:4px 10px;border-radius:5px;font-size:12px;}
.btn-sa.restore:hover{border-color:var(--blue);color:var(--blue);}
.btn-sa.del:hover{border-color:var(--red);color:var(--red);background:var(--red-bg);}

/* Guide */
.guide-step{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;}
.guide-step-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--accent-bg);border:1px solid rgba(204,120,92,0.4);color:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.step-title{font-size:14px;font-weight:600;color:var(--text);}
.step-body{font-size:13px;color:var(--text2);line-height:1.8;padding-left:36px;}
.step-hl{color:var(--accent);font-weight:500;}

/* Toast / Modal */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-6px);background:var(--card);border:1px solid var(--border-lt);color:var(--text);padding:10px 24px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.18s ease,transform 0.18s ease;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(76,175,125,0.4);color:var(--green);}
.toast.warn{border-color:rgba(212,168,67,0.4);color:var(--amber);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--card);border:1px solid var(--border-lt);border-radius:12px;padding:24px;width:100%;max-width:500px;box-shadow:0 8px 40px rgba(0,0,0,0.5);}
.modal-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:14px;}
.modal-ta{width:100%;height:180px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:7px;font-family:monospace;font-size:12px;resize:vertical;transition:border-color 0.15s,box-shadow 0.15s;}
.modal-ta:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-sh);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:7px;font-size:13px;font-weight:500;}
.btn-primary:hover{background:#b8674d;}
.empty{text-align:center;padding:64px 20px;color:var(--text3);font-size:13px;line-height:2;}
.notes-ta{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text2);font-family:var(--font);font-size:13px;padding:10px 12px;border-radius:7px;resize:vertical;min-height:72px;line-height:1.6;transition:border-color 0.15s,box-shadow 0.15s;}
.notes-ta:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-sh);color:var(--text);}
.notes-ta::placeholder{color:var(--text3);}

/* ── Help Tooltip ── */
.help-wrap{position:relative;display:inline-flex;align-items:center;vertical-align:middle;}
.help-icon{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--border);color:var(--text3);font-size:9px;font-weight:700;cursor:default;line-height:1;flex-shrink:0;transition:background 0.12s,color 0.12s;user-select:none;}
.help-icon:hover{background:var(--blue);color:#fff;}
.help-bubble{
  position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);
  background:#1a1a22;border:1px solid var(--border-lt);color:var(--text2);
  font-size:12px;font-weight:400;line-height:1.6;
  padding:9px 12px;border-radius:8px;
  width:220px;white-space:normal;text-align:left;
  box-shadow:0 6px 24px rgba(0,0,0,0.5);
  pointer-events:none;opacity:0;transition:opacity 0.15s;
  z-index:500;
}
.help-bubble::after{
  content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:#1a1a22;
}
.help-wrap:hover .help-bubble{opacity:1;}

/* icon tweaks */
.section-heading-icon{font-size:14px;margin-right:4px;}
.trade-title-icon{font-size:16px;margin-right:6px;}
.metric-icon{font-size:16px;display:block;margin-bottom:4px;}
.gold-stat-icon{font-size:18px;display:block;margin-bottom:4px;}
.topbar-icon{font-size:14px;margin-right:5px;}

/* Confirm-delete modal */
.confirm-modal{background:var(--card);border:1px solid var(--border-lt);border-radius:12px;padding:24px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,0.5);}
.confirm-modal-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;}
.confirm-modal-sub{font-size:13px;color:var(--text3);margin-bottom:14px;line-height:1.6;}
.confirm-modal-item{font-size:13px;font-weight:600;color:var(--red);background:var(--red-bg);border:1px solid rgba(224,82,82,0.25);border-radius:6px;padding:6px 10px;margin-bottom:14px;word-break:break-all;}
.confirm-modal-label{font-size:12px;color:var(--text2);margin-bottom:6px;}
.confirm-modal-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:14px;padding:8px 12px;border-radius:7px;margin-bottom:14px;transition:border-color 0.15s,box-shadow 0.15s;}
.confirm-modal-input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(224,82,82,0.15);}
.confirm-modal-input.valid{border-color:var(--red);}
.confirm-modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.btn-confirm-del{background:var(--red);color:#fff;border:none;padding:8px 18px;border-radius:7px;font-size:13px;font-weight:500;transition:opacity 0.15s;}
.btn-confirm-del:disabled{opacity:0.35;cursor:not-allowed;}
.btn-confirm-del:not(:disabled):hover{opacity:0.85;}

/* ── Favorites ── */
.fav-section{border-top:1px solid var(--border);padding:4px 6px 2px;flex-shrink:0;}
.fav-section-head{display:flex;align-items:center;justify-content:space-between;padding:4px 4px 4px;cursor:pointer;user-select:none;}
.fav-section-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;}
.fav-cats{display:flex;gap:4px;flex-wrap:wrap;padding:0 2px 6px;}
.fav-cat-chip{padding:2px 8px;border-radius:10px;font-size:10px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--font);transition:all 0.12s;}
.fav-cat-chip.on{border-color:var(--amber);color:var(--amber);background:rgba(212,168,67,0.12);}
.fav-cat-chip:hover{color:var(--text2);}
.fav-item{display:flex;align-items:center;gap:4px;padding:3px 4px;border-radius:5px;cursor:pointer;transition:background 0.12s;font-size:12px;color:var(--text2);}
.fav-item:hover{background:var(--card-hov);}
.fav-star-btn{background:none;border:none;font-size:11px;cursor:pointer;padding:1px 3px;line-height:1;opacity:0.4;transition:opacity 0.15s;flex-shrink:0;}
.fav-star-btn.on{opacity:1;color:var(--amber);}
.fav-star-btn:hover{opacity:1;}
/* ── Save banner ── */
.save-banner{display:flex;align-items:center;gap:10px;padding:7px 20px;background:rgba(76,175,125,0.08);border-bottom:1px solid rgba(76,175,125,0.25);flex-shrink:0;}
/* ── Calc history ── */
.calc-hist-wrap{margin-top:16px;}
.calc-hist-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;margin-bottom:5px;font-size:12px;cursor:pointer;transition:border-color 0.12s;}
.calc-hist-item:hover{border-color:var(--accent);}
/* ── Budget table ── */
.budget-tbl{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.budget-head{display:grid;grid-template-columns:70px 1fr 1fr 1fr;gap:8px;padding:8px 14px;background:var(--bg);border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;}
.budget-row{display:grid;grid-template-columns:70px 1fr 1fr 1fr;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px;align-items:center;}
.budget-row:last-child{border-bottom:none;}
/* ── Recommend tab ── */
.rec-item{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:7px;cursor:pointer;transition:border-color 0.15s;}
.rec-item:hover{border-color:var(--border-lt);}
.rec-item.gold{border-color:rgba(212,168,67,0.4);background:rgba(212,168,67,0.05);}
.rec-item.silver{border-color:rgba(91,155,213,0.4);background:rgba(91,155,213,0.04);}
.rec-rank{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--bg);color:var(--text3);flex-shrink:0;border:1px solid var(--border);}
.rec-rank.r1{background:var(--amber);color:#fff;border-color:var(--amber);}
.rec-rank.r2{background:var(--text3);color:var(--bg);border-color:var(--text3);}
.rec-rank.r3{background:#c47f4b;color:#fff;border-color:#c47f4b;}

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef, useMemo, useEffect } = React;
const DEFAULT_CONFIG={dcRatio:200,goldBuy:{dCost:5,goldAmount:300,goldPerHour:0},items:{"示例物品":{name:"示例物品",notes:"这是一个示例物品，可以修改或删除。",buyChaos:{ratio:100,quantity:100,gold:10000},buyDivine:{ratio:1,quantity:300,gold:30000},sellChaos:{ratio:100,quantity:80,gold:1500},sellDivine:{ratio:1,quantity:150,gold:15}}}};
const DEFAULT_ITEM={name:"",notes:"",buyChaos:{ratio:100,quantity:100,gold:10000},buyDivine:{ratio:1,quantity:300,gold:30000},sellChaos:{ratio:100,quantity:80,gold:1500},sellDivine:{ratio:1,quantity:150,gold:15}};
const RC=["#5b9bd5","#4caf7d","#d4a843","#e05252","#9b72cf","#cc785c"];

function fmtCN(n){if(n==null||isNaN(n))return"0";const v=Math.abs(Number(n)),s=Number(n)<0?"-":"";if(v>=1e8)return s+(v/1e8).toFixed(2).replace(/\.?0+$/,"")+"亿";if(v>=1e4)return s+(v/1e4).toFixed(2).replace(/\.?0+$/,"")+"万";if(v>=1e3)return s+(v/1e3).toFixed(2).replace(/\.?0+$/,"")+"千";if(Number.isInteger(v))return s+v;return s+v.toFixed(4).replace(/\.?0+$/,"");}
function fmtD(n){if(n==null||isNaN(n))return"0";const v=Number(n);if(Math.abs(v)>=1e4)return fmtCN(v);return v.toFixed(2).replace(/\.?0+$/,"");}
function ts(){return new Date().toLocaleString("zh-CN",{hour12:false});}
function loadLS(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function saveLS(k,d){try{localStorage.setItem(k,JSON.stringify(d));}catch{}}


/* ── ConfirmDelete ── */
function ConfirmDelete({itemName, onConfirm, onCancel}){
  const [val,setVal]=useState("");
  const ok=val==="确认";
  return(
    <div className="modal-bg" onClick={onCancel}>
      <div className="confirm-modal" onClick={e=>e.stopPropagation()}>
        <div className="confirm-modal-title">⚠️ 删除物品</div>
        <div className="confirm-modal-sub">此操作不可恢复，将永久删除该物品的所有配置数据。</div>
        <div className="confirm-modal-item">「{itemName}」</div>
        <div className="confirm-modal-label">请手动输入 <strong style={{color:"var(--red)"}}>确认</strong> 以继续</div>
        <input
          className={`confirm-modal-input${ok?" valid":""}`}
          placeholder="输入：确认"
          value={val}
          onChange={e=>setVal(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&ok&&onConfirm()}
          autoFocus
        />
        <div className="confirm-modal-actions">
          <button className="btn-cancel" onClick={onCancel}>取消</button>
          <button className="btn-confirm-del" disabled={!ok} onClick={onConfirm}>确认删除</button>
        </div>
      </div>
    </div>
  );
}

function calcResults(item,dcRatio){
  if(!item)return null;
  const dc=dcRatio||1;
  const{buyChaos:bc,buyDivine:bd,sellChaos:sc,sellDivine:sd}=item;
  const buys=[{key:"C买入",unitC:bc.ratio/(bc.quantity||1),unitG:bc.gold/(bc.quantity||1)},{key:"D买入",unitC:(bd.ratio*dc)/(bd.quantity||1),unitG:bd.gold/(bd.quantity||1)}];
  const sells=[{key:"C卖出",unitC:sc.ratio/(sc.quantity||1),unitG:sc.gold/(sc.quantity||1)},{key:"D卖出",unitC:(sd.ratio*dc)/(sd.quantity||1),unitG:sd.gold/(sd.quantity||1)}];
  const combos=[];
  for(const b of buys)for(const s of sells){
    const profitC=s.unitC-b.unitC,profitD=profitC/dc,totalG=b.unitG+s.unitG;
    const items1D=profitD!==0?Math.abs(1/profitD):Infinity,gold1D=items1D!==Infinity?items1D*totalG:Infinity;
    const dPer100k=gold1D>0&&gold1D!==Infinity?100000/gold1D:0;
    const cPer1m=dPer100k*10*dc;
    const buyUnitD=b.unitC/dc;
    const itemsPer1MGold=totalG>0?Math.round(1000000/totalG):0;
    const itemsPer10DProfit=profitD>0?Math.ceil(10/profitD):Infinity;
    const itemsPerD=profitD>0?Math.ceil(1/profitD):Infinity;
    const itemsBuy10D=buyUnitD>0?Math.floor(10/buyUnitD):0;
    const itemsBuy50D=buyUnitD>0?Math.floor(50/buyUnitD):0;
    const itemsBuy100D=buyUnitD>0?Math.floor(100/buyUnitD):0;
    combos.push({label:`${b.key} → ${s.key}`,profitPerItemC:profitC,profitPerItemD:profitD,profitRate:b.unitC>0?(profitC/b.unitC)*100:0,buyGoldPerItem:b.unitG,sellGoldPerItem:s.unitG,totalGoldPerItem:totalG,gold1D,gold10D:gold1D!==Infinity?gold1D*10:Infinity,dPer100k,dPer1m:dPer100k*10,cPer1m,profitable:profitC>0&&b.unitC>0&&s.unitC>0,valid:b.unitC>0&&s.unitC>0,itemsPer1MGold,itemsPer10DProfit,itemsPerD,itemsBuy10D,itemsBuy50D,itemsBuy100D,profit10D:itemsBuy10D*profitD,profit50D:itemsBuy50D*profitD,profit100D:itemsBuy100D*profitD,buyUnitD});
  }
  combos.sort((a,b)=>{if(a.profitable!==b.profitable)return b.profitable-a.profitable;if(a.valid!==b.valid)return b.valid-a.valid;return(b.dPer1m||0)-(a.dPer1m||0);});return combos;
}

/* ── HelpTip ── */
function HelpTip({text}){
  return(
    <span className="help-wrap" style={{marginLeft:4}}>
      <span className="help-icon">?</span>
      <span className="help-bubble">{text}</span>
    </span>
  );
}

function Field({label,value,onChange,suffix,hint,helpText}){
  const [focused,setFocused]=useState(false);
  const displayVal=focused&&(value===0||value==="0")?"":value;
  return(
    <div className="field">
      <label className="field-label" style={{display:"flex",alignItems:"center"}}>
        {label}
        {helpText&&<HelpTip text={helpText}/>}
      </label>
      <div className="field-wrap">
        <input className="field-input" type="number" step="any" value={displayVal}
          onChange={e=>onChange(e.target.value)}
          onFocus={()=>setFocused(true)}
          onBlur={()=>{setFocused(false);if(value===""||value===null||value===undefined)onChange("0");}}
        />
        {suffix&&<span className="field-suffix">{suffix}</span>}
      </div>
      {hint&&<div className="field-stat">{hint}</div>}
    </div>
  );
}

function TradeCard({title,sub,example,data,onUpdate,ct,barColor}){
  const isSell=title.includes("卖出");
  const h=(f,v)=>{const n=Number(v);if(!isNaN(n)){let u={...data,[f]:n};if(isSell&&ct==="C"&&f==="ratio")u={...u,gold:Math.round(n*15)};onUpdate(u);}};
  const unitP=data.quantity>0?data.ratio/data.quantity:0,unitG=data.quantity>0?data.gold/data.quantity:0;
  const isC=ct==="C";
  const tips={
    ratio: isC?`花费（或收到）的混沌石数量，直接从交易所报价栏读取`:`花费（或收到）的神圣石数量，直接从交易所报价栏读取`,
    quantity:`一次交易能买到（或卖出）的物品个数，从交易所库存量读取`,
    gold:`完成这笔交易系统扣除的金币手续费，可在交易确认界面查看`,
  };
  const dirIcon = title.includes("买入") ? "🛒" : "💹";
  return(
    <div className="card" style={{paddingTop:0}}>
      <div className="card-bar" style={{background:barColor}}></div>
      <div className="trade-header">
        <span style={{fontSize:18,flexShrink:0}}>{dirIcon}</span>
        <div>
          <div className="trade-title">{title}</div>
          <div className="trade-sub">{sub}</div>
        </div>
      </div>
      {example&&<div className="trade-example">{example}</div>}
      <div className="field-group">
        <Field label={`${ct}数量`} value={data.ratio} onChange={v=>h("ratio",v)} suffix={ct} helpText={tips.ratio}/>
        <Field label="物品数量" value={data.quantity} onChange={v=>h("quantity",v)} suffix="个" helpText={tips.quantity}/>
        <Field label="金币手续费" value={data.gold} onChange={v=>h("gold",v)} suffix="金币" helpText={tips.gold}/>
      </div>
      <div className="field-stat">单价 {fmtD(unitP)} {ct}/个 · 单位手续费 {fmtCN(unitG)} 金币/个</div>
      {isSell&&ct==="C"&&<div style={{fontSize:11,color:"var(--amber)",marginTop:4}}>💡 金币按 {data.ratio}×15 = {Math.round(data.ratio*15)} 估算（可手动修改）</div>}
    </div>
  );
}
function ComboCard({combo,rank,isBest}){
  const pos=combo.profitable;
  const invalid=!combo.valid;
  const stats=[
    {label:"📈 利润率",    val:`${pos?'+':''}${combo.valid?combo.profitRate.toFixed(2)+'%':'—'}`,  tip:"卖出价相对买入价的百分比利润，越高越好"},
    {label:"💰 百万金币赚(C)", val:`${fmtD(combo.cPer1m)} C`,                                     tip:"消耗100万金币手续费能赚到多少混沌石"},
    {label:"💰 买手续费/个", val:`${fmtCN(combo.buyGoldPerItem)} 金币`,              tip:"买入每个物品需要支付的金币手续费"},
    {label:"💸 卖手续费/个", val:`${fmtCN(combo.sellGoldPerItem)} 金币`,             tip:"卖出每个物品需要支付的金币手续费"},
    {label:"🔟 10万金币赚",   val:`${fmtD(combo.dPer100k)}D`,                     tip:"消耗10万金币手续费能赚到的神圣石数量"},
    {label:"💎 100万金币赚",  val:`${fmtD(combo.dPer1m)}D`,                       tip:"消耗100万金币手续费能赚到的神圣石数量"},
    {label:"⚡ 赚1D手续费", val:combo.gold1D===Infinity?"∞":`${fmtCN(combo.gold1D)} 金币`, tip:"赚到1个神圣石需要花费的总金币（买+卖两端合计）"},
    {label:"🏆 赚10D手续费",val:combo.gold10D===Infinity?"∞":`${fmtCN(combo.gold10D)} 金币`,tip:"赚到10个神圣石需要花费的总金币"},
    {label:"🔄 每个总手续费",val:`${fmtCN(combo.totalGoldPerItem)} 金币`,            tip:"买卖一个物品合计需要花费的金币手续费"},
    {label:"📦 1M金赚多少个",val:combo.itemsPer1MGold?`${combo.itemsPer1MGold}个`:"—",    tip:"用100万金币手续费能交易多少个物品（买+卖），衡量金币利用率"},
    {label:"🔢 赚10D交易量", val:combo.itemsPer10DProfit===Infinity?"∞":`${combo.itemsPer10DProfit}个`,tip:"赚到10个神圣石需要交易多少个物品"},
  ];
  return(
    <div className={`combo-card ${isBest?'best':''} ${!pos?'losing':''}`}>
      <div className="combo-header">
        <div className="combo-label">
          <span className={`rank-dot ${isBest?'top':''}`}>{rank}</span>
          <span className="combo-name">{combo.label}</span>
          {isBest&&<span className="tag rec">⭐ 推荐</span>}
          {invalid&&<span className="tag neg">⚠ 数据未填</span>}
          {!invalid&&!pos&&<span className="tag neg">⚠ 亏损</span>}
        </div>
        <span className={`combo-profit ${pos?'pos':'neg'}`}>{invalid?'—':pos?`+${combo.profitRate.toFixed(2)}%`:`${combo.profitRate.toFixed(2)}%`}</span>
      </div>
      <div className="combo-stats">
        {stats.map((s,i)=>(
          <div key={i} className="combo-stat">
            <div className="combo-stat-label" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>
              {s.label}<HelpTip text={s.tip}/>
            </div>
            <div className="combo-stat-val">{s.val}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// tag color
function tagCls(t){let h=0;for(let i=0;i<t.length;i++)h=(h*31+t.charCodeAt(i))%6;return`rt${h}`;}

/* ── Records Tab ── */
function RecordsTab({records,onSave,onDelete}){
  const [selId,setSelId]=useState(null);
  const [ed,setEd]=useState(null);
  const [search,setSearch]=useState("");
  const [filterTag,setFTag]=useState(null);
  const [tagInp,setTagInp]=useState("");

  const allTags=useMemo(()=>{const s=new Set();records.forEach(r=>(r.tags||[]).forEach(t=>s.add(t)));return[...s];},[records]);
  const filtered=useMemo(()=>{
    let r=records;
    if(search.trim())r=r.filter(x=>x.title.includes(search)||x.content.includes(search));
    if(filterTag)r=r.filter(x=>(x.tags||[]).includes(filterTag));
    return r;
  },[records,search,filterTag]);

  const selRec=selId?records.find(r=>r.id===selId):null;
  const dirty=ed&&selRec&&(ed.title!==selRec.title||ed.content!==selRec.content||JSON.stringify(ed.tags)!==JSON.stringify(selRec.tags)||ed.color!==selRec.color);

  const pick=(r)=>{setSelId(r.id);setEd({...r});setTagInp("");};
  const newRec=()=>{
    const r={id:Date.now(),title:"",content:"",tags:[],color:RC[0],createdAt:ts(),updatedAt:ts()};
    onSave(r);setSelId(r.id);setEd({...r});
  };
  const doSave=()=>{if(!ed)return;const u={...ed,updatedAt:ts()};onSave(u);setEd({...u});};
  const discard=()=>{if(selRec)setEd({...selRec});};
  const addTag=()=>{const t=tagInp.trim();if(!t||!ed)return;if((ed.tags||[]).includes(t)){setTagInp("");return;}setEd(p=>({...p,tags:[...(p.tags||[]),t]}));setTagInp("");};
  const rmTag=(t)=>setEd(p=>({...p,tags:(p.tags||[]).filter(x=>x!==t)}));

  return(
    <div className="rec-wrap">
      {/* List column */}
      <div className="rec-list-col">
        <div className="rec-toolbar">
          <input className="rec-search" placeholder="搜索标题或内容..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <button className="rec-new-btn" onClick={newRec}>＋ 新建记录</button>
        </div>
        {allTags.length>0&&(
          <div className="rec-tags-bar">
            <button className={`rec-tag-chip ${!filterTag?"on":""}`} onClick={()=>setFTag(null)}>全部</button>
            {allTags.map(t=><button key={t} className={`rec-tag-chip ${filterTag===t?"on":""}`} onClick={()=>setFTag(filterTag===t?null:t)}>{t}</button>)}
          </div>
        )}
        <div className="rec-list-body">
          {filtered.length===0&&<div style={{textAlign:"center",padding:"32px 12px",color:"var(--text3)",fontSize:12,lineHeight:2}}>暂无记录<br/>点击「新建记录」开始</div>}
          {filtered.map(r=>(
            <div key={r.id} className={`rec-card ${selId===r.id?"sel":""}`} style={{borderLeftColor:selId===r.id?r.color:"transparent"}} onClick={()=>pick(r)}>
              <div className="rec-card-top">
                <div className="rec-card-title">{r.title||<span style={{color:"var(--text3)",fontStyle:"italic"}}>无标题</span>}</div>
                <div className="rec-card-time">{r.updatedAt?.slice(5,16)||""}</div>
              </div>
              <div className="rec-card-preview">{r.content||<span style={{fontStyle:"italic"}}>暂无内容</span>}</div>
              {(r.tags||[]).length>0&&<div className="rec-card-tags">{r.tags.map(t=><span key={t} className={`rtag ${tagCls(t)}`}>{t}</span>)}</div>}
            </div>
          ))}
        </div>
      </div>

      {/* Detail column */}
      <div className="rec-detail-col">
        {!ed?(
          <div className="rec-detail-empty">
            <div style={{fontSize:40,opacity:0.25}}>📋</div>
            <div style={{fontSize:13}}>选择左侧记录查看详情</div>
            <button className="btn-save" style={{marginTop:4}} onClick={newRec}>＋ 新建记录</button>
          </div>
        ):(
          <>
            <div className="rec-dbar">
              <div style={{width:11,height:11,borderRadius:"50%",background:ed.color,flexShrink:0}}></div>
              <input className="rec-dtitle" placeholder="记录标题..." value={ed.title} onChange={e=>setEd(p=>({...p,title:e.target.value}))}/>
            </div>
            <div className="rec-dbody">
              {/* Meta */}
              <div className="rec-dmeta">
                <span>创建 {ed.createdAt}</span>
                {ed.updatedAt!==ed.createdAt&&<span>· 更新 {ed.updatedAt?.slice(5,16)}</span>}
                {dirty&&<span style={{color:"var(--amber)",fontFamily:"var(--font)"}}>· 未保存</span>}
              </div>
              {/* Color */}
              <div className="rec-color-row">
                <span className="rec-color-label">颜色</span>
                {RC.map(c=><div key={c} className={`rec-cdot ${ed.color===c?"on":""}`} style={{background:c}} onClick={()=>setEd(p=>({...p,color:c}))}/>)}
              </div>
              {/* Tags */}
              <div>
                <div style={{fontSize:12,color:"var(--text3)",marginBottom:6}}>标签</div>
                <div className="rec-tag-row">
                  {(ed.tags||[]).map(t=>(
                    <span key={t} className={`rtag ${tagCls(t)}`} style={{display:"flex",alignItems:"center",gap:3}}>
                      {t}<button className="rec-del-tag" onClick={()=>rmTag(t)}>×</button>
                    </span>
                  ))}
                  <input className="rec-tag-inp" placeholder="输入标签回车..." value={tagInp} onChange={e=>setTagInp(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addTag();}}}/>
                </div>
              </div>
              {/* Content */}
              <div style={{flex:1,display:"flex",flexDirection:"column",gap:5}}>
                <div style={{fontSize:12,color:"var(--text3)"}}>内容</div>
                <textarea className="rec-content" placeholder="记录交易数据、价格观察、操作心得、行情分析..." value={ed.content} onChange={e=>setEd(p=>({...p,content:e.target.value}))}/>
              </div>
            </div>
            <div className="rec-dfoot">
              <button className="btn-danger" onClick={()=>{if(confirm(`确定删除「${ed.title||"无标题"}」？`)){onDelete(ed.id);setSelId(null);setEd(null);}}}>删除记录</button>
              <div className="rec-dfoot-right">
                {dirty&&<button className="btn-cancel" onClick={discard}>放弃更改</button>}
                <button className="btn-save" onClick={doSave} disabled={!dirty}>保存</button>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function RatioCalcTab(){
  const [left,setLeft]=useState("4.10");   // 左边数量（付出）
  const [right,setRight]=useState("1");    // 右边数量（收到）
  const [qtyRaw,setQtyRaw]=useState("");
  const [calcHist,setCalcHist]=useState([]);
  const [mode,setMode]=useState("sell");   // sell=我付出，buy=我收到
  const setQty=(v)=>{
    setQtyRaw(v);
    const q2=parseFloat(v)||0,l2=parseFloat(left)||0,r2=parseFloat(right)||0;
    if(q2>0&&l2>0&&r2>0){
      const ratio2=mode==="sell"?r2/l2:l2/r2;
      const res=q2*ratio2;
      const entry={id:Date.now(),time:new Date().toLocaleTimeString("zh-CN",{hour12:false}),mode,l:l2,r:r2,q:q2,result:res};
      setCalcHist(prev=>{if(prev.length>0&&prev[0].q===q2&&prev[0].l===l2&&prev[0].r===r2&&prev[0].mode===mode)return prev;return[entry,...prev].slice(0,50);});
    }
  };

  const l=parseFloat(left)||0;
  const r=parseFloat(right)||0;
  const qty=qtyRaw;
  const q=parseFloat(qty)||0;

  // 计算结果
  let exact=0,label1="",label2="";
  if(l>0&&r>0&&q>0){
    if(mode==="sell"){
      // 我付出 qty 个左边，能收到多少右边
      exact=q*(r/l);
      label1=`付出 ${qty} 个`;
      label2=`收到 ${fmtD(exact)} 个`;
    } else {
      // 我想收到 qty 个右边，需要付出多少左边
      exact=q*(l/r);
      label1=`收到 ${qty} 个`;
      label2=`需付出 ${fmtD(exact)} 个`;
    }
  }

  const isInt=exact>0&&Number.isInteger(Math.round(exact*1e9)/1e9);

  // 找附近的整数推荐：找使结果最接近整数的数量（在 q±50 范围内找最近的整数结果）
  const recs=[];
  if(l>0&&r>0&&q>0&&!isInt){
    const ratio=mode==="sell"?r/l:l/r;
    // 找使结果为整数的最小倍数：ratio = p/q_factor，找 q_factor 使 q_factor*ratio 为整数
    // 简单做法：搜索 q-30 到 q+30 范围，找结果最接近整数的前5个
    const candidates=[];
    for(let delta=-100;delta<=100;delta++){
      const testQ=q+delta;
      if(testQ<=0)continue;
      const res=testQ*ratio;
      const diff=Math.abs(res-Math.round(res));
      if(diff<0.001){
        candidates.push({q:testQ,res:Math.round(res),diff,delta:Math.abs(delta)});
      }
    }
    candidates.sort((a,b)=>a.delta-b.delta||a.diff-b.diff);
    candidates.slice(0,5).forEach(c=>recs.push(c));
  }

  const unitLabel=mode==="sell"?"付出1个可收到":"收到1个需付出";
  const unitVal=l>0&&r>0?(mode==="sell"?r/l:l/r):0;

  return(
    <div className="content">
      <div style={{fontSize:18,fontWeight:700,color:"var(--text)",marginBottom:4}}>⚖️ 比例计算器</div>
      <div style={{fontSize:12,color:"var(--text3)",marginBottom:20}}>输入交易比例，计算整数推荐数量</div>

      {/* 比例输入 */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:12}}>📐 交易比例</div>
        <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input
              style={{width:90,background:"var(--bg)",border:"1px solid var(--border)",color:"var(--text)",fontFamily:"monospace",fontSize:20,fontWeight:700,padding:"8px 10px",borderRadius:8,textAlign:"center"}}
              type="number" step="0.01" value={left} onChange={e=>setLeft(e.target.value)}
            />
            <span style={{fontSize:20,color:"var(--text3)",fontWeight:700}}>:</span>
            <input
              style={{width:90,background:"var(--bg)",border:"1px solid var(--border)",color:"var(--text)",fontFamily:"monospace",fontSize:20,fontWeight:700,padding:"8px 10px",borderRadius:8,textAlign:"center"}}
              type="number" step="0.01" value={right} onChange={e=>setRight(e.target.value)}
            />
          </div>
          <div style={{fontSize:12,color:"var(--text3)",lineHeight:1.8}}>
            {unitVal>0&&<div>↳ {unitLabel} <span style={{color:"var(--accent)",fontWeight:600,fontFamily:"monospace"}}>{fmtD(unitVal)}</span> 个</div>}
            <div style={{color:"var(--text3)"}}>例：游戏交易所显示 4.10 : 1，左填 4.10，右填 1</div>
          </div>
        </div>
      </div>

      {/* 模式 + 数量输入 */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:12}}>🔢 计算数量</div>
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          <button
            onClick={()=>setMode("sell")}
            style={{padding:"7px 16px",borderRadius:7,border:"1px solid",fontSize:13,cursor:"pointer",fontFamily:"var(--font)",
              background:mode==="sell"?"var(--accent-bg)":"transparent",
              color:mode==="sell"?"var(--accent)":"var(--text2)",
              borderColor:mode==="sell"?"rgba(204,120,92,0.5)":"var(--border)"}}
          >我付出左边，算收到右边</button>
          <button
            onClick={()=>setMode("buy")}
            style={{padding:"7px 16px",borderRadius:7,border:"1px solid",fontSize:13,cursor:"pointer",fontFamily:"var(--font)",
              background:mode==="buy"?"var(--accent-bg)":"transparent",
              color:mode==="buy"?"var(--accent)":"var(--text2)",
              borderColor:mode==="buy"?"rgba(204,120,92,0.5)":"var(--border)"}}
          >我想收到右边，算需付出左边</button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:13,color:"var(--text2)",minWidth:60}}>{mode==="sell"?"付出数量":"目标数量"}</span>
          <input
            style={{width:130,background:"var(--bg)",border:"1px solid var(--border)",color:"var(--text)",fontFamily:"monospace",fontSize:18,fontWeight:700,padding:"8px 12px",borderRadius:8}}
            type="number" step="1" min="1" value={qty} onChange={e=>setQty(e.target.value)}
            placeholder="输入数量"
          />
        </div>
      </div>

      {/* 计算结果 */}
      {exact>0&&(
        <div className="card" style={{marginBottom:16,borderColor:isInt?"rgba(76,175,125,0.4)":"rgba(212,168,67,0.4)",background:isInt?"var(--green-bg)":"rgba(212,168,67,0.06)"}}>
          <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:10}}>📊 计算结果</div>
          <div style={{display:"flex",gap:24,alignItems:"center",flexWrap:"wrap"}}>
            <div>
              <div style={{fontSize:11,color:"var(--text3)",marginBottom:2}}>{label1}</div>
              <div style={{fontSize:28,fontWeight:800,fontFamily:"monospace",color:isInt?"var(--green)":"var(--amber)"}}>{fmtD(exact)}</div>
              <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{label2.split(" ").slice(0,1).join(" ")} {isInt?"✅ 整数":"⚠️ 非整数"}</div>
            </div>
            {!isInt&&<div style={{fontSize:12,color:"var(--text3)",padding:"8px 12px",background:"var(--bg)",borderRadius:8,border:"1px solid var(--border)"}}>
              精确值：<span style={{fontFamily:"monospace",color:"var(--amber)"}}>{exact.toFixed(4)}</span>
            </div>}
          </div>
        </div>
      )}

      {/* 整数推荐 */}
      {recs.length>0&&(
        <div className="card">
          <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:4}}>🎯 整数推荐</div>
          <div style={{fontSize:12,color:"var(--text3)",marginBottom:12}}>以下数量能让结果为整数，按与你输入数量的差距排序</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>
            {recs.map((c,i)=>(
              <div key={i} onClick={()=>setQty(String(c.q))} style={{cursor:"pointer",padding:"12px 14px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:9,transition:"border-color 0.15s"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor="var(--accent)"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}
              >
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <span style={{fontSize:12,color:"var(--text3)"}}>#{i+1} {c.delta===0?"当前数量":`差 ${c.delta>0?"+":""}${c.q-q}`}</span>
                  {i===0&&<span style={{fontSize:10,background:"var(--accent)",color:"#fff",padding:"1px 6px",borderRadius:4}}>最近</span>}
                </div>
                <div style={{display:"flex",alignItems:"baseline",gap:10}}>
                  <span style={{fontFamily:"monospace",fontSize:18,fontWeight:700,color:"var(--text)"}}>{c.q}</span>
                  <span style={{fontSize:12,color:"var(--text3)"}}>{mode==="sell"?"付出":"目标"}</span>
                  <span style={{fontSize:14,color:"var(--text3)"}}>→</span>
                  <span style={{fontFamily:"monospace",fontSize:18,fontWeight:700,color:"var(--green)"}}>{c.res}</span>
                  <span style={{fontSize:12,color:"var(--text3)"}}>{mode==="sell"?"收到":"需付出"}</span>
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop:10,fontSize:11,color:"var(--text3)"}}>💡 点击卡片可直接填入该数量</div>
        </div>
      )}

      {exact>0&&isInt&&(
        <div style={{marginTop:12,padding:"10px 14px",background:"var(--green-bg)",border:"1px solid rgba(76,175,125,0.3)",borderRadius:8,fontSize:13,color:"var(--green)"}}>
          ✅ 当前数量结果已是整数，无需调整！
        </div>
      )}

      {/* 计算记录 */}
      {calcHist.length>0&&(
        <div className="calc-hist-wrap">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>📋 计算记录</div>
            <button className="chip danger" onClick={()=>setCalcHist([])}>清空</button>
          </div>
          <div style={{fontSize:12,color:"var(--text3)",marginBottom:8}}>点击记录可快速填入数量</div>
          {calcHist.map(h=>(
            <div key={h.id} className="calc-hist-item" onClick={()=>setQtyRaw(String(h.q))}>
              <div>
                <span style={{color:"var(--text3)",fontFamily:"monospace",marginRight:8}}>{h.time}</span>
                <span style={{color:"var(--text)"}}>{h.mode==="sell"?"付出":"收到"} </span>
                <span style={{fontFamily:"monospace",fontWeight:700,color:"var(--accent)"}}>{h.q}</span>
                <span style={{color:"var(--text3)",margin:"0 6px"}}>({h.l}:{h.r})</span>
              </div>
              <div style={{textAlign:"right"}}>
                <span style={{color:"var(--text3)",marginRight:6}}>{h.mode==="sell"?"→收到":"→需付出"}</span>
                <span style={{fontFamily:"monospace",fontWeight:700,color:Number.isInteger(Math.round(h.result*1e9)/1e9)?"var(--green)":"var(--amber)"}}>{fmtD(h.result)}</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
