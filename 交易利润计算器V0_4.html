  const goldPerD=gb.dCost>0?(gb.goldAmount*10000)/gb.dCost:0;
  const cmpData=keys.map(k=>{const res=calcResults(config.items[k],config.dcRatio);const b=res?.find(c=>c.profitable);return{name:k,best:b||null,top:res?.[0]};}).sort((a,b)=>(b.best?.profitRate||0)-(a.best?.profitRate||0));
  const recData=useMemo(()=>keys.map(k=>{const res=calcResults(config.items[k],config.dcRatio);const b=res?.find(c=>c.profitable);if(!b)return null;return{name:k,...b};}).filter(Boolean).sort((a,bx)=>{const idiff=(a.itemsPerD||999999)-(bx.itemsPerD||999999);if(Math.abs(idiff)>2)return idiff;const rdiff=bx.profitRate-a.profitRate;if(Math.abs(rdiff)>0.5)return rdiff;return a.totalGoldPerItem-bx.totalGoldPerItem;}),[keys.join(","),config.dcRatio]);

  const TABS=[
    {key:"config",   icon:"⚙️", label:"配置参数"},
    {key:"results",  icon:"📊", label:"利润分析"},
    {key:"ratio",    icon:"⚖️", label:"比例计算"},
    {key:"recommend",icon:"💡", label:"交易推荐"},
    {key:"rate",     icon:"💱", label:"汇率配置"},
    {key:"records",  icon:"📝", label:"记录信息"},
    {key:"history",  icon:"🕘", label:"修改历史"},
    {key:"guide",    icon:"📖", label:"使用引导"},
  ];

  const SH=(text,icon="")=><div className="section-heading"><div className="section-heading-text">{icon&&<span className="section-heading-icon">{icon}</span>}{text}</div><div className="section-heading-line"></div></div>;

  return(
    <div className="layout">
      <div className={`toast ${toast?"show":""} ${toastType}`}>{toast}</div>
      {showImp&&(
        <div className="modal-bg" onClick={()=>setShowImp(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">导入配置</div>
            <div className="modal-sub">粘贴配置文本，同名物品将被覆盖更新。</div>
            <textarea className="modal-ta" value={impText} onChange={e=>setImpText(e.target.value)} placeholder="粘贴配置内容..."/>
            <div className="modal-actions">
              <button className="btn-ghost" onClick={()=>setShowImp(false)}>取消</button>
              <button className="btn-primary" onClick={handleImport}>确认导入</button>
            </div>
          </div>
        </div>
      )}

      {confirmDel&&(
        <ConfirmDelete itemName={confirmDel} onConfirm={()=>delItem(confirmDel)} onCancel={()=>setConfirmDel(null)}/>
      )}

      {/* Sidebar */}
      <div className={`sidebar ${collapsed?"collapsed":""}`}>
        <div className="sidebar-logo">
          <div className="sidebar-logo-texts"><div className="sidebar-logo-title"><span style={{marginRight:6,fontSize:15}}>⚔️</span>通货交易利润计算器</div></div>
          <button className="sidebar-toggle" onClick={()=>setCollapsed(v=>!v)} title={collapsed?"展开":"收起"}>{collapsed?"▶":"◀"}</button>
        </div>
        {/* Search box — hidden when collapsed */}
        {!collapsed&&(
          <div className="sidebar-search-wrap">
            <span className="sidebar-search-icon">🔍</span>
            <input
              className="sidebar-search"
              placeholder="搜索物品..."
              value={itemSearch}
              onChange={e=>setItemSearch(e.target.value)}
            />
          </div>
        )}
        <div className="sidebar-section-label">📦 物品列表</div>
        <div className="sidebar-items">
          {keys.length===0&&!collapsed&&<div style={{fontSize:12,color:"var(--text3)",padding:"10px 6px",textAlign:"center"}}>暂无物品<br/>在下方添加</div>}
          {keys.filter(k=>!itemSearch.trim()||k.toLowerCase().includes(itemSearch.trim().toLowerCase())).map(k=>{
            const badge=getBadge(config.items[k]);
            const faved=favorites.items.some(f=>f.name===k);
            return(
              <button key={k} className={`sidebar-nav-btn ${selected===k?"active":""}`} onClick={()=>{setSelected(k);setTab("config");}} title={collapsed?`${k}  ${badge.val}`:""}>
                <span className="item-label-wrap"><span style={{display:"flex",alignItems:"center",gap:3,minWidth:0}}>
                  <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:13}}>{k}</span>
                  <span style={{fontSize:10,color:"var(--amber)",fontWeight:600,whiteSpace:"nowrap",opacity:0.9}}>{badge.dpm}</span>
                  <span className={`item-profit ${badge.pos?"pos":"neg"}`}>{badge.val}</span>
                </span></span>
                <button className={`fav-star-btn ${faved?"on":""}`} onClick={e=>{e.stopPropagation();toggleFav(k);}} title={faved?"取消收藏":"加入收藏"}>⭐</button>
              </button>
            );
          })}
          {keys.length>0&&itemSearch.trim()&&keys.filter(k=>k.toLowerCase().includes(itemSearch.trim().toLowerCase())).length===0&&(
            <div style={{fontSize:12,color:"var(--text3)",padding:"10px 6px",textAlign:"center"}}>无匹配物品</div>
          )}
        </div>
        {/* Favorites section */}
        {!collapsed&&(
          <div className="fav-section">
            <div className="fav-section-head" onClick={()=>setShowFavs(v=>!v)}>
              <span className="fav-section-title">⭐ 收藏 {favorites.items.length>0?`(${favorites.items.length})`:""}</span>
              <span style={{fontSize:10,color:"var(--text3)"}}>{showFavs?"▼":"▶"}</span>
            </div>
            {showFavs&&(
              <>
                <div className="fav-cats">
                  <button className={`fav-cat-chip ${!favCatFilter?"on":""}`} onClick={()=>setFavCatFilter(null)}>全部</button>
                  {favorites.cats.map(c=>(
                    <button key={c.id} className={`fav-cat-chip ${favCatFilter===c.id?"on":""}`}
                      onClick={()=>setFavCatFilter(f=>f===c.id?null:c.id)}
                      onDoubleClick={()=>{const n=window.prompt("重命名分类：",c.name);if(n&&n.trim()){setFavorites(prev=>{const cats=prev.cats.map(x=>x.id===c.id?{...x,name:n.trim()}:x);const next={...prev,cats};saveLS("poe-v4-favs",next);return next;});}}}
                    >{c.name}</button>
                  ))}
                  <button className="fav-cat-chip" onClick={()=>{const n=window.prompt("新分类名称：");if(n&&n.trim()){const id="cat_"+Date.now();setFavorites(prev=>{const next={...prev,cats:[...prev.cats,{id,name:n.trim()}]};saveLS("poe-v4-favs",next);return next;});}}}>＋</button>
                </div>
                {favorites.items.length===0&&<div style={{fontSize:11,color:"var(--text3)",padding:"4px 6px 6px",textAlign:"center"}}>点击物品旁 ⭐ 加入收藏</div>}
                {favorites.items.filter(f=>!favCatFilter||f.catId===favCatFilter).map(f=>(
                  <div key={f.name} className="fav-item" onClick={()=>{setSelected(f.name);setTab("config");}}>
                    <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
                    {favorites.cats.length>1&&(
                      <select style={{fontSize:10,background:"var(--card)",border:"1px solid var(--border)",color:"var(--text3)",cursor:"pointer",borderRadius:4,padding:"1px 2px"}}
                        value={f.catId||"default"}
                        onClick={e=>e.stopPropagation()}
                        onChange={e=>{e.stopPropagation();const catId=e.target.value;setFavorites(prev=>{const items=prev.items.map(x=>x.name===f.name?{...x,catId}:x);const next={...prev,items};saveLS("poe-v4-favs",next);return next;});}}>
                        {favorites.cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                      </select>
                    )}
                    <button className="fav-star-btn on" onClick={e=>{e.stopPropagation();toggleFav(f.name);}}>✕</button>
                  </div>
                ))}
              </>
            )}
          </div>
        )}
        <div className="sidebar-actions">
          {/* Expanded state */}
          <div className="sidebar-actions-expanded">
            {/* Row 1: full-width primary — 新建配置 */}
            <button className="sa-btn-primary" onClick={()=>{const n=window.prompt("请输入物品名称：");if(!n||!n.trim())return;const name=n.trim();if(config.items[name]){showToast("该物品已存在");return;}persist({...config,items:{...config.items,[name]:{...DEFAULT_ITEM,name}}});setSelected(name);addHist({time:ts(),type:"新增",item:name,field:"创建",from:"-",to:"新建"});}}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
              新建配置
            </button>
            <div className="sa-row">
              <button className="sa-btn-ghost" onClick={()=>selected&&copyItem(selected)} disabled={!selected} style={{opacity:selected?1:0.4}}>
                📋 复制
              </button>
              <button className="sa-btn-danger" onClick={()=>selected&&setConfirmDel(selected)} disabled={!selected} style={{opacity:selected?1:0.4}}>
                🗑️ 删除
              </button>
            </div>
            <div className="sa-row">
              <button className="sa-btn-ghost" onClick={handleExport}>
                📥 导出
              </button>
              <button className="sa-btn-ghost" onClick={()=>fileInputRef.current&&fileInputRef.current.click()}>
                📤 导入
              </button>
            </div>
          </div>

          {/* Collapsed state: icon-only buttons */}
          <div className="sidebar-actions-collapsed">
            <button className="sa-btn-icon-accent" onClick={()=>setCollapsed(false)} title="新建配置">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
            </button>
            <button className="sa-btn-icon" onClick={()=>selected&&copyItem(selected)} title="复制当前">
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="4" width="9" height="9" rx="1.5" stroke="currentColor" strokeWidth="1.5"/><path d="M4 4V2.5A1.5 1.5 0 015.5 1h7A1.5 1.5 0 0114 2.5v7A1.5 1.5 0 0112.5 11H11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
            </button>
            <button className="sa-btn-icon" style={{color:"var(--red)",borderColor:"var(--red)"}} onClick={()=>selected&&setConfirmDel(selected)} title="删除当前">
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5h4V4M5.5 6.5v4M8.5 6.5v4M3 4l.8 7.5h6.4L11 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
            <button className="sa-btn-icon" onClick={handleExport} title="导出配置">
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
            <button className="sa-btn-icon" onClick={()=>{fileInputRef.current&&fileInputRef.current.click();}} title="导入配置">
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 9V1M4 4l3-3 3 3M2 11h10" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
          </div>
        </div>
      </div>

      {/* Main */}
      <div className="main">
        <input ref={fileInputRef} type="file" accept=".txt,.json" style={{display:"none"}} onChange={handleFileSelect}/>
        {importedFileName&&(
          <div className="save-banner">
            <span style={{fontSize:12,color:"var(--green)",flex:1}}>📂 已导入: {importedFileName}</span>
            <button className="btn-ghost" style={{fontSize:12,padding:"4px 12px"}} onClick={handleSave}>💾 保存</button>
            <button className="btn-ghost" style={{fontSize:12,padding:"4px 12px"}} onClick={handleSaveAs}>📥 另存为</button>
            <button className="btn-ghost" style={{fontSize:12,padding:"4px 8px",color:"var(--text3)"}} onClick={()=>setImportedFileName(null)}>✕</button>
          </div>
        )}
        <div className="tabbar">{TABS.map(t=><button key={t.key} className={`tab-btn ${tab===t.key?"active":""}`} onClick={()=>setTab(t.key)}><span style={{marginRight:5,fontSize:14}}>{t.icon}</span>{t.label}</button>)}</div>

        {/* 配置参数 */}
        {tab==="config"&&(!cur?<div className="empty">请先在左侧添加一个物品<br/><span style={{fontSize:12}}>输入名称后按 Enter 或点击「新增物品」</span></div>:(
          <div className="scroll-area"><div className="content">
            <div style={{fontSize:18,fontWeight:700,color:"var(--text)",marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:20}}>📦</span>{cur.name}
            </div>
            <div style={{height:2,background:"linear-gradient(90deg,var(--accent),transparent)",borderRadius:1,marginBottom:18}}></div>
            <div className="config-grid">
              {[{key:"buyChaos", title:"混沌石 买入",sub:"使用混沌石购买",ct:"C",ex:"100C 买 100个，花 1万金币", color:"var(--blue)"},
                {key:"buyDivine",title:"神圣石 买入",sub:"使用神圣石购买",ct:"D",ex:"1D 买 300个，花 3万金币",   color:"var(--amber)"},
                {key:"sellChaos", title:"混沌石 卖出",sub:"使用混沌石售出",ct:"C",ex:"100C 卖 80个，花 1500金币",color:"var(--green)"},
                {key:"sellDivine",title:"神圣石 卖出",sub:"使用神圣石售出",ct:"D",ex:"1D 卖 150个，花 4500金币", color:"var(--purple)"},
              ].map(s=><TradeCard key={s.key} title={s.title} sub={s.sub} example={s.ex} ct={s.ct} barColor={s.color} data={cur[s.key]} onUpdate={next=>updateSection(selected,s.key,next)}/>)}
            </div>
            {combos&&best&&(<div className="profit-summary pos"><div><div className="profit-summary-label">⭐ 最优：{best.label}</div><div className="profit-summary-val pos">+{best.profitRate.toFixed(2)}%</div></div><span className="profit-summary-stat">💰 百万金币赚 {fmtD(best.cPer1m)} C</span><span className="profit-summary-stat">10万金币 → {fmtD(best.dPer100k)} D</span><span className="profit-summary-stat">100万金币 → {fmtD(best.dPer1m)} D</span></div>)}
            {combos&&!best&&(<div className="profit-summary neg"><span style={{color:"var(--red)",fontWeight:600}}>⚠️ 所有组合均亏损</span><span style={{fontSize:12,color:"var(--text3)"}}>请检查买卖价格</span></div>)}
            {SH("物品备注","📝")}
            <textarea className="notes-ta" placeholder="记录价格来源、时间、注意事项..." value={cur.notes||""} onChange={e=>updateNotes(selected,e.target.value)}/>
            {SH("配置快照","📸")}
            <div style={{fontSize:12,color:"var(--text3)",marginBottom:10}}>保存当前所有物品配置，便于不同时段行情对比</div>
            <div className="snap-toolbar">
              <input className="snap-input" placeholder="快照名称（可选）..." value={snapName} onChange={e=>setSnapName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveSnap()}/>
              <button className="btn-snap" onClick={saveSnap}>📸 保存快照</button>
            </div>
            {snapshots.length===0&&<div style={{fontSize:12,color:"var(--text3)",textAlign:"center",padding:"10px 0"}}>暂无快照</div>}
            {snapshots.map(s=>(
              <div key={s.id} className="snap-item">
                <div className="snap-info"><div className="snap-name">{s.name}</div><div className="snap-meta">{s.time} · {Object.keys(s.items).length} 个物品</div></div>
                <button className="btn-sa restore" onClick={()=>restoreSnap(s)}>↩ 恢复</button>
                <button className="btn-sa del" onClick={()=>delSnap(s.id)}>🗑 删除</button>
              </div>
            ))}
            {SH("成本配置","💰")}
            <div className="gold-card">
              <div style={{fontSize:13,color:"var(--text3)",marginBottom:14}}>配置金币坐车成本，结合最优交易方案计算每小时净利润</div>
              <div className="gold-inputs">
                <Field label="坐车花费" value={gb.dCost} onChange={v=>updateGB("dCost",v)} suffix="神圣石" hint="每次坐车花费" helpText="每次坐车需要花费的神圣石数量，从组队公告中查看"/>
                <Field label="获得金币" value={gb.goldAmount} onChange={v=>updateGB("goldAmount",v)} suffix="万金币" hint="坐一次获得（万金币）" helpText="每次坐车结束后能获得的金币数量，单位：万，如 300 表示 300万"/>
                <Field label="每小时坐车获得" value={gb.goldPerHour||""} onChange={v=>updateGB("goldPerHour",v)} suffix="万金币/h" hint="每小时获得（万金币）" helpText="每小时通过坐车累计能获得多少万金币，填写后自动计算每小时净利润"/>
              </div>
              <div className="gold-stat-grid">
                <div className="gold-stat">
                  <div className="gold-stat-label" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>🎟️ 坐车单价<HelpTip text="花1个神圣石能换到多少金币，数值越大说明坐车越划算"/></div>
                  <div className="gold-stat-val">{gb.dCost>0?`${fmtCN(goldPerD)} 金币`:"-"}</div>
                </div>
                <div className="gold-stat">
                  <div className="gold-stat-label" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>⏱️ 每小时坐车成本<HelpTip text="按每小时获得的金币量换算，每小时坐车需要花费多少神圣石"/></div>
                  <div className="gold-stat-val">{gb.goldPerHour>0&&goldPerD>0?`${fmtD((gb.goldPerHour*10000)/goldPerD)} D/h`:"-"}</div>
                </div>
              </div>
              {best&&goldPerD>0&&gb.goldPerHour>0&&(()=>{
                const goldH=gb.goldPerHour*10000,rideD=goldH/goldPerD,tradeD=best.gold1D>0&&best.gold1D!==Infinity?goldH/best.gold1D:0,netD=tradeD-rideD;
                return(<div className="net-grid" style={{marginTop:14}}>
                  <div className="net-cell"><div className="net-label">📊 每小时交易利润</div><div className="net-val" style={{color:"var(--green)"}}>{fmtD(tradeD)} D</div></div>
                  <div className="net-cell"><div className="net-label">🚌 每小时坐车成本</div><div className="net-val" style={{color:"var(--red)"}}>-{fmtD(rideD)} D</div></div>
                  <div className="net-cell" style={{borderColor:netD>0?"rgba(76,175,125,0.3)":"rgba(224,82,82,0.3)",background:netD>0?"var(--green-bg)":"var(--red-bg)"}}><div className="net-label">💵 每小时净赚</div><div className="net-val" style={{color:netD>0?"var(--green)":"var(--red)"}}>{netD>0?"+":""}{fmtD(netD)} D</div></div>
                </div>);
              })()}
            </div>
          </div></div>
        ))}

        {/* 利润分析 */}
        {tab==="results"&&(!cur?<div className="empty">请先选择一个物品</div>:(
          <div className="scroll-area"><div className="content">
            <div style={{fontSize:18,fontWeight:700,color:"var(--text)",marginBottom:4}}>📊 {cur.name} — 利润分析</div>
            <div style={{fontSize:12,color:"var(--text3)",marginBottom:18}}>当前 1D = {config.dcRatio}C · 按利润排序</div>
            {best?(<div className="best-card"><div className="best-card-title">🏆 推荐：{best.label} <span className="tag pos">盈利</span></div><div className="metrics-row">{[
              {label:"📈 利润率",         val:`+${best.profitRate.toFixed(2)}%`,                              cls:"pos", tip:"卖出价相对买入价的利润百分比，衡量每笔交易的回报率"},
              {label:"💰 百万金币赚(C)",   val:`${fmtD(best.cPer1m)} C`,                                      cls:"pos", tip:"消耗100万金币手续费大约能赚到多少混沌石，直观衡量金币效率"},
              {label:"🔟 每10万金币赚",      val:`${fmtD(best.dPer100k)} D`,                                    cls:"pos", tip:"消耗10万金币手续费大约能赚到多少神圣石，用来比较不同物品效率"},
              {label:"💎 每100万金币赚",     val:`${fmtD(best.dPer1m)} D`,                                      cls:"pos", tip:"消耗100万金币手续费大约能赚到多少神圣石"},
              {label:"⚡ 赚1D总手续费",   val:best.gold1D===Infinity?"∞":`${fmtCN(best.gold1D)} 金币`,          cls:"amber",tip:"赚到1个神圣石需要花掉的买卖两端金币总量，越低越省"},
            ].map((m,i)=>(
              <div key={i} className="metric-card">
                <div className="metric-label" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>{m.label}<HelpTip text={m.tip}/></div>
                <div className={`metric-val ${m.cls}`}>{m.val}</div>
              </div>
            ))}</div></div>):combos&&(<div className="best-card neg"><div className="best-card-title neg">⚠️ 所有组合均亏损 <span className="tag neg">亏损</span></div></div>)}
            <div style={{fontSize:12,color:"var(--text3)",margin:"16px 0 10px",textTransform:"uppercase",letterSpacing:"0.08em"}}>所有买卖组合</div>
            {combos?.map((c,i)=><ComboCard key={i} combo={c} rank={i+1} isBest={i===0&&c.profitable}/>)}
            {best&&(
              <>
                {SH("预算交易量","💰")}
                <div style={{fontSize:12,color:"var(--text3)",marginBottom:10}}>按神圣石预算，基于最优方案「{best.label}」估算可交易物品数量和利润</div>
                <div className="budget-tbl">
                  <div className="budget-head"><span>预算</span><span>可交易数量</span><span>预计利润(D)</span><span>利润率</span></div>
                  {[{d:10,key:"itemsBuy10D",pk:"profit10D"},{d:50,key:"itemsBuy50D",pk:"profit50D"},{d:100,key:"itemsBuy100D",pk:"profit100D"}].map(({d,key,pk})=>(
                    <div key={d} className="budget-row">
                      <span style={{color:"var(--amber)",fontWeight:600,fontFamily:"monospace"}}>{d} D</span>
                      <span style={{fontFamily:"monospace",color:"var(--text)"}}>{best[key]||0} 个</span>
                      <span style={{fontFamily:"monospace",color:best[pk]>0?"var(--green)":"var(--red)"}}>{best[pk]>0?"+":""}{fmtD(best[pk]||0)} D</span>
                      <span style={{color:"var(--text2)"}}>{best.profitRate.toFixed(2)}%</span>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div></div>
        ))}

        {/* 汇率配置 */}
        {tab==="rate"&&(
          <div className="scroll-area"><div className="content">
            <div style={{fontSize:18,fontWeight:700,color:"var(--text)",marginBottom:4}}>💱 汇率配置</div>
            <div style={{fontSize:12,color:"var(--text3)",marginBottom:20}}>设置神圣石与混沌石的兑换比例，每次修改自动记录</div>
            <div className="rate-hero">
              <div style={{fontSize:11,color:"var(--text3)",marginBottom:10,letterSpacing:"0.08em",textTransform:"uppercase"}}>📡 当前汇率</div>
              <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                <span className="rate-unit" style={{color:"var(--text3)",display:"flex",alignItems:"center",gap:4}}>
                  1 神圣石
                  <HelpTip text="神圣石（Divine Orb）是游戏高价值通货，建议参考当前赛季交易所实时行情填写，行情波动时及时更新"/>
                </span>
                <span className="rate-unit">=</span>
                <input className="rate-big-input" type="number" step="any" value={config.dcRatio} onChange={e=>updateDC(e.target.value)}/>
                <span className="rate-unit">混沌石</span>
              </div>
              <div style={{marginTop:12,fontSize:12,color:"var(--text3)"}}>换算：1 混沌石 ≈ {fmtD(1/config.dcRatio)} 神圣石</div>
            </div>
            {SH("汇率变更历史","📜")}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <span style={{fontSize:12,color:"var(--text3)"}}>{rateHist.length} 条记录</span>
              {rateHist.length>0&&<button className="chip danger" onClick={()=>{setRateHist([]);saveLS("poe-v3-ratehist",[]);}}>清空</button>}
            </div>
            {rateHist.length===0&&<div style={{textAlign:"center",padding:"24px 0",color:"var(--text3)",fontSize:13}}>暂无变更记录，修改上方汇率后自动记录</div>}
            {rateHist.length>0&&(
              <div className="data-table">
                {rateHist.slice(0,30).map((r,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 80px 24px 80px 60px",gap:12,padding:"10px 16px",borderBottom:i<Math.min(rateHist.length,30)-1?"1px solid var(--border)":"none",alignItems:"center",fontSize:13}}>
                    <span style={{color:"var(--text3)",fontFamily:"monospace",fontSize:11}}>{r.time}</span>
                    <span style={{fontFamily:"monospace",fontWeight:600,color:"var(--text)",textAlign:"right"}}>{r.from}</span>
                    <span style={{color:"var(--text3)",textAlign:"center"}}>→</span>
                    <span style={{fontFamily:"monospace",fontWeight:600,color:"var(--accent)",textAlign:"right"}}>{r.to}</span>
                    <span style={{fontSize:11,color:r.to>r.from?"var(--red)":"var(--green)",textAlign:"right"}}>{r.to>r.from?"↑":"↓"} {Math.abs(r.to-r.from).toFixed(1)}</span>
                  </div>
                ))}
              </div>
            )}
          </div></div>
        )}

        {/* 记录信息 */}
        {tab==="records"&&(
          <div style={{flex:1,overflow:"hidden",height:"100%"}}>
            <RecordsTab records={records} onSave={saveRec} onDelete={delRec}/>
          </div>
        )}

        {/* 修改历史 */}
        {tab==="history"&&(
          <div className="scroll-area"><div className="content">
            <div style={{fontSize:18,fontWeight:700,color:"var(--text)",marginBottom:14}}>🕘 修改历史</div>
            <div className="filter-bar">
              <button className={`chip ${!histFilter?"on":"inactive"}`} onClick={()=>setHistFilter(null)}>全部</button>
              {keys.map(k=><button key={k} className={`chip ${histFilter===k?"on":"inactive"}`} onClick={()=>setHistFilter(k)}>{k}</button>)}
              {histFilter&&<button className="chip danger" onClick={()=>{const n=history.filter(h=>h.item!==histFilter);setHistory(n);saveLS("poe-v3-hist",n);setHistFilter(null);}}>清除此项</button>}
            </div>
            {filtHist.length===0?<div className="empty">暂无修改记录</div>:(
              <div className="data-table">
                <div className="data-table-head gh"><span>时间</span><span>类型</span><span>物品</span><span>字段</span><span>旧值</span><span>新值</span><span>操作</span></div>
                <div style={{maxHeight:480,overflowY:"auto"}}>
                  {filtHist.map((h,i)=>(
                    <div key={i} className="dtr gh" style={{fontSize:12}}>
                      <span style={{color:"var(--text3)",fontFamily:"monospace",fontSize:11}}>{h.time}</span>
                      <span style={{color:"var(--text2)"}}>{h.type}</span>
                      <span style={{color:"var(--text)",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.item}</span>
                      <span style={{color:"var(--text3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.field}</span>
                      <span style={{color:"var(--red)",fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{String(h.from).substring(0,30)}</span>
                      <span style={{color:"var(--green)",fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{String(h.to).substring(0,30)}</span>
                      <button className="h-restore" onClick={()=>restoreHist(h)}>↩ 恢复</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div></div>
        )}

        {tab==="guide"&&<div className="scroll-area"><GuideTab/></div>}
        {tab==="ratio"&&<div className="scroll-area"><RatioCalcTab/></div>}
        {tab==="recommend"&&(
          <div className="scroll-area"><div className="content">
            <div style={{fontSize:18,fontWeight:700,color:"var(--text)",marginBottom:4}}>💡 交易推荐</div>
            <div style={{fontSize:12,color:"var(--text3)",marginBottom:6}}>综合排名：少交易数量优先 → 利润率高优先 → 花费金币少优先</div>
            <div style={{fontSize:11,color:"var(--text3)",marginBottom:16,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7}}>
              💡 排序权重：每赚1D需交易数量 &gt; 利润率 &gt; 每个物品金币成本。适合快速找到「交易少次数、效率高」的物品。
            </div>
            {recData.length===0&&<div className="empty">暂无可盈利物品<br/>请先添加并配置物品价格</div>}
            {recData.map((item,i)=>(
              <div key={item.name} className={`rec-item ${i===0?"gold":i===1?"silver":""}`}
                onClick={()=>{setSelected(item.name);setTab("results");}}>
                <span className={`rec-rank ${i===0?"r1":i===1?"r2":i===2?"r3":""}`}>{i+1}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <span style={{fontWeight:600,fontSize:14,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</span>
                    <span style={{fontSize:11,background:"var(--accent)",color:"#fff",padding:"1px 6px",borderRadius:4,whiteSpace:"nowrap"}}>{item.label}</span>
                    {favorites.items.some(f=>f.name===item.name)&&<span style={{fontSize:11}}>⭐</span>}
                  </div>
                  <div style={{display:"flex",gap:16,flexWrap:"wrap",fontSize:12}}>
                    <span style={{color:"var(--green)"}}>📈 利润率 <strong>+{item.profitRate.toFixed(2)}%</strong></span>
                    <span style={{color:"var(--amber)"}}>💰 百万金 <strong>{fmtD(item.dPer1m)}D</strong></span>
                    <span style={{color:"var(--text2)"}}>🔢 赚1D需 <strong>{item.itemsPerD===Infinity?"∞":item.itemsPerD+"个"}</strong></span>
                    <span style={{color:"var(--text3)"}}>💸 每个金币 <strong>{fmtCN(item.totalGoldPerItem)}</strong></span>
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:3,alignItems:"flex-end",flexShrink:0}}>
                  <span style={{fontSize:11,color:"var(--text3)"}}>10D预算</span>
                  <span style={{fontFamily:"monospace",fontWeight:700,color:"var(--green)"}}>+{fmtD(item.profit10D||0)}D</span>
                  <span style={{fontSize:10,color:"var(--text3)"}}>{item.itemsBuy10D||0}个</span>
                </div>
              </div>
            ))}
          </div></div>
        )}
      </div>
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
