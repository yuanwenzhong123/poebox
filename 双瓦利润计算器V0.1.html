<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双瓦腐化利润计算器</title>
<style>
:root {
  --bg:        #1e1e1e;
  --sidebar:   #262626;
  --card:      #2f2f2f;
  --card-hover:#383838;
  --border:    #3d3d3d;
  --border-lt: #4a4a4a;
  --text:      #ececec;
  --text-2:    #b4b4b4;
  --text-3:    #6e6e6e;
  --accent:    #cc785c;
  --accent-lt: rgba(204,120,92,0.15);
  --accent-dk: #a85f46;
  --green:     #4caf7d;
  --red:       #e05252;
  --blue:      #5b9bd5;
  --amber:     #d4a843;
  --radius:    10px;
  --radius-sm: 7px;
  --shadow:    0 2px 8px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}

/* ── LAYOUT ── */
.layout{display:flex;min-height:100vh;}
.sidebar{width:220px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden;transition:width 0.22s cubic-bezier(.4,0,.2,1);}
.sidebar.collapsed{width:52px;}
.sidebar-top{padding:16px 14px 12px;border-bottom:1px solid var(--border);flex-shrink:0;overflow:hidden;}
.sidebar.collapsed .sidebar-top{padding:12px 10px;}
.sidebar-logo{display:flex;align-items:center;gap:9px;margin-bottom:0;}
.logo-icon{width:30px;height:30px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;cursor:pointer;}
.logo-text{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;transition:opacity 0.15s,width 0.22s;}
.logo-sub{font-size:11px;color:var(--text-3);white-space:nowrap;overflow:hidden;transition:opacity 0.15s;}
.sidebar.collapsed .logo-text,.sidebar.collapsed .logo-sub{opacity:0;width:0;}
/* tooltip on collapsed item entries */
.sidebar.collapsed .item-entry{position:relative;}
.sidebar.collapsed [data-tip]:hover::after{content:attr(data-tip);position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);background:#1a1a1a;color:var(--text);font-size:12px;padding:5px 10px;border-radius:6px;white-space:nowrap;border:1px solid var(--border);z-index:999;pointer-events:none;box-shadow:var(--shadow);}
.sidebar-section-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);padding:10px 14px 4px;white-space:nowrap;overflow:hidden;transition:opacity 0.15s;}
.sidebar.collapsed .sidebar-section-label{opacity:0;padding:6px 0 2px;}
.item-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 8px 8px;transition:padding 0.22s;}
.sidebar.collapsed .item-list{padding:4px 6px 8px;}
.item-list::-webkit-scrollbar{width:4px;}
.item-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
.item-entry{display:flex;align-items:center;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.12s;margin-bottom:2px;position:relative;overflow:hidden;}
.item-entry:hover{background:var(--card);}
.item-entry.active{background:var(--accent-lt);}
.item-entry-btn{flex:1;display:flex;flex-direction:column;align-items:flex-start;padding:8px 10px;border:none;background:none;cursor:pointer;text-align:left;min-width:0;transition:padding 0.22s;}
.sidebar.collapsed .item-entry-btn{padding:8px 0;align-items:center;width:40px;flex:none;}
.item-entry-name{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;max-width:140px;transition:opacity 0.15s;}
.item-entry.active .item-entry-name{color:var(--accent);}
.item-entry-meta{font-size:11px;color:var(--text-3);margin-top:1px;white-space:nowrap;overflow:hidden;transition:opacity 0.15s;}
.item-entry.active .item-entry-meta{color:var(--accent);opacity:0.7;}
.sidebar.collapsed .item-entry-name,.sidebar.collapsed .item-entry-meta{opacity:0;width:0;height:0;margin:0;}
.item-avatar{width:28px;height:28px;border-radius:6px;background:var(--card);display:none;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-2);flex-shrink:0;}
.item-entry.active .item-avatar{background:var(--accent-lt);color:var(--accent);}
.sidebar.collapsed .item-avatar{display:flex;}
.item-del-btn{flex-shrink:0;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:none;background:none;color:var(--text-3);cursor:pointer;border-radius:5px;font-size:12px;opacity:0;transition:opacity 0.15s,color 0.15s,background 0.15s;margin-right:4px;}
.item-entry:hover .item-del-btn{opacity:1;}
.item-del-btn:hover{color:var(--red);background:rgba(224,82,82,0.12);}
.sidebar.collapsed .item-del-btn{display:none;}
/* collapse toggle */
.collapse-btn{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;background:none;border:none;color:var(--text-3);cursor:pointer;transition:color 0.15s,background 0.15s;flex-shrink:0;margin-left:auto;}
.collapse-btn:hover{background:var(--card);color:var(--text-2);}
.collapse-icon{display:inline-block;transition:transform 0.22s;}
.sidebar.collapsed .collapse-icon{transform:rotate(180deg);}

/* ── SIDEBAR BOTTOM ── */
.sidebar-bottom{flex-shrink:0;padding:12px 10px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;overflow:hidden;}
/* Row 1: full-width accent button */
.sb-main-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 12px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:background 0.15s;white-space:nowrap;overflow:hidden;}
.sb-main-btn:hover{background:var(--accent-dk);}
.sb-main-btn .sb-btn-text{transition:opacity 0.15s,width 0.22s;overflow:hidden;white-space:nowrap;}
.sidebar.collapsed .sb-main-btn{padding:9px;justify-content:center;gap:0;}
.sidebar.collapsed .sb-main-btn .sb-btn-text{opacity:0;width:0;}
/* Row 2+: two-column ghost button pairs */
.sb-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sidebar.collapsed .sb-row{grid-template-columns:1fr;}
.sb-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 6px;border-radius:var(--radius-sm);background:transparent;border:1px solid var(--border);color:var(--text-2);cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;transition:all 0.15s;white-space:nowrap;position:relative;}
.sb-btn:hover{background:var(--card-hover);border-color:var(--border-lt);color:var(--text);}
.sb-btn.sb-danger{color:var(--red);border-color:rgba(224,82,82,0.35);}
.sb-btn.sb-danger:hover{background:rgba(224,82,82,0.1);border-color:var(--red);}
.sb-btn .sb-btn-text{transition:opacity 0.15s,width 0.22s;overflow:hidden;white-space:nowrap;}
.sidebar.collapsed .sb-btn{padding:8px;gap:0;}
.sidebar.collapsed .sb-btn .sb-btn-text{opacity:0;width:0;}
/* tooltips when collapsed */
.sidebar.collapsed .sb-btn[data-tip]:hover::after,.sidebar.collapsed .sb-main-btn[data-tip]:hover::after{content:attr(data-tip);position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);background:#1a1a1a;color:var(--text);font-size:12px;padding:5px 10px;border-radius:6px;white-space:nowrap;border:1px solid var(--border);z-index:999;pointer-events:none;box-shadow:var(--shadow);}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:28px 32px 80px;min-width:0;}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.page-title-input{font-size:20px;font-weight:700;color:var(--text);background:none;border:none;border-bottom:2px solid transparent;outline:none;font-family:inherit;padding:0;width:340px;transition:border-color 0.15s;}
.page-title-input:focus{border-bottom-color:var(--accent);}
.page-subtitle{font-size:12px;color:var(--text-3);margin-top:4px;}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab-btn{padding:9px 18px;font-size:13px;font-weight:500;color:var(--text-3);background:none;border:none;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s,border-color 0.15s;}
.tab-btn:hover{color:var(--text-2);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── EMPTY STATE ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center;}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.4;}
.empty-title{font-size:18px;font-weight:600;color:var(--text-2);margin-bottom:8px;}
.empty-desc{font-size:13px;color:var(--text-3);margin-bottom:24px;}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px;}
.card-header{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.ch-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.ch-orange{background:rgba(204,120,92,0.2);}
.ch-green{background:rgba(76,175,125,0.2);}
.ch-amber{background:rgba(212,168,67,0.2);}
.ch-blue{background:rgba(91,155,213,0.2);}
.ch-purple{background:rgba(155,114,207,0.2);}

/* ── FORM ── */
.form-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;}
.form-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:150px;}
.form-label{font-size:12px;font-weight:500;color:var(--text-2);}
input[type="number"],input[type="text"],textarea{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:inherit;padding:8px 11px;outline:none;transition:border-color 0.15s,box-shadow 0.15s;width:100%;}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(204,120,92,0.18);}
input::placeholder,textarea::placeholder{color:var(--text-3);}
textarea{resize:vertical;min-height:72px;line-height:1.5;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;font-family:inherit;padding:8px 16px;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s;border:none;outline:none;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-dk);box-shadow:0 2px 8px rgba(204,120,92,0.35);}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--card-hover);color:var(--text);border-color:var(--border-lt);}
.btn-danger-ghost{background:transparent;color:var(--red);border:1px solid rgba(224,82,82,0.3);}
.btn-danger-ghost:hover{background:rgba(224,82,82,0.1);border-color:var(--red);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}

/* ── CORROSION TABLE ── */
.table-wrap{overflow-x:auto;}
table.rec-table{width:100%;border-collapse:collapse;font-size:13px;}
table.rec-table th{font-size:11px;font-weight:600;color:var(--text-3);text-align:center;padding:8px 7px 10px;border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:0.5px;}
table.rec-table th.th-l{text-align:left;}
table.rec-table td{padding:5px 5px;border-bottom:1px solid rgba(61,61,61,0.5);text-align:center;vertical-align:middle;}
table.rec-table tr:last-child td{border-bottom:none;}
table.rec-table tbody tr:hover td{background:rgba(255,255,255,0.025);}
.row-num{color:var(--text-3);font-size:11px;width:24px;}
.row-inp{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:inherit;padding:5px 7px;outline:none;width:100%;text-align:center;transition:border-color 0.15s;}
.row-inp:focus{border-color:var(--accent);}
.row-inp.inp-left{text-align:left;min-width:100px;}
.row-inp.inp-num{min-width:66px;}
select.row-sel{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:inherit;padding:5px 6px;outline:none;cursor:pointer;width:100%;transition:border-color 0.15s;}
select.row-sel:focus{border-color:var(--accent);}
select.oc-good{border-color:rgba(76,175,125,0.4);color:var(--green);}
select.oc-dead{border-color:rgba(224,82,82,0.4);color:var(--red);}
select.oc-safe{border-color:rgba(212,168,67,0.4);color:var(--amber);}
select.oc-white{border-color:rgba(220,220,220,0.4);color:#dcdcdc;}
select.unit-d{border-color:rgba(212,168,67,0.4);color:var(--amber);}
select.unit-c{border-color:rgba(91,155,213,0.4);color:var(--blue);}
.cell-cost{color:var(--red);font-size:12px;}
.cell-rev{color:var(--green);font-size:12px;}
.cell-p-pos{color:var(--green);font-weight:600;}
.cell-p-neg{color:var(--red);font-weight:600;}
.cell-conv{color:var(--amber);font-size:12px;}
.del-btn{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:12px;padding:3px 6px;border-radius:5px;transition:all 0.12s;}
.del-btn:hover{color:var(--red);background:rgba(224,82,82,0.12);}
.add-row-btn{width:100%;margin-top:10px;background:none;border:1px dashed var(--border);color:var(--text-3);font-family:inherit;font-size:12px;padding:9px;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s;}
.add-row-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt);}
.empty-td{text-align:center !important;color:var(--text-3) !important;font-style:italic;padding:32px 0 !important;}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px;}
.stat-tile{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden;}
.stat-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
.st-total::before{background:var(--accent);}
.st-good::before{background:var(--green);}
.st-dead::before{background:var(--red);}
.st-safe::before{background:var(--amber);}
.st-white::before{background:var(--blue);}
.st-profit::before{background:linear-gradient(90deg,var(--green),var(--accent));}
.stat-label{font-size:11px;color:var(--text-3);font-weight:500;margin-bottom:6px;}
.stat-val{font-size:22px;font-weight:700;line-height:1;}
.stat-sub{font-size:11px;color:var(--text-3);margin-top:4px;}
.st-total .stat-val{color:var(--accent);}
.st-good .stat-val{color:var(--green);}
.st-dead .stat-val{color:var(--red);}
.st-safe .stat-val{color:var(--amber);}
.st-white .stat-val{color:var(--blue);}

/* ── BAR ── */
.bar-track{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;display:flex;margin-bottom:10px;}
.bar-seg{height:100%;transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.bs-good{background:var(--green);}
.bs-safe{background:var(--amber);}
.bs-white{background:var(--blue);}
.bs-dead{background:var(--red);}
.bar-legend{display:flex;gap:14px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-3);}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ── RATIO ── */
.ratio-preview{display:inline-flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;font-size:13px;color:var(--text-3);min-width:160px;}
.ratio-hint{font-size:12px;color:var(--text-3);margin-top:12px;padding:9px 12px;background:var(--bg);border-radius:var(--radius-sm);border-left:3px solid var(--accent);line-height:1.5;}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;letter-spacing:0.5px;padding:2px 7px;border-radius:5px;}
.badge-d{background:rgba(212,168,67,0.18);color:var(--amber);border:1px solid rgba(212,168,67,0.3);}
.badge-c{background:rgba(91,155,213,0.15);color:var(--blue);border:1px solid rgba(91,155,213,0.3);}

/* ── NOTES LIST ── */
.notes-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap;}
.notes-search{flex:1;min-width:160px;max-width:280px;}
.notes-search input{padding:6px 10px;font-size:13px;}
.notes-grid{display:flex;flex-direction:column;gap:8px;}
.note-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;cursor:pointer;transition:border-color 0.15s,background 0.15s;position:relative;}
.note-card:hover{border-color:var(--border-lt);background:var(--card-hover);}
.note-card.selected{border-color:var(--accent);background:var(--accent-lt);}
.note-card-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
.note-card-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-card-actions{display:flex;gap:4px;opacity:0;transition:opacity 0.15s;flex-shrink:0;}
.note-card:hover .note-card-actions{opacity:1;}
.note-card-meta{font-size:11px;color:var(--text-3);display:flex;gap:10px;margin-bottom:6px;}
.note-card-preview{font-size:12px;color:var(--text-3);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.note-tag{display:inline-flex;align-items:center;padding:1px 7px;border-radius:99px;font-size:11px;font-weight:500;}
.note-tag-good{background:rgba(76,175,125,0.15);color:var(--green);}
.note-tag-dead{background:rgba(224,82,82,0.15);color:var(--red);}
.note-tag-safe{background:rgba(212,168,67,0.15);color:var(--amber);}
.note-tag-white{background:rgba(91,155,213,0.15);color:var(--blue);}
.note-tag-general{background:rgba(155,114,207,0.15);color:#9b72cf;}
.notes-empty{text-align:center;padding:40px 0;color:var(--text-3);font-style:italic;font-size:13px;}

/* ── NOTE DETAIL DRAWER ── */
.drawer-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:10001;}
.drawer-mask.show{display:block;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:480px;max-width:100vw;background:var(--card);border-left:1px solid var(--border);z-index:10002;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.25s cubic-bezier(.4,0,.2,1);}
.drawer.open{transform:translateX(0);}
.drawer-header{padding:18px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}
.drawer-title-input{font-size:16px;font-weight:700;color:var(--text);background:none;border:none;border-bottom:2px solid transparent;outline:none;font-family:inherit;padding:0;flex:1;transition:border-color 0.15s;}
.drawer-title-input:focus{border-bottom-color:var(--accent);}
.drawer-close{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:18px;padding:4px;border-radius:5px;transition:color 0.15s;}
.drawer-close:hover{color:var(--text);}
.drawer-body{flex:1;overflow-y:auto;padding:20px;}
.drawer-field{margin-bottom:16px;}
.drawer-field label{font-size:12px;font-weight:500;color:var(--text-2);display:block;margin-bottom:5px;}
.drawer-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.tag-selector{display:flex;gap:6px;flex-wrap:wrap;}
.tag-opt{padding:3px 10px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all 0.15s;background:var(--bg);}
.tag-opt:hover{opacity:0.85;}
.tag-opt.sel-good{background:rgba(76,175,125,0.2);color:var(--green);border-color:rgba(76,175,125,0.4);}
.tag-opt.sel-dead{background:rgba(224,82,82,0.2);color:var(--red);border-color:rgba(224,82,82,0.4);}
.tag-opt.sel-safe{background:rgba(212,168,67,0.2);color:var(--amber);border-color:rgba(212,168,67,0.4);}
.tag-opt.sel-white{background:rgba(91,155,213,0.2);color:var(--blue);border-color:rgba(91,155,213,0.4);}
.tag-opt.sel-general{background:rgba(155,114,207,0.2);color:#9b72cf;border-color:rgba(155,114,207,0.4);}
.tag-opt.inactive{background:var(--bg);color:var(--text-3);border-color:var(--border);}

/* ── MODAL ── */
.modal-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:10000;align-items:center;justify-content:center;}
.modal-mask.show{display:flex;}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px 28px;width:380px;box-shadow:var(--shadow);}
.modal-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px;}
.modal-desc{font-size:13px;color:var(--text-3);margin-bottom:18px;}
.modal-input{width:100%;margin-bottom:18px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
/* danger confirm modal */
.dconfirm-icon{width:40px;height:40px;border-radius:10px;background:rgba(224,82,82,0.15);border:1px solid rgba(224,82,82,0.3);display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.dconfirm-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;}
.dconfirm-desc{font-size:13px;color:var(--text-3);line-height:1.6;margin-bottom:16px;}
.dconfirm-input-wrap{margin-bottom:18px;}
.dconfirm-input-label{font-size:12px;color:var(--text-3);margin-bottom:6px;}
.dconfirm-input-label b{color:var(--red);}
.dconfirm-inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:inherit;padding:8px 11px;outline:none;transition:border-color 0.15s;}
.dconfirm-inp:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(224,82,82,0.15);}
.dconfirm-inp.matched{border-color:var(--red);}
.dconfirm-btns{display:flex;gap:8px;justify-content:flex-end;}
.btn-confirm-danger{background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 18px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s;opacity:0.4;pointer-events:none;}
.btn-confirm-danger.enabled{opacity:1;pointer-events:auto;}
.btn-confirm-danger.enabled:hover{background:#c03838;}

/* ── GUIDE TAB ── */
.guide-section{margin-bottom:24px;}
.guide-section-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.guide-steps{display:flex;flex-direction:column;gap:10px;}
.guide-step{display:flex;gap:14px;padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);}
.guide-step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;}
.guide-step-body{}
.guide-step-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
.guide-step-desc{font-size:12px;color:var(--text-3);line-height:1.6;}
.guide-step-desc b{color:var(--text-2);}
.guide-tip{display:flex;gap:10px;padding:12px 14px;background:var(--accent-lt);border:1px solid rgba(204,120,92,0.25);border-radius:var(--radius-sm);font-size:12px;color:var(--text-2);line-height:1.6;}
.guide-tip-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.guide-faq{display:flex;flex-direction:column;gap:8px;}
.guide-faq-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.guide-faq-q{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:none;border:none;color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-align:left;transition:background 0.12s;}
.guide-faq-q:hover{background:var(--card-hover);}
.guide-faq-q .faq-arrow{font-size:11px;color:var(--text-3);transition:transform 0.2s;flex-shrink:0;}
.guide-faq-q.open .faq-arrow{transform:rotate(90deg);}
.guide-faq-a{display:none;padding:0 16px 12px;font-size:12px;color:var(--text-3);line-height:1.7;}
.guide-faq-a.open{display:block;}
/* import/export */
.io-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.io-grid{grid-template-columns:1fr;}}
.io-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;}
.io-box-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:7px;}
.io-box-desc{font-size:12px;color:var(--text-3);margin-bottom:14px;line-height:1.5;}
.io-box-actions{display:flex;flex-direction:column;gap:8px;}
#importFileInput{display:none;}
/* ── SIDEBAR SEARCH ── */
.sidebar-search{padding:4px 8px;overflow:hidden;transition:opacity 0.15s;}
.sidebar.collapsed .sidebar-search{opacity:0;pointer-events:none;height:0;padding:0;}
.sidebar-search-inner{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;transition:border-color 0.15s;}
.sidebar-search-inner:focus-within{border-color:var(--accent);}
.sidebar-search-inner svg{color:var(--text-3);flex-shrink:0;}
.sidebar-search-inner input{background:none;border:none;outline:none;color:var(--text);font-size:12px;font-family:inherit;width:100%;min-width:0;}
.sidebar-search-inner input::placeholder{color:var(--text-3);}
/* ── AUTHOR CARD ── */
.author-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-align:center;}
.author-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.author-qq{font-size:13px;color:var(--text-3);margin-bottom:6px;}
.author-slogan{font-size:12px;color:var(--text-3);line-height:1.6;margin-bottom:20px;font-style:italic;max-width:280px;margin-left:auto;margin-right:auto;}
.author-qr{width:200px;height:200px;border-radius:10px;border:3px solid var(--border);margin:0 auto 10px;display:block;object-fit:cover;}
.author-qr-label{font-size:12px;color:var(--text-3);}
.author-qr-label span{color:var(--green);font-weight:600;}

/* ── KNOWLEDGE TAB ── */
.know-list{display:flex;flex-direction:column;gap:10px;}
.know-item{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border);}
.know-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.know-dot-safe{background:var(--text-3);}
.know-dot-white{background:var(--blue);}
.know-dot-good{background:var(--green);}
.know-dot-dead{background:var(--red);}
.know-dot-amber{background:var(--amber);}
.know-pct-badge{flex-shrink:0;font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px;margin-top:1px;min-width:44px;text-align:center;}
.know-text{font-size:13px;color:var(--text-2);line-height:1.6;flex:1;}
.know-tag{display:inline-flex;align-items:center;padding:1px 7px;border-radius:5px;font-size:12px;font-weight:600;background:rgba(110,110,110,0.18);color:var(--text-2);margin:0 2px;}
.know-tag-good{background:rgba(76,175,125,0.18);color:var(--green);}
.know-tag-blue{background:rgba(91,155,213,0.18);color:var(--blue);}
.know-tag-amber{background:rgba(212,168,67,0.18);color:var(--amber);}
/* gem calc */
.gem-calc-box{margin-top:20px;padding:18px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border);}
.gem-calc-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;}
.gem-calc-desc{font-size:12px;color:var(--text-3);line-height:1.6;margin-bottom:14px;}
.gem-calc-row{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;margin-bottom:16px;}
.gem-calc-inp-wrap{display:flex;flex-direction:column;gap:5px;}
.gem-calc-inp-wrap label{font-size:11px;font-weight:500;color:var(--text-2);}
.gem-calc-inp-wrap input{display:block;}
.gem-calc-note{font-size:11px;color:var(--text-3);margin-top:3px;}
.gem-calc-result{display:flex;flex-direction:column;gap:8px;}
.gem-result-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:var(--radius-sm);background:var(--card);}
.gem-result-label{font-size:12px;color:var(--text-3);}
.gem-result-val{font-size:13px;font-weight:600;color:var(--text);}
.gem-result-main{font-size:18px;color:var(--accent);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

@media(max-width:700px){
  .sidebar{width:52px !important;}
  .sidebar .logo-text,.sidebar .logo-sub,.sidebar .new-item-btn .btn-text,.sidebar .sidebar-section-label,.sidebar .item-entry-name,.sidebar .item-entry-meta,.sidebar .nav-btn-text{opacity:0;width:0;height:0;}
  .sidebar .item-avatar{display:flex;}
  .sidebar .item-del-btn{display:none;}
  .sidebar .collapse-btn{display:none;}
  .main{padding:16px 12px 80px;}
  .stats-grid{grid-template-columns:repeat(3,1fr);}
  .stat-val{font-size:18px;}
  .drawer{width:100vw;}
}

/* ── 腐化词缀 TAB ── */
.affix-table{width:100%;border-collapse:collapse;font-size:12px;}
.affix-table th{font-size:11px;font-weight:600;color:var(--text-3);text-align:left;padding:7px 10px 9px;border-bottom:1px solid var(--border);white-space:nowrap;}
.affix-table th.th-c{text-align:center;}
.affix-table td{padding:6px 10px;border-bottom:1px solid rgba(61,61,61,0.4);vertical-align:middle;}
.affix-table tr:last-child td{border-bottom:none;}
.affix-table tbody tr:hover td{background:rgba(255,255,255,0.025);}
.affix-idx{color:var(--text-3);font-size:11px;min-width:22px;text-align:center;}
.affix-name{color:var(--text);font-size:12px;}
.affix-weight{text-align:center;color:var(--amber);font-weight:600;min-width:54px;}
.affix-tags{display:flex;gap:4px;flex-wrap:wrap;}
.affix-tag{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600;background:rgba(110,110,110,0.18);color:var(--text-3);}
.affix-tag.t-life{background:rgba(76,175,125,0.18);color:var(--green);}
.affix-tag.t-elem{background:rgba(91,155,213,0.18);color:var(--blue);}
.affix-tag.t-mana{background:rgba(155,114,207,0.18);color:#9b72cf;}
.affix-tag.t-def{background:rgba(212,168,67,0.18);color:var(--amber);}
.affix-tag.t-gem{background:rgba(204,120,92,0.18);color:var(--accent);}
/* 概率计算器 */
.prob-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;margin-top:20px;}
.prob-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;}
.prob-desc{font-size:12px;color:var(--text-3);line-height:1.6;margin-bottom:14px;}
.prob-selrow{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;}
.prob-sel-wrap{display:flex;flex-direction:column;gap:5px;flex:1;min-width:160px;}
.prob-sel-wrap label{font-size:11px;font-weight:500;color:var(--text-2);}
.prob-sel-wrap select{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px;font-family:inherit;padding:6px 8px;outline:none;}
.prob-sel-wrap select:focus{border-color:var(--accent);}
.prob-inp-wrap{display:flex;flex-direction:column;gap:5px;width:110px;}
.prob-inp-wrap label{font-size:11px;font-weight:500;color:var(--text-2);}
.prob-inp-wrap input{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px;font-family:inherit;padding:6px 8px;outline:none;width:100%;}
.prob-result{display:flex;flex-direction:column;gap:8px;}
.prob-result-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:var(--radius-sm);background:var(--card);}
.prob-result-row.main-row{flex-direction:column;align-items:flex-start;padding:14px 18px;gap:4px;}
.prob-result-label{font-size:12px;color:var(--text-3);}
.prob-result-val{font-size:13px;font-weight:600;color:var(--text);}
.prob-result-val.main{font-size:28px;font-weight:700;color:var(--accent);line-height:1.1;}
.prob-result-val.main-red{font-size:28px;font-weight:700;color:var(--red);line-height:1.1;}
/* 成功词缀展开行 */
.affix-detail-tr td{padding:0;}
.affix-detail-inner{background:rgba(76,175,125,0.06);border-left:3px solid var(--green);padding:10px 14px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
.affix-detail-inner label{font-size:11px;color:var(--text-3);margin-right:4px;}
.affix-detail-inner select{background:var(--bg);border:1px solid rgba(76,175,125,0.35);border-radius:6px;color:var(--green);font-size:12px;font-family:inherit;padding:4px 8px;outline:none;max-width:260px;}
.affix-detail-inner select:focus{border-color:var(--green);}
/* 词缀气泡按钮 */
.affix-pill-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(76,175,125,0.35);background:rgba(76,175,125,0.08);color:var(--green);transition:all 0.15s;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;}
.affix-pill-btn:hover{background:rgba(76,175,125,0.18);border-color:rgba(76,175,125,0.6);}
.affix-pill-btn.has-affix{background:rgba(76,175,125,0.15);border-color:var(--green);}
.affix-pill-btn .pill-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;}
.affix-pill-btn .pill-dot.empty{background:var(--text-3);}
/* 词缀弹出面板 */
.affix-popover{position:fixed;z-index:10100;background:var(--card);border:1px solid var(--border-lt);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:14px 16px;width:520px;max-width:96vw;display:none;}
.affix-popover.open{display:block;}
.affix-popover-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.affix-popover-title{font-size:12px;font-weight:600;color:var(--green);display:flex;align-items:center;gap:6px;}
.affix-popover-close{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px;line-height:1;}
.affix-popover-close:hover{color:var(--text);background:var(--card-hover);}
.affix-popover-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.affix-popover-row:last-child{margin-bottom:0;}
.affix-popover-label{font-size:11px;font-weight:500;color:var(--text-3);width:36px;flex-shrink:0;}
.affix-popover-row .ss-wrap{flex:1;}
/* 装备类型 */
.equip-type-select{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:inherit;padding:8px 11px;outline:none;transition:border-color 0.15s;min-width:160px;}
.equip-type-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(204,120,92,0.18);}
/* 装备类型 — 右上角 */
.header-equip-type{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.header-equip-label{font-size:11px;font-weight:500;color:var(--text-3);}
.header-equip-select{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-weight:600;font-family:inherit;padding:7px 30px 7px 12px;outline:none;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236e6e6e' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;}
.header-equip-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(204,120,92,0.18);}
/* ── SEARCHABLE SELECT ── */
.ss-wrap{position:relative;display:inline-block;width:100%;}
.ss-display{display:flex;align-items:center;justify-content:space-between;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:inherit;padding:5px 8px 5px 8px;cursor:pointer;transition:border-color 0.15s;min-width:0;outline:none;user-select:none;}
.ss-display:focus,.ss-display.open{border-color:var(--accent);box-shadow:0 0 0 2px rgba(204,120,92,0.15);}
.ss-display-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ss-arrow{font-size:9px;color:var(--text-3);flex-shrink:0;transition:transform 0.15s;}
.ss-display.open .ss-arrow{transform:rotate(180deg);}
.ss-dropdown{position:fixed;z-index:9999;background:var(--card);border:1px solid var(--border-lt);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);display:none;flex-direction:column;overflow:hidden;}
.ss-dropdown.open{display:flex;}
.ss-search-wrap{padding:8px 8px 4px;border-bottom:1px solid var(--border);}
.ss-search{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;font-family:inherit;padding:5px 8px;outline:none;}
.ss-search:focus{border-color:var(--accent);}
.ss-list{overflow-y:auto;max-height:220px;padding:3px 0;}
.ss-list::-webkit-scrollbar{width:4px;}
.ss-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
.ss-option{padding:6px 12px;font-size:12px;color:var(--text-2);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background 0.1s;}
.ss-option:hover{background:var(--card-hover);color:var(--text);}
.ss-option.selected{background:var(--accent-lt);color:var(--accent);}
.ss-option.hidden{display:none;}
.ss-empty{padding:10px 12px;font-size:12px;color:var(--text-3);text-align:center;font-style:italic;}
/* outcome-colored display */
.ss-display.oc-good{border-color:rgba(76,175,125,0.4);color:var(--green);}
.ss-display.oc-dead{border-color:rgba(224,82,82,0.4);color:var(--red);}
.ss-display.oc-safe{border-color:rgba(212,168,67,0.4);color:var(--amber);}
.ss-display.oc-white{border-color:rgba(220,220,220,0.4);color:#dcdcdc;}
.ss-display.unit-d{border-color:rgba(212,168,67,0.4);color:var(--amber);}
.ss-display.unit-c{border-color:rgba(91,155,213,0.4);color:var(--blue);}
/* affix inner ss */
.affix-detail-inner .ss-display{background:var(--bg);border-color:rgba(76,175,125,0.35);color:var(--green);font-size:12px;padding:4px 8px;max-width:260px;}
.affix-detail-inner .ss-display:focus,.affix-detail-inner .ss-display.open{border-color:var(--green);}
/* prob-sel ss */
.prob-sel-wrap .ss-display{font-size:12px;padding:6px 8px;}
/* header equip-type ss */
.header-equip-type .ss-wrap{width:auto;min-width:140px;}
.header-equip-type .ss-display{background:var(--card);font-size:13px;font-weight:600;padding:7px 12px;}
/* ── SUB TABS (内嵌子tab) ── */
.sub-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:18px;}
.sub-tab-btn{padding:7px 16px;font-size:12px;font-weight:500;color:var(--text-3);background:none;border:none;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s,border-color 0.15s;}
.sub-tab-btn:hover{color:var(--text-2);}
.sub-tab-btn.active{color:var(--green);border-bottom-color:var(--green);}
.sub-tab-panel{display:none;}
.sub-tab-panel.active{display:block;}
/* ── LUCK ANALYSIS ── */
.luck-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;}
.luck-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.luck-emoji{font-size:24px;line-height:1;}
.luck-title{font-size:15px;font-weight:700;color:var(--text);}
.luck-subtitle{font-size:12px;color:var(--text-3);margin-top:2px;}
.luck-verdict{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700;margin-left:auto;flex-shrink:0;}
.lv-godlike{background:rgba(255,215,0,0.15);color:#f0c040;border:1px solid rgba(255,215,0,0.35);}
.lv-great{background:rgba(76,175,125,0.15);color:var(--green);border:1px solid rgba(76,175,125,0.35);}
.lv-good{background:rgba(76,175,125,0.1);color:var(--green);border:1px solid rgba(76,175,125,0.2);}
.lv-avg{background:rgba(180,180,180,0.1);color:var(--text-3);border:1px solid var(--border);}
.lv-bad{background:rgba(212,168,67,0.12);color:var(--amber);border:1px solid rgba(212,168,67,0.3);}
.lv-terrible{background:rgba(224,82,82,0.12);color:var(--red);border:1px solid rgba(224,82,82,0.3);}
.luck-rows{display:flex;flex-direction:column;gap:10px;}
.luck-row{background:var(--bg);border-radius:var(--radius-sm);padding:12px 14px;}
.luck-row-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
.luck-row-label{font-size:12px;font-weight:600;color:var(--text-2);}
.luck-row-vals{display:flex;align-items:center;gap:8px;font-size:12px;}
.lrv-actual{font-weight:700;font-size:13px;}
.lrv-sep{color:var(--text-3);}
.lrv-expected{color:var(--text-3);}
.lrv-delta{font-size:11px;font-weight:600;padding:1px 7px;border-radius:99px;}
.lrv-delta.pos{background:rgba(76,175,125,0.15);color:var(--green);}
.lrv-delta.neg{background:rgba(224,82,82,0.12);color:var(--red);}
.lrv-delta.neu{background:rgba(180,180,180,0.1);color:var(--text-3);}
.luck-bar-wrap{display:flex;align-items:center;gap:8px;}
.luck-bar-bg{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:visible;position:relative;}
.luck-bar-fill{height:100%;border-radius:99px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.luck-bar-marker{position:absolute;top:-3px;width:2px;height:12px;background:var(--text-3);border-radius:1px;transform:translateX(-50%);}
.luck-row-desc{font-size:11px;color:var(--text-3);line-height:1.6;margin-top:4px;}
.luck-advice{margin-top:14px;padding:12px 14px;background:rgba(204,120,92,0.08);border:1px solid rgba(204,120,92,0.2);border-radius:var(--radius-sm);}
.luck-advice-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.luck-advice-list{display:flex;flex-direction:column;gap:4px;}
.luck-advice-item{font-size:12px;color:var(--text-2);line-height:1.6;display:flex;gap:6px;}
.luck-advice-item::before{content:'›';color:var(--accent);font-weight:700;flex-shrink:0;}
.luck-insufficient{text-align:center;padding:24px;color:var(--text-3);font-size:13px;font-style:italic;}
/* ── SIMULATOR ── */
.sim-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;}
.sim-ctrl-group{display:flex;flex-direction:column;gap:5px;}
.sim-ctrl-label{font-size:11px;font-weight:500;color:var(--text-2);}
.sim-ctrl-group input[type=number]{width:100px;padding:7px 10px;font-size:13px;}
.sim-run-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:background 0.15s;}
.sim-run-btn:hover{background:var(--accent-dk);}
.sim-run-btn:disabled{opacity:0.5;cursor:not-allowed;}
.sim-reset-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:var(--radius-sm);background:transparent;color:var(--text-3);border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;transition:all 0.15s;}
.sim-reset-btn:hover{background:var(--card-hover);color:var(--text);}
.sim-speed-group{display:flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.sim-speed-btn{padding:0 11px;height:34px;font-size:12px;font-weight:600;font-family:inherit;background:transparent;border:none;color:var(--text-3);cursor:pointer;transition:all 0.15s;border-right:1px solid var(--border);}
.sim-speed-btn:last-child{border-right:none;}
.sim-speed-btn:hover{background:var(--card-hover);color:var(--text);}
.sim-speed-btn.active{background:var(--accent);color:#fff;}
.sim-progress-bar{height:6px;background:var(--border);border-radius:99px;margin-bottom:16px;overflow:hidden;}
.sim-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:99px;transition:width 0.1s linear;}
.sim-stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px;}
.sim-stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;text-align:center;}
.sim-stat-val{font-size:20px;font-weight:700;line-height:1.1;margin-bottom:3px;}
.sim-stat-label{font-size:10px;color:var(--text-3);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;}
.sim-stat-sub{font-size:11px;color:var(--text-3);margin-top:2px;}
.sim-log{max-height:280px;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:'Courier New',monospace;}
.sim-log::-webkit-scrollbar{width:4px;}
.sim-log::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
.sim-log-row{display:flex;align-items:center;gap:8px;padding:5px 12px;border-bottom:1px solid rgba(61,61,61,0.3);}
.sim-log-row:last-child{border-bottom:none;}
.sim-log-row:hover{background:rgba(255,255,255,0.02);}
.sim-log-num{color:var(--text-3);min-width:28px;text-align:right;flex-shrink:0;}
.sim-log-outcome{font-weight:700;min-width:72px;flex-shrink:0;}
.lo-good{color:var(--green);}
.lo-dead{color:var(--red);}
.lo-safe{color:var(--amber);}
.lo-white{color:#dcdcdc;}
.sim-log-affix{color:var(--text-3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sim-log-profit{min-width:60px;text-align:right;flex-shrink:0;font-weight:600;}
.sim-analysis{margin-top:4px;}
.sim-analysis-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:6px;font-size:12px;}
.sim-analysis-row:last-child{margin-bottom:0;}
.sar-label{color:var(--text-3);}
.sar-val{font-weight:600;color:var(--text);}
.sim-empty{text-align:center;padding:40px;color:var(--text-3);font-size:13px;font-style:italic;}
.sim-verdict-banner{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:var(--radius-sm);margin-bottom:14px;border:1px solid;}
.svb-godlike{background:rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.3);}
.svb-great{background:rgba(76,175,125,0.08);border-color:rgba(76,175,125,0.25);}
.svb-avg{background:rgba(180,180,180,0.06);border-color:var(--border);}
.svb-bad{background:rgba(212,168,67,0.08);border-color:rgba(212,168,67,0.25);}
.svb-terrible{background:rgba(224,82,82,0.08);border-color:rgba(224,82,82,0.25);}
.svb-emoji{font-size:26px;line-height:1;flex-shrink:0;}
.svb-text{flex:1;}
.svb-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
.svb-sub{font-size:11px;color:var(--text-3);line-height:1.5;}
.sim-affix-top{margin-top:4px;display:flex;flex-direction:column;gap:5px;}
.sat-row{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg);border-radius:var(--radius-sm);}
.sat-rank{font-size:11px;color:var(--text-3);min-width:18px;}
.sat-name{flex:1;font-size:12px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sat-count{font-size:12px;font-weight:700;color:var(--accent);}
.sat-bar{width:60px;height:5px;background:var(--border);border-radius:99px;overflow:hidden;flex-shrink:0;}
.sat-bar-fill{height:100%;background:var(--accent);border-radius:99px;}
/* manual vaal button */
.manual-vaal-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;width:160px;height:160px;border-radius:50%;border:3px solid var(--accent);background:radial-gradient(circle,rgba(204,120,92,0.15),rgba(204,120,92,0.05));cursor:pointer;transition:all 0.15s;box-shadow:0 0 20px rgba(204,120,92,0.2);}
.manual-vaal-btn:hover{border-color:var(--accent-dk);background:radial-gradient(circle,rgba(204,120,92,0.25),rgba(204,120,92,0.1));box-shadow:0 0 32px rgba(204,120,92,0.35);transform:scale(1.04);}
.manual-vaal-btn:active{transform:scale(0.97);}
.mvb-icon{font-size:36px;line-height:1;}
.mvb-text{font-size:14px;font-weight:700;color:var(--accent);}
@keyframes mvbFlash{0%{box-shadow:0 0 0 rgba(204,120,92,0);}50%{box-shadow:0 0 40px rgba(204,120,92,0.6);}100%{box-shadow:0 0 20px rgba(204,120,92,0.2);}}
.manual-vaal-btn.mvb-flash{animation:mvbFlash 0.3s ease-out;}
/* ── COST UNIT TOGGLE ── */
.cost-unit-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;flex-shrink:0;}
.cut-btn{padding:0 10px;height:34px;font-size:12px;font-weight:600;font-family:inherit;background:transparent;border:none;color:var(--text-3);cursor:pointer;transition:all 0.15s;}
.cut-btn:hover{color:var(--text-2);background:var(--card-hover);}
.cut-btn.active{background:var(--accent);color:#fff;}
.cut-btn:not(:last-child){border-right:1px solid var(--border);}
</style>
</head>

<script>
// ── SEARCHABLE SELECT COMPONENT ──
class SearchableSelect {
  // options: [{value, label}], onChange(value), placeholder, initialValue
  constructor(container, options, onChange, {placeholder='— 请选择 —', initialValue='', extraClass=''}={}) {
    this.options = options;
    this.onChange = onChange;
    this.value = initialValue;
    this.placeholder = placeholder;
    this.extraClass = extraClass;
    this._dropdownEl = null;
    this._displayEl = null;
    this._searchEl = null;
    this._listEl = null;
    this._open = false;
    this._build(container);
    this._outsideHandler = (e) => {
      if (!container.contains(e.target) && !(this._dropdownEl && this._dropdownEl.contains(e.target))) this.close();
    };
  }
  _build(container) {
    container.innerHTML = '';
    container.className = 'ss-wrap ' + (container.className||'');
    // display button
    const disp = document.createElement('div');
    disp.className = 'ss-display' + (this.extraClass ? ' '+this.extraClass : '');
    disp.tabIndex = 0;
    disp.setAttribute('role','combobox');
    const txt = document.createElement('span');
    txt.className = 'ss-display-text';
    const arrow = document.createElement('span');
    arrow.className = 'ss-arrow';
    arrow.textContent = '▼';
    disp.appendChild(txt);
    disp.appendChild(arrow);
    container.appendChild(disp);
    this._displayEl = disp;
    this._textEl = txt;
    this._updateDisplay();
    // dropdown (appended to body for z-index)
    const drop = document.createElement('div');
    drop.className = 'ss-dropdown';
    const searchWrap = document.createElement('div');
    searchWrap.className = 'ss-search-wrap';
    const searchInp = document.createElement('input');
    searchInp.type = 'text';
    searchInp.className = 'ss-search';
    searchInp.placeholder = '搜索...';
    searchWrap.appendChild(searchInp);
    drop.appendChild(searchWrap);
    const list = document.createElement('div');
    list.className = 'ss-list';
    drop.appendChild(list);
    document.body.appendChild(drop);
    this._dropdownEl = drop;
    this._searchEl = searchInp;
    this._listEl = list;
    this._buildOptions();
    // events
    disp.addEventListener('click', () => this._open ? this.close() : this.open());
    disp.addEventListener('keydown', (e) => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); this._open?this.close():this.open(); } if(e.key==='Escape') this.close(); });
    searchInp.addEventListener('input', () => this._filter(searchInp.value));
    searchInp.addEventListener('keydown', (e)=>{ if(e.key==='Escape') this.close(); });
  }
  _buildOptions() {
    this._listEl.innerHTML = '';
    this.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'ss-option' + (opt.value === this.value ? ' selected' : '');
      el.dataset.value = opt.value;
      el.textContent = opt.label;
      el.title = opt.label;
      el.addEventListener('click', () => { this.setValue(opt.value); this.close(); });
      this._listEl.appendChild(el);
    });
  }
  _filter(q) {
    const ql = q.trim().toLowerCase();
    let any = false;
    this._listEl.querySelectorAll('.ss-option').forEach(el => {
      const match = !ql || el.textContent.toLowerCase().includes(ql);
      el.classList.toggle('hidden', !match);
      if (match) any = true;
    });
    let empty = this._listEl.querySelector('.ss-empty');
    if (!any) { if(!empty){empty=document.createElement('div');empty.className='ss-empty';empty.textContent='无匹配选项';this._listEl.appendChild(empty);} } else { if(empty) empty.remove(); }
  }
  _updateDisplay() {
    const opt = this.options.find(o=>o.value===this.value);
    if (opt) { this._textEl.textContent = opt.label; this._textEl.style.color=''; }
    else { this._textEl.textContent = this.placeholder; this._textEl.style.color='var(--text-3)'; }
  }
  _positionDropdown() {
    const rect = this._displayEl.getBoundingClientRect();
    const drop = this._dropdownEl;
    drop.style.minWidth = Math.max(rect.width, 200) + 'px';
    drop.style.maxWidth = Math.max(rect.width, 320) + 'px';
    const spaceBelow = window.innerHeight - rect.bottom;
    const dropH = 280;
    if (spaceBelow >= dropH || spaceBelow >= 160) {
      drop.style.top = (rect.bottom + window.scrollY + 3) + 'px';
      drop.style.bottom = '';
    } else {
      drop.style.bottom = (window.innerHeight - rect.top + 3) + 'px';
      drop.style.top = '';
    }
    drop.style.left = Math.max(0, rect.left + window.scrollX) + 'px';
  }
  open() {
    // close any other open ss dropdowns
    document.querySelectorAll('.ss-dropdown.open').forEach(d=>{ if(d!==this._dropdownEl) d.classList.remove('open'); });
    document.querySelectorAll('.ss-display.open').forEach(d=>{ if(d!==this._displayEl) d.classList.remove('open'); });
    this._open = true;
    this._dropdownEl.classList.add('open');
    this._displayEl.classList.add('open');
    this._positionDropdown();
    this._searchEl.value = '';
    this._filter('');
    // scroll selected into view
    const sel = this._listEl.querySelector('.ss-option.selected');
    if(sel) setTimeout(()=>sel.scrollIntoView({block:'nearest'}),0);
    setTimeout(()=>this._searchEl.focus(),30);
    document.addEventListener('mousedown', this._outsideHandler);
    document.addEventListener('scroll', ()=>this._open&&this._positionDropdown(), {passive:true, once:false});
  }
  close() {
    this._open = false;
    this._dropdownEl.classList.remove('open');
    this._displayEl.classList.remove('open');
    document.removeEventListener('mousedown', this._outsideHandler);
  }
  setValue(v, silent=false) {
    this.value = v;
    this._updateDisplay();
    this._listEl.querySelectorAll('.ss-option').forEach(el=>el.classList.toggle('selected', el.dataset.value===v));
    if(!silent && this.onChange) this.onChange(v);
  }
  getValue() { return this.value; }
  updateOptions(options, newValue) {
    this.options = options;
    if(newValue!==undefined) this.value = newValue;
    this._buildOptions();
    this._updateDisplay();
  }
  destroy() { if(this._dropdownEl) this._dropdownEl.remove(); }
  applyClass(cls) {
    // remove existing oc-* classes
    this._displayEl.className = this._displayEl.className.replace(/\boc-\w+/g,'').trim();
    if(cls) this._displayEl.classList.add(cls);
  }
}

function newItem(name){
  const item={id:String(_idCounter++),name:name||'未命名装备',config:{baseCost:0,vaalCost:2,d2c:0,equipType:'helmet'},entries:[],notes:[]};
  store.items.push(item);saveStore();return item;
}
function getItem(id){return store.items.find(i=>i.id===id);}
function getActive(){return getItem(activeItemId);}
function deleteItem(id){
  store.items=store.items.filter(i=>i.id!==id);
  if(activeItemId===id)activeItemId=store.items.length>0?store.items[0].id:null;
  saveStore();
}

// ── SIDEBAR ──
function renderSidebar(filterQ=''){
  const list=document.getElementById('itemList');
  let items=store.items;
  if(filterQ){items=items.filter(i=>i.name.toLowerCase().includes(filterQ));}
  if(items.length===0){
    list.innerHTML=filterQ
      ?`<div style="padding:16px 10px;font-size:12px;color:var(--text-3);text-align:center;">没有匹配的装备</div>`
      :`<div style="padding:16px 10px;font-size:12px;color:var(--text-3);text-align:center;white-space:nowrap;overflow:hidden;">还没有装备记录<br>点击下方按钮新建</div>`;
    return;
  }
  list.innerHTML=items.map(item=>{
    const isActive=item.id===activeItemId;
    const profit=calcItemProfit(item);
    const profitStr=profit===null?'':((profit>=0?'+':'')+profit.toFixed(1)+'D');
    const profitColor=profit===null?'':(profit>=0?'var(--green)':'var(--red)');
    const total=item.entries.length;
    let metaStr='暂无记录';
    if(total>0){
      // 腐化成功率
      const goodCount=item.entries.filter(e=>e.outcome==='good').length;
      const successRate=(goodCount/total*100).toFixed(0);
      // 利润率：总利润 / 总成本
      const{baseCost=0,vaalCost=2,d2c=0,baseCostUnit='D',vaalCostUnit='D'}=item.config;
      const toD=(val,unit)=>(unit==='C'&&d2c>0?val/d2c:val);
      const costPerD=toD(baseCost,baseCostUnit)+toD(vaalCost,vaalCostUnit);
      const totalCost=costPerD*total;
      const roiStr=totalCost>0?((profit/totalCost*100).toFixed(0)+'%'):'—';
      const roiColor=profit===null?'var(--text-3)':(profit>=0?'var(--green)':'var(--red)');
      metaStr=`${total}次(成功${successRate}%) · <span style="color:${roiColor}">利润率${roiStr}</span>${profitStr?` · <span style="color:${profitColor}">${profitStr}</span>`:''}`;
    }
    const avatar=escHtml((item.name||'?').charAt(0).toUpperCase());
    return `<div class="item-entry ${isActive?'active':''}" data-id="${item.id}" data-tip="${escHtml(item.name)}">
      <div class="item-avatar">${avatar}</div>
      <button class="item-entry-btn" onclick="switchItem('${item.id}')">
        <div class="item-entry-name">${escHtml(item.name)}</div>
        <div class="item-entry-meta">${metaStr}</div>
      </button>
      <button class="item-del-btn" onclick="confirmDeleteItem('${item.id}')" title="删除">✕</button>
    </div>`;
  }).join('');
}

function calcItemProfit(item){
  if(!item.entries||item.entries.length===0)return null;
  const{baseCost=0,vaalCost=2,d2c=0,baseCostUnit='D',vaalCostUnit='D'}=item.config;
  const toD=(val,unit)=>(unit==='C'&&d2c>0?val/d2c:val);
  const costPerD=toD(baseCost,baseCostUnit)+toD(vaalCost,vaalCostUnit);
  let profit=0;
  item.entries.forEach(e=>{
    const isDead=e.outcome==='dead';
    const rawPrice=isDead?0:(parseFloat(e.price)||0);
    const revD=isDead?0:(e.unit==='C'&&d2c>0?rawPrice/d2c:rawPrice);
    profit+=revD-costPerD;
  });
  return profit;
}

function switchItem(id){activeItemId=id;renderAll();}
function confirmDeleteItem(id){
  const item=getItem(id);if(!item)return;
  openDangerModal(
    `删除装备「${item.name}」`,
    `将永久删除该装备的所有腐化记录、配置和备注，共 ${item.entries.length} 条记录。此操作不可撤销。`,
    ()=>{deleteItem(id);renderAll();}
  );
}

// ── TABS ──
function switchTab(tab){
  // redirect knowledge to affixes sub-tab
  if(tab==='knowledge'){switchTab('affixes');setTimeout(()=>switchAffixSubTab('knowledge'),0);return;}
  // redirect notes to guide tab, then switch sub-tab
  if(tab==='notes'){
    activeTab='notes';
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab==='guide'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.dataset.panel==='guide'));
    setTimeout(()=>switchGuideSubTab('notes'),0);
    return;
  }
  activeTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.dataset.panel===tab));
  if(tab==='guide'){setTimeout(()=>switchGuideSubTab('guide'),0);}
  if(tab==='affixes') setTimeout(calcAffixProb,0);
  if(tab==='sim') setTimeout(()=>renderSimPanel(),0);
}
function switchGuideSubTab(sub,btn){
  const container=document.getElementById('guideNotesPanel');if(!container)return;
  container.querySelectorAll('.sub-tab-btn').forEach(b=>{
    const isGuide=b.textContent.includes('引导');
    b.classList.toggle('active',(sub==='guide'&&isGuide)||(sub==='notes'&&!isGuide));
  });
  container.querySelectorAll('.sub-tab-panel').forEach(p=>p.classList.toggle('active',p.id==='guideSubPanel_'+sub));
  if(sub==='notes') renderNotesList();
}
function switchAffixSubTab(sub,btn){
  const container=document.getElementById('affixesPanel');if(!container)return;
  container.querySelectorAll('.sub-tab-btn').forEach(b=>b.classList.toggle('active',b===btn));
  container.querySelectorAll('.sub-tab-panel').forEach(p=>p.classList.toggle('active',p.id==='affixSubPanel_'+sub));
  if(sub==='affixes') setTimeout(calcAffixProb,0);
  if(sub==='gem') setTimeout(calcGemVaal,0);
  if(sub==='knowledge') setTimeout(calcGemProb,0);
}

function addRow(entry,isRestore){
  const item=getActive();if(!item)return;
  const isNew=!entry;
  if(isNew){
    entry={id:String(_idCounter++),name:'',outcome:'good',price:'',unit:'D'};
    item.entries.push(entry);saveStore();
  }
  if(!entry.unit)entry.unit='D';
  const tbody=document.getElementById('entryBody');if(!tbody)return;
  if(!isRestore){const em=tbody.querySelector('tr:not([data-id])');if(em)em.remove();}
  const tr=document.createElement('tr');tr.dataset.id=String(entry.id);

  const tdN=document.createElement('td');tdN.className='row-num';tr.appendChild(tdN);

  const tdName=document.createElement('td');
  const nameInp=document.createElement('input');
  nameInp.type='text';nameInp.className='row-inp inp-left';nameInp.placeholder='名称';nameInp.value=entry.name||'';
  nameInp.addEventListener('input',()=>mutateEntry(entry.id,'name',nameInp.value));
  tdName.appendChild(nameInp);tr.appendChild(tdName);

  const tdOC=document.createElement('td');
  const ocWrap=document.createElement('div');ocWrap.className='ss-wrap';
  const ocOpts=Object.entries(OUTCOMES).map(([k,v])=>({value:k,label:v.label}));
  const ocSS=new SearchableSelect(ocWrap,ocOpts,(v)=>{
    applyOutcomeSS(ocSS,v);
    mutateEntry(entry.id,'outcome',v);
    if(v==='dead'){priceInp.value='';mutateEntry(entry.id,'price',0);}
    // show/hide affix pill
    tdAffixCell.style.display=v==='good'?'':'';
    updateAffixPill();
    recalcAll();renderSidebar();
  },{placeholder:'选择结果',initialValue:entry.outcome||'good'});
  applyOutcomeSS(ocSS,entry.outcome||'good');
  tdOC.appendChild(ocWrap);tr.appendChild(tdOC);

  const tdUnit=document.createElement('td');
  const unitWrap=document.createElement('div');unitWrap.className='ss-wrap';
  const unitOpts=[{value:'D',label:'D'},{value:'C',label:'C'}];
  const unitSS=new SearchableSelect(unitWrap,unitOpts,(v)=>{
    applyUnitSS(unitSS,v);
    mutateEntry(entry.id,'unit',v);recalcAll();renderSidebar();
  },{placeholder:'D',initialValue:entry.unit||'D'});
  applyUnitSS(unitSS,entry.unit||'D');
  tdUnit.appendChild(unitWrap);tr.appendChild(tdUnit);

  const tdPrice=document.createElement('td');
  const priceInp=document.createElement('input');
  priceInp.type='number';priceInp.className='row-inp inp-num';priceInp.placeholder='0';priceInp.min='0';priceInp.step='0.01';
  priceInp.value=(entry.price!==undefined&&entry.price!=='')?entry.price:'';
  priceInp.addEventListener('input',()=>{mutateEntry(entry.id,'price',parseFloat(priceInp.value)||0);recalcAll();renderSidebar();});
  tdPrice.appendChild(priceInp);tr.appendChild(tdPrice);

  ['td-revc','td-base','td-vaal','td-cost','td-rev','td-profit'].forEach(cn=>{
    const td=document.createElement('td');td.className=cn;td.textContent='—';td.style.fontSize='12px';tr.appendChild(td);
  });

  // ── 词缀 pill 列 ──
  const tdAffixCell=document.createElement('td');tdAffixCell.style.textAlign='center';
  const affixBtn=document.createElement('button');
  affixBtn.className='affix-pill-btn';
  affixBtn.title='点击记录腐化词缀';
  function updateAffixPill(){
    const hasA=entry.affix1||entry.affix2;
    affixBtn.className='affix-pill-btn'+(hasA?' has-affix':'');
    if(hasA){
      const aff=getEquipAffixes();
      const a1=aff.affixes.find(a=>a.id===entry.affix1);
      const a2=aff.affixes.find(a=>a.id===entry.affix2);
      const names=[a1?.name,a2?.name].filter(Boolean).map(n=>n.length>8?n.slice(0,8)+'…':n);
      affixBtn.innerHTML=`<span class="pill-dot"></span>${escHtml(names.join(' / '))||'词缀已记录'}`;
    } else {
      const isGood=(entry.outcome||'good')==='good';
      affixBtn.innerHTML=`<span class="pill-dot empty"></span>${isGood?'记录词缀':'—'}`;
      affixBtn.style.opacity=isGood?'1':'0.3';
      affixBtn.style.pointerEvents=isGood?'':'none';
    }
  }
  updateAffixPill();
  affixBtn.addEventListener('click',(e)=>{
    e.stopPropagation();
    openAffixPopover(entry,affixBtn,updateAffixPill);
  });
  tdAffixCell.appendChild(affixBtn);
  tr.appendChild(tdAffixCell);

  const tdDel=document.createElement('td');
  const delBtn=document.createElement('button');delBtn.className='del-btn';delBtn.textContent='✕';delBtn.title='删除';
  delBtn.addEventListener('click',()=>{
    item.entries=item.entries.filter(e=>e.id!==entry.id);saveStore();tr.remove();reIndex();
    const tb=document.getElementById('entryBody');
    if(tb&&!tb.querySelector('tr[data-id]'))showEmpty();
    recalcAll();renderSidebar();
  });
  tdDel.appendChild(delBtn);tr.appendChild(tdDel);

  tbody.appendChild(tr);
  reIndex();recalcAll();
  if(isNew)tr.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── AFFIX POPOVER ──
let _affixPopoverSS1=null,_affixPopoverSS2=null,_affixPopoverCloseHandler=null;
function openAffixPopover(entry,anchorBtn,onUpdate){
  closeAffixPopover();
  const pop=document.getElementById('affixPopover');
  const aff=getEquipAffixes();
  const affOpts=[{value:'',label:'— 请选择词缀 —'},...aff.affixes.map(a=>({value:a.id,label:a.name+' （权重'+a.weight+'）'}))];
  // build SS1
  const w1=document.getElementById('affixPop_ss1');
  const w2=document.getElementById('affixPop_ss2');
  w1.innerHTML='';w2.innerHTML='';
  _affixPopoverSS1=new SearchableSelect(w1,affOpts,(v)=>{
    mutateEntry(entry.id,'affix1',v);if(onUpdate)onUpdate();
  },{placeholder:'— 请选择词缀①（可选）—',initialValue:entry.affix1||''});
  _affixPopoverSS2=new SearchableSelect(w2,affOpts,(v)=>{
    mutateEntry(entry.id,'affix2',v);if(onUpdate)onUpdate();
  },{placeholder:'— 请选择词缀②（可选）—',initialValue:entry.affix2||''});
  // position
  pop.classList.add('open');
  const rect=anchorBtn.getBoundingClientRect();
  const popW=520;
  let left=rect.left;
  if(left+popW>window.innerWidth-12) left=window.innerWidth-popW-12;
  if(left<8) left=8;
  const spaceBelow=window.innerHeight-rect.bottom;
  if(spaceBelow>=160){
    pop.style.top=(rect.bottom+window.scrollY+6)+'px';
    pop.style.bottom='';
  } else {
    pop.style.bottom=(window.innerHeight-rect.top+6)+'px';
    pop.style.top='';
  }
  pop.style.left=left+'px';
  // outside click to close — ignore clicks inside ss-dropdown (appended to body)
  _affixPopoverCloseHandler=(e)=>{
    if(pop.contains(e.target)) return;
    if(e.target===anchorBtn||anchorBtn.contains(e.target)) return;
    if(e.target.closest('.ss-dropdown')) return;
    closeAffixPopover();
  };
  setTimeout(()=>document.addEventListener('mousedown',_affixPopoverCloseHandler),50);
}
function closeAffixPopover(){
  const pop=document.getElementById('affixPopover');
  if(!pop)return;
  pop.classList.remove('open');
  if(_affixPopoverSS1){_affixPopoverSS1.destroy();_affixPopoverSS1=null;}
  if(_affixPopoverSS2){_affixPopoverSS2.destroy();_affixPopoverSS2=null;}
  if(_affixPopoverCloseHandler){document.removeEventListener('mousedown',_affixPopoverCloseHandler);_affixPopoverCloseHandler=null;}
}
function mutateEntry(entryId,key,val){const item=getActive();if(!item)return;const e=item.entries.find(e=>e.id===entryId);if(e){e[key]=val;saveStore();}}
function reIndex(){const tb=document.getElementById('entryBody');if(!tb)return;let idx=0;tb.querySelectorAll('tr[data-id]').forEach(r=>{const c=r.querySelector('.row-num');if(c)c.textContent=++idx;});}
