// ── RECALC ──
function pct(a,b){return b===0?'0%':(a/b*100).toFixed(1)+'%';}
function recalcAll(){
  const item=getActive();if(!item)return;
  const baseCostRaw=parseFloat(document.getElementById('g_baseCost')?.value)??item.config.baseCost??0;
  const vaalCostRaw=parseFloat(document.getElementById('g_vaalCost')?.value)??item.config.vaalCost??2;
  const baseCostUnit=item.config.baseCostUnit||'D';
  const vaalCostUnit=item.config.vaalCostUnit||'D';
  const d2c=item.config.d2c||0;
  // convert to D for calculation
  const toD=(val,unit)=>(unit==='C'&&d2c>0?val/d2c:val);
  const baseCostD=toD(baseCostRaw,baseCostUnit);
  const vaalCostD=toD(vaalCostRaw,vaalCostUnit);
  const costPerD=baseCostD+vaalCostD;
  // display strings
  const fmtCost=(val,unit)=>unit==='C'?val.toFixed(2)+'C'+(d2c>0?' ('+toD(val,unit).toFixed(2)+'D)':'⚠无汇率'):val.toFixed(2)+'D';
  let tot={n:0,good:0,dead:0,safe:0,white:0,profit:0};
  const tb=document.getElementById('entryBody');if(!tb)return;
  tb.querySelectorAll('tr[data-id]').forEach(tr=>{
    const id=tr.dataset.id;const entry=item.entries.find(e=>e.id===id);if(!entry)return;
    const isDead=entry.outcome==='dead';
    const rawPrice=isDead?0:(parseFloat(entry.price)||0);
    const unit=entry.unit||'D';
    let revD=isDead?0:(unit==='C'&&d2c>0?rawPrice/d2c:rawPrice);
    const profit=revD-costPerD;
    const revcTd=tr.querySelector('.td-revc');
    if(isDead){revcTd.textContent='—';revcTd.className='td-revc';revcTd.style.color='';}
    else if(unit==='C'&&d2c>0){revcTd.textContent=revD.toFixed(2)+'D';revcTd.className='td-revc cell-conv';}
    else if(unit==='C'){revcTd.textContent=rawPrice+'C⚠';revcTd.className='td-revc';revcTd.style.color='#e67e22';}
    else{revcTd.textContent='—';revcTd.className='td-revc';revcTd.style.color='';}
    tr.querySelector('.td-base').textContent=fmtCost(baseCostRaw,baseCostUnit);
    tr.querySelector('.td-vaal').textContent=fmtCost(vaalCostRaw,vaalCostUnit);
    const cTd=tr.querySelector('.td-cost');cTd.textContent=costPerD.toFixed(2)+'D';cTd.className='td-cost cell-cost';
    const rTd=tr.querySelector('.td-rev');rTd.textContent=isDead?'0D':revD.toFixed(2)+'D';rTd.className='td-rev cell-rev';
    const pTd=tr.querySelector('.td-profit');pTd.textContent=(profit>=0?'+':'')+profit.toFixed(2)+'D';pTd.className='td-profit '+(profit>=0?'cell-p-pos':'cell-p-neg');
    tot.n++;tot[entry.outcome]=(tot[entry.outcome]||0)+1;tot.profit+=profit;
  });
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('s_total',tot.n);set('s_good',tot.good||0);set('s_good_pct',pct(tot.good||0,tot.n));
  set('s_dead',tot.dead||0);set('s_dead_pct',pct(tot.dead||0,tot.n));
  set('s_safe',tot.safe||0);set('s_safe_pct',pct(tot.safe||0,tot.n));
  set('s_white',tot.white||0);set('s_white_pct',pct(tot.white||0,tot.n));
  const pEl=document.getElementById('s_profit');
  if(pEl){pEl.textContent=(tot.profit>=0?'+':'')+tot.profit.toFixed(2)+'D';pEl.style.color=tot.profit>=0?'var(--green)':'var(--red)';}
  set('s_profit_per',tot.n>0?'均 '+(tot.profit/tot.n).toFixed(2)+'D/次':'均 0D/次');
  const t=tot.n||1;
  const bset=(id,v)=>{const el=document.getElementById(id);if(el)el.style.width=v;};
  bset('bar_good',pct(tot.good||0,t));bset('bar_safe',pct(tot.safe||0,t));bset('bar_white',pct(tot.white||0,t));bset('bar_dead',pct(tot.dead||0,t));
  renderLuckAnalysis();
}

// ── LUCK ANALYSIS ──
function renderLuckAnalysis(){
  const el=document.getElementById('luckAnalysis');if(!el)return;
  const item=getActive();if(!item||!item.entries||item.entries.length===0){
    el.innerHTML=`<div class="luck-card"><div class="luck-insufficient">暂无腐化记录，添加记录后自动生成运气分析</div></div>`;return;
  }
  const n=item.entries.length;
  if(n<3){
    el.innerHTML=`<div class="luck-card"><div class="luck-insufficient">至少需要 3 次腐化记录才能进行有效分析（当前 ${n} 次）</div></div>`;return;
  }

  // ── 期望值（双瓦腐化概率）──
  // 成功25% 装备消失25% 已腐化25% 全白孔25%
  const EXP={good:0.25,dead:0.25,safe:0.25,white:0.25};
  const actual={
    good:item.entries.filter(e=>e.outcome==='good').length,
    dead:item.entries.filter(e=>e.outcome==='dead').length,
    safe:item.entries.filter(e=>e.outcome==='safe').length,
    white:item.entries.filter(e=>e.outcome==='white').length,
  };
  const actRate={good:actual.good/n,dead:actual.dead/n,safe:actual.safe/n,white:actual.white/n};

  // ── 成本计算 ──
  const{baseCost=0,vaalCost=2,d2c=0,baseCostUnit='D',vaalCostUnit='D'}=item.config;
  const toD=(val,unit)=>(unit==='C'&&d2c>0?val/d2c:val);
  const costPerD=toD(baseCost,baseCostUnit)+toD(vaalCost,vaalCostUnit);
  const totalCost=costPerD*n;

  // ── 实际收益 ──
  let totalRev=0;
  item.entries.forEach(e=>{
    const isDead=e.outcome==='dead';
    const rawPrice=isDead?0:(parseFloat(e.price)||0);
    totalRev+=isDead?0:(e.unit==='C'&&d2c>0?rawPrice/d2c:rawPrice);
  });
  const totalProfit=totalRev-totalCost;
  const avgProfitPer=totalProfit/n;

  // ── 期望收益（假设所有成功都按平均成交价卖出）──
  // 取已有成功记录的平均售价来估算期望
  const goodEntries=item.entries.filter(e=>e.outcome==='good'&&(parseFloat(e.price)||0)>0);
  const avgGoodRev=goodEntries.length>0
    ?goodEntries.reduce((s,e)=>{const r=parseFloat(e.price)||0;return s+(e.unit==='C'&&d2c>0?r/d2c:r);},0)/goodEntries.length
    :0;
  const expRevPerTrial=EXP.good*avgGoodRev;
  const expProfitPerTrial=expRevPerTrial-costPerD;
  const expTotalProfit=expProfitPerTrial*n;

  // ── 与期望的偏差（z-score 简化版）──
  // 各结果与期望次数的偏差
  const devGood=actual.good-EXP.good*n;
  const devDead=actual.dead-EXP.dead*n;
  const devSafe=actual.safe-EXP.safe*n;
  const devWhite=actual.white-EXP.white*n;

  // ── 综合运气评分（-100 ~ +100）──
  // 成功多 = 好运，消失多 = 坏运
  const luckScore=((devGood-devDead)/Math.max(1,Math.sqrt(n)))*20;
  const clampedScore=Math.max(-100,Math.min(100,luckScore));

  // ── 评级 ──
  let verdict,verdictCls,emoji,titleText,subText;
  if(clampedScore>=40){
    verdict='天选流放者';verdictCls='lv-godlike';emoji='🌟';
    titleText=randPick(['你的运气已经越界了，这不科学！','瓦尔：我不是故意让你成功这么多次的。','混沌之神赛勒斯亲自为你掷骰子！']);
    subText=randPick(['成功率严重超标，建议今天别出门，把运气留着用。','你身上一定有传奇级光环，快去交易所卖装备！','这种成功率，连首领都会对你竖大拇指。']);
  } else if(clampedScore>=20){
    verdict='小欧附体';verdictCls='lv-great';emoji='😊';
    titleText=randPick(['不错不错，命运女神今天没有忽视你！','成功率高于预期，可喜可贺！','欧皇预备役，继续冲！']);
    subText=randPick(['手气来了就要把握住，不要犹豫！','稍微欧了一下，但还没到登基的程度。','继续保持，说不定下一批直接封神！']);
  } else if(clampedScore>=5){
    verdict='微有天命';verdictCls='lv-good';emoji='🙂';
    titleText=randPick(['运气偏好，没啥好说的，继续冲。','略有小运，尚在正常波动范围。','比上不足比下有余，中庸之道。']);
    subText=randPick(['不够欧，但也不惨，再接再厉。','小幅领先，也许下一批就起飞了。','平稳发展，量变引发质变！']);
  } else if(clampedScore>=-5){
    verdict='凡人之躯';verdictCls='lv-avg';emoji='😐';
    titleText=randPick(['中规中矩，跟期望值高度吻合。','RNG一视同仁，你就是那个"平均人"。','既不欧也不非，你是概率理论的完美诠释。']);
    subText=randPick(['恭喜你，成为了统计学课本上的标准案例。','没有高光也没有惨剧，活得最真实的那种。','数学老师看了会点头：这就是期望值。']);
  } else if(clampedScore>=-20){
    verdict='倒霉蛋';verdictCls='lv-bad';emoji='😕';
    titleText=randPick(['消失率有点高，瓦尔在收礼？','运气略差，但还没到写遗书的程度。','属于"倒霉但能接受"的那种。']);
    subText=randPick(['装备消失多了点，建议先拜拜玛娜神像。','比期望差一些，但别放弃，概率会回归的！','统计学说：你欠的运气，迟早会还回来的。']);
  } else if(clampedScore>=-40){
    verdict='非酋候选';verdictCls='lv-bad';emoji='😣';
    titleText=randPick(['运气明显差于平均，瓦尔表示：不客气！','这消失率……装备比你更怕腐化。','建议换个装备试试，也许是装备跟你不合。']);
    subText=randPick(['已经到了"需要心理建设"的程度了。','连续倒霉不是你的错，是瓦尔的错！','每次腐化前建议深呼吸三次，然后还是会消失。']);
  } else {
    verdict='非酋本酋';verdictCls='lv-terrible';emoji='💀';
    titleText=randPick(['恭喜你，成功打破了统计学常识！','这运气，混沌之神都不好意思看。','瓦尔神殿今天吃撑了，都是你贡献的。']);
    subText=randPick(['这种运气出现的概率比腐化成功还低，你太厉害了（不是好的那种）。','建议今天先下线，明天再来，给概率一个回归的机会。','你的装备已经在瓦尔神殿里安家落户了，希望它们过得好。']);
  }

  // ── 连续最长消失 ──
  let maxDeadStreak=0,curDeadStreak=0,maxGoodStreak=0,curGoodStreak=0;
  item.entries.forEach(e=>{
    if(e.outcome==='dead'){curDeadStreak++;maxDeadStreak=Math.max(maxDeadStreak,curDeadStreak);curGoodStreak=0;}
    else curDeadStreak=0;
    if(e.outcome==='good'){curGoodStreak++;maxGoodStreak=Math.max(maxGoodStreak,curGoodStreak);curDeadStreak=0;}
    else if(e.outcome!=='dead') curGoodStreak=0;
  });

  // ── 盈利次数 ──
  const profitableCount=item.entries.filter(e=>{
    const isDead=e.outcome==='dead';
    const r=isDead?0:(parseFloat(e.price)||0);
    const revD=isDead?0:(e.unit==='C'&&d2c>0?r/d2c:r);
    return revD-costPerD>0;
  }).length;

  // ── helpers ──
  const fmt2=(v)=>(v>=0?'+':'')+v.toFixed(2)+'D';
  const fmtPct=(v)=>(v*100).toFixed(1)+'%';
  const deltaHtml=(val,suffix='次',invertColor=false)=>{
    const v=Math.round(Math.abs(val)*10)/10;
    const pos=invertColor?(val<0):(val>=0);
    const cls=Math.abs(val)<0.5?'neu':pos?'pos':'neg';
    const sign=val>=0?'+':'-';
    return `<span class="lrv-delta ${cls}">${sign}${v}${suffix}</span>`;
  };
  const barHtml=(actual,expected,color,max)=>{
    const aPct=Math.min(100,actual/max*100);
    const ePct=Math.min(100,expected/max*100);
    return `<div class="luck-bar-wrap"><div class="luck-bar-bg">
      <div class="luck-bar-fill" style="width:${aPct}%;background:${color};"></div>
      <div class="luck-bar-marker" style="left:${ePct}%;" title="期望值"></div>
    </div></div>`;
  };
  const maxBar=Math.max(n,1);

  // ── 有趣建议（根据数据动态生成）──
  const advices=[];
  if(actRate.dead>0.35){
    advices.push(randPick([
      `装备消失率高达 ${fmtPct(actRate.dead)}，已超出正常范围。瓦尔神殿又收到了 ${(actual.dead-EXP.dead*n).toFixed(1)} 件"额外捐赠"，馆长表示感谢。`,
      `消失率 ${fmtPct(actRate.dead)}，意味着你每腐化3件就要跟1件说再见，建议先用你最讨厌的装备试手气。`,
    ]));
  }
  if(actRate.good<0.18){
    advices.push(randPick([
      `成功率仅 ${fmtPct(actRate.good)}，比25%期望低了 ${Math.abs(devGood).toFixed(1)} 次。大数定律说：概率欠你的，迟早要还，坚持就是胜利（也许）。`,
      `只有 ${fmtPct(actRate.good)} 的成功率？放心，概率学教授说这叫"短期波动"，听起来很有安慰感，实际上你就是运气差。`,
    ]));
  }
  if(actRate.good>0.35){
    advices.push(randPick([
      `成功率高达 ${fmtPct(actRate.good)}！比期望高了 ${devGood.toFixed(1)} 次！趁手气好赶紧多腐化几件，别浪费这波运气！`,
      `${fmtPct(actRate.good)} 的成功率，你今天是整个服务器最幸运的流放者之一，建议今晚庆功！`,
    ]));
  }
  if(maxDeadStreak>=3){
    advices.push(randPick([
      `检测到最长连续消失 ${maxDeadStreak} 次！这已经是"诅咒级别"的连锁了。建议去玛娜神像前磕三个响头再来。`,
      `连续消失 ${maxDeadStreak} 次，你身上是不是装备了"减少幸运"词缀？每次腐化都是独立事件，概率不会"补偿"你，但你可以再试试。`,
    ]));
  }
  if(maxGoodStreak>=3){
    advices.push(randPick([
      `最长连续成功 ${maxGoodStreak} 次！这是神迹！连奥克亚那托都要叫你一声"前辈"！`,
      `连续成功 ${maxGoodStreak} 次，你的腐化手法已经出神入化，建议开直播教学，一定有很多人愿意学。`,
    ]));
  }
  if(totalProfit<0&&n>=5){
    advices.push(randPick([
      `目前总亏损 ${Math.abs(totalProfit).toFixed(2)}D，瓦尔神殿今天盈利喜人，你贡献了重要力量。建议确认成本配置是否正确，别让计算误导了你。`,
      `亏了 ${Math.abs(totalProfit).toFixed(2)}D，听起来很多，但请记住：这是游戏，是娱乐，是……好吧，还是挺心疼的。`,
    ]));
  }
  if(totalProfit>0&&n>=5){
    advices.push(randPick([
      `盈利 ${totalProfit.toFixed(2)}D！你成功地从腐化市场榨取了价值，继续扩大战果，今天也许能成为联赛首富！`,
      `总利润 +${totalProfit.toFixed(2)}D，这是赚到了！快去交易所挂单，别在这里数钱了！`,
    ]));
  }
  if(costPerD===0){
    advices.push('提醒：当前未配置成本，所有利润显示为"假数据"。快去配置页填写装备成本和双瓦成本，让数据真实起来！');
  }
  if(n<10){
    advices.push(`样本量仅 ${n} 次，这就像用一张地图来判断你的角色强不强——没有说服力。建议积累 20 次以上再下结论，目前只是"感觉"。`);
  }
  if(goodEntries.length===0&&actual.good>0){
    advices.push(`${actual.good} 次成功但没有填售价！没有价格数据就没有利润分析！快去补录，你的装备值多少钱，计算器想知道！`);
  }
  if(advices.length===0){
    advices.push(randPick([
      '各项数据中规中矩，继续积累记录，让大数据告诉你真实的运气状况。放心，它不会说谎的（概率也不会）。',
      '一切正常，腐化事业蒸蒸日上。瓦尔看着你的数据，沉默地点了点头。',
      '数据健康，没有异常。这说明要么你运气普通，要么你的样本量还不够大——继续冲！',
    ]));
  }

  el.innerHTML=`
  <div class="luck-card">
    <div class="luck-header">
      <div class="luck-emoji">${emoji}</div>
      <div>
        <div class="luck-title">${titleText}</div>
        <div class="luck-subtitle">${subText}</div>
      </div>
      <div class="luck-verdict ${verdictCls}">${verdict}</div>
    </div>
    <div class="luck-rows">
      <div class="luck-row">
        <div class="luck-row-head">
          <div class="luck-row-label">✦ 腐化成功率</div>
          <div class="luck-row-vals">
            <span class="lrv-actual" style="color:var(--green)">${fmtPct(actRate.good)}</span>
            <span class="lrv-sep">vs</span>
            <span class="lrv-expected">期望 25%</span>
            ${deltaHtml(devGood)}
          </div>
        </div>
        ${barHtml(actual.good,EXP.good*n,'var(--green)',maxBar)}
        <div class="luck-row-desc">实际成功 <b>${actual.good}</b> 次，期望 <b>${(EXP.good*n).toFixed(1)}</b> 次，${devGood>=0?`多了 ${devGood.toFixed(1)} 次意外之喜`:`少了 ${Math.abs(devGood).toFixed(1)} 次，有点可惜`}。连续最长成功 <b>${maxGoodStreak}</b> 次。</div>
      </div>
      <div class="luck-row">
        <div class="luck-row-head">
          <div class="luck-row-label">✕ 装备消失率</div>
          <div class="luck-row-vals">
            <span class="lrv-actual" style="color:var(--red)">${fmtPct(actRate.dead)}</span>
            <span class="lrv-sep">vs</span>
            <span class="lrv-expected">期望 25%</span>
            ${deltaHtml(devDead,'次',true)}
          </div>
        </div>
        ${barHtml(actual.dead,EXP.dead*n,'var(--red)',maxBar)}
        <div class="luck-row-desc">实际消失 <b>${actual.dead}</b> 次，期望 <b>${(EXP.dead*n).toFixed(1)}</b> 次，${devDead>0?`多损失了 ${devDead.toFixed(1)} 件装备，心在滴血`:`少了 ${Math.abs(devDead).toFixed(1)} 次，装备保住了`}。连续最长消失 <b>${maxDeadStreak}</b> 次。</div>
      </div>
      <div class="luck-row">
        <div class="luck-row-head">
          <div class="luck-row-label">◈ 已腐化（无变化）</div>
          <div class="luck-row-vals">
            <span class="lrv-actual" style="color:var(--amber)">${fmtPct(actRate.safe)}</span>
            <span class="lrv-sep">vs</span>
            <span class="lrv-expected">期望 25%</span>
            ${deltaHtml(devSafe)}
          </div>
        </div>
        ${barHtml(actual.safe,EXP.safe*n,'var(--amber)',maxBar)}
        <div class="luck-row-desc">装备已腐化但词缀未改变，实际 <b>${actual.safe}</b> 次，期望 <b>${(EXP.safe*n).toFixed(1)}</b> 次。属于"不亏不赚"结果，至少保住了装备。</div>
      </div>
      <div class="luck-row">
        <div class="luck-row-head">
          <div class="luck-row-label">○ 全白孔率</div>
          <div class="luck-row-vals">
            <span class="lrv-actual" style="color:#dcdcdc">${fmtPct(actRate.white)}</span>
            <span class="lrv-sep">vs</span>
            <span class="lrv-expected">期望 25%</span>
            ${deltaHtml(devWhite,'次',true)}
          </div>
        </div>
        ${barHtml(actual.white,EXP.white*n,'#9ab','#9ab'&&maxBar)}
        <div class="luck-row-desc">技能孔全部变白，实际 <b>${actual.white}</b> 次，期望 <b>${(EXP.white*n).toFixed(1)}</b> 次。全白孔装备可重新镶孔，有时也会带来转机。</div>
      </div>
      <div class="luck-row">
        <div class="luck-row-head">
          <div class="luck-row-label">💰 盈利次数与利润率</div>

          </div>
        </div>

// ── GEM PROBABILITY CALC ──
function calcGemProb(){
  const n=Math.max(1,parseInt(document.getElementById('gem_n')?.value)||1);
  const lvl=Math.max(1,Math.min(21,parseInt(document.getElementById('gem_lvl')?.value)||20));

  // 25% chance to change level, then 50/50 up/down
  // if already lvl 21, can't go higher, so effectively p_up=0
  // P(+1 in single attempt) = 0.25 * 0.5 = 0.125, unless already max
  const pSingle = lvl>=21 ? 0 : 0.125;

  // P(at least one success in n tries) = 1 - (1 - pSingle)^n
  const pAtLeast = pSingle>0 ? 1 - Math.pow(1-pSingle, n) : 0;

  // Expected attempts to get +1: 1/pSingle
  const expected = pSingle>0 ? (1/pSingle) : Infinity;

  const fmt=(v)=>(v*100).toFixed(2)+'%';

  const s=document.getElementById('gem_single');
  const a=document.getElementById('gem_atleast');
  const e=document.getElementById('gem_expected');

  if(s) s.textContent = lvl>=21 ? '0%（已满级）' : fmt(pSingle);
  if(a){
    a.textContent = lvl>=21 ? '0%' : fmt(pAtLeast);
    a.style.color = pAtLeast>0.8?'var(--green)':pAtLeast>0.4?'var(--amber)':'var(--accent)';
  }
  if(e) e.textContent = lvl>=21 ? '∞' : expected.toFixed(1)+'次';
}

// ── AFFIX PROBABILITY CALC ──
function calcAffixProb(){
  const item=getActive();
  const data=getEquipAffixes();
  const W=data.total;
  const w1el=document.getElementById('prob_a1_wrap');
  const w2el=document.getElementById('prob_a2_wrap');
  const a1id=w1el?w1el._ss?.getValue()||'':document.getElementById('prob_a1')?.value||'';
  const a2id=w2el?w2el._ss?.getValue()||'':document.getElementById('prob_a2')?.value||'';
  const N=Math.max(1,parseInt(document.getElementById('prob_n')?.value)||1);
  const res=document.getElementById('prob_result');
  if(!res)return;
  if(!a1id){res.innerHTML='<div class="prob-result-row"><span class="prob-result-label">请先选择目标词缀①</span><span class="prob-result-val">—</span></div>';return;}
  const a1=data.affixes.find(a=>a.id===a1id);if(!a1){return;}

  // cost from config
  const{baseCost=0,vaalCost=2,d2c=0,baseCostUnit='D',vaalCostUnit='D'}=item?.config||{};
  const toD=(val,unit)=>(unit==='C'&&d2c>0?val/d2c:val);
  const costPerVaal=toD(baseCost,baseCostUnit)+toD(vaalCost,vaalCostUnit);
  const hasCost=costPerVaal>0;

  const fmt=(v)=>(v*100).toFixed(4)+'%';
  const costRow=(expected)=>hasCost?`<div class="prob-result-row" style="background:rgba(204,120,92,0.08);border-left:3px solid var(--accent);padding-left:12px;">
    <span class="prob-result-label">💰 期望成本（每次 ${costPerVaal.toFixed(2)}D）</span>
    <span class="prob-result-val" style="color:var(--accent)">约 ${(expected*costPerVaal).toFixed(2)}D</span>
  </div>`:'';
  let rows='';

  if(!a2id){
    const pVaalSuccess=0.25;
    const total=data.affixes.length;
    const pHitGivenSuccess=2/total;
    const pSingle=pVaalSuccess*pHitGivenSuccess;
    const pAtLeastN=1-Math.pow(1-pSingle,N);
    const pNone=1-pAtLeastN;
    const expected=Math.ceil(1/pSingle);
    rows=`
      <div class="prob-result-row"><span class="prob-result-label">双瓦腐化成功率</span><span class="prob-result-val">25%</span></div>
      <div class="prob-result-row"><span class="prob-result-label">腐化成功后命中「${escHtml(a1.name)}」概率</span><span class="prob-result-val">${fmt(pHitGivenSuccess)}</span></div>
      <div class="prob-result-row main-row"><span class="prob-result-label">单次双瓦真实命中概率（含成功率）</span><span class="prob-result-val main">${fmt(pSingle)}</span></div>
      <div class="prob-result-row main-row"><span class="prob-result-label">${N}次双瓦中至少命中1次</span><span class="prob-result-val main">${fmt(pAtLeastN)}</span></div>
      <div class="prob-result-row main-row"><span class="prob-result-label">${N}次双瓦全部未命中概率</span><span class="prob-result-val main-red">${fmt(pNone)}</span></div>
      <div class="prob-result-row"><span class="prob-result-label">期望需要使用双瓦次数</span><span class="prob-result-val">约 ${expected} 次</span></div>
      ${costRow(expected)}`;
  } else {
    if(a1id===a2id){res.innerHTML='<div class="prob-result-row"><span class="prob-result-label" style="color:var(--red)">两个目标词缀不能相同</span></div>';return;}
    const a2=data.affixes.find(a=>a.id===a2id);if(!a2)return;
    const pVaalSuccess2=0.25;
    const w1=a1.weight,w2=a2.weight;
    const pBothGivenSuccess=(w1/W)*(w2/(W-w1))+(w2/W)*(w1/(W-w2));
    const pBoth=pVaalSuccess2*pBothGivenSuccess;
    const pAtLeastN=1-Math.pow(1-pBoth,N);
    const pNone=1-pAtLeastN;
    const expected=Math.ceil(1/pBoth);
    rows=`
      <div class="prob-result-row"><span class="prob-result-label">双瓦腐化成功率</span><span class="prob-result-val">25%</span></div>
      <div class="prob-result-row"><span class="prob-result-label">成功后单次命中「${escHtml(a1.name)}」概率</span><span class="prob-result-val">${fmt(w1/W)}</span></div>
      <div class="prob-result-row"><span class="prob-result-label">成功后单次命中「${escHtml(a2.name)}」概率</span><span class="prob-result-val">${fmt(w2/W)}</span></div>
      <div class="prob-result-row"><span class="prob-result-label">成功后同时命中两个目标词缀概率</span><span class="prob-result-val">${fmt(pBothGivenSuccess)}</span></div>
      <div class="prob-result-row main-row"><span class="prob-result-label">单次双瓦真实命中概率（含成功率）</span><span class="prob-result-val main">${fmt(pBoth)}</span></div>
      <div class="prob-result-row main-row"><span class="prob-result-label">${N}次双瓦中至少1次同时命中</span><span class="prob-result-val main">${fmt(pAtLeastN)}</span></div>
      <div class="prob-result-row main-row"><span class="prob-result-label">${N}次双瓦全部未命中概率</span><span class="prob-result-val main-red">${fmt(pNone)}</span></div>
      <div class="prob-result-row"><span class="prob-result-label">期望需要使用双瓦次数</span><span class="prob-result-val">约 ${expected} 次</span></div>
      ${costRow(expected)}`;
  }
  res.innerHTML=rows;
}

// ── GEM VAAL TYPE ──
let _gemVaalType='single'; // 'single' | 'double'
function setGemVaalType(t){
  _gemVaalType=t;
  document.getElementById('gem_vaal_single')?.classList.toggle('active',t==='single');
  document.getElementById('gem_vaal_double')?.classList.toggle('active',t==='double');
  calcGemVaal();
}

// ── GEM VAAL CALC ──
function calcGemVaal(){
  const el=document.getElementById('gem_result_new');if(!el)return;
  const lvl=Math.max(1,Math.min(21,parseInt(document.getElementById('gem_lvl')?.value)||20));
  const qual=Math.max(0,Math.min(23,parseInt(document.getElementById('gem_qual')?.value)||20));
  const N=Math.max(1,parseInt(document.getElementById('gem_n')?.value)||1);
  const modeEl=document.querySelector('input[name="gem_mode"]:checked');
  const mode=modeEl?modeEl.value:'lvl';
  const isDouble=_gemVaalType==='double';
  const vaalsPerUse=isDouble?2:1; // number of independent rolls per "use"

  // per-roll probabilities
  const pLvlUp = lvl>=21 ? 0 : 0.25*0.5;   // 12.5% per roll
  const pQualUp = qual>=23 ? 0 : 0.25*0.5;  // 12.5% per roll

  const fmt=(v)=>(v*100).toFixed(2)+'%';
  const item=getActive();
  const{vaalCost=2,d2c=0,vaalCostUnit='D'}=item?.config||{};
  const toD=(val,unit)=>(unit==='C'&&d2c>0?val/d2c:val);
  const costPerVaal=toD(vaalCost,vaalCostUnit);
  // double vaal costs 2× single vaal cost
  const costPerUse=costPerVaal*vaalsPerUse;
  const hasCost=costPerVaal>0;

  // P(success per use) depends on mode and vaal type
  let pPerUse=0;
  let modeDesc='';
  let extraInfo='';

  if(mode==='both'){
    if(!isDouble){
      // single vaal: level change and quality change are mutually exclusive → impossible same roll
      el.innerHTML=`<div class="gem-result-row"><span class="gem-result-label" style="color:var(--amber);">⚠ 单瓦模式下，等级变化与品质变化为互斥结果，无法在同一次腐化中同时发生（概率 0%）。<br>请切换为「双瓦」模式，或选择「任意一项满足」。</span></div>`;
      return;
    } else {
      // double vaal: roll1 gets lvl+1 AND roll2 gets qual up (or vice versa)
      // P(roll1 lvl+1 AND roll2 qual+) + P(roll1 qual+ AND roll2 lvl+1)
      // = 2 × pLvlUp × pQualUp
      pPerUse = 2 * pLvlUp * pQualUp;
      modeDesc='等级+1 且品质提升（双瓦两次各自成功）';
      extraInfo=`<div class="gem-result-row"><span class="gem-result-label">单次滚等级+1概率</span><span class="gem-result-val">${fmt(pLvlUp)}</span></div>
      <div class="gem-result-row"><span class="gem-result-label">单次滚品质提升概率</span><span class="gem-result-val">${fmt(pQualUp)}</span></div>`;
    }
  } else {
    // per-roll success probability
    let pRoll=0;
    if(mode==='lvl'){pRoll=pLvlUp;modeDesc='等级 +1';}
    else if(mode==='qual'){pRoll=pQualUp;modeDesc='品质提升';}
    else if(mode==='either'){pRoll=pLvlUp+pQualUp;modeDesc='等级+1 或品质提升';}

    if(isDouble){
      // P(at least one success in 2 rolls) = 1 - (1-pRoll)²
      pPerUse = pRoll>0 ? 1-Math.pow(1-pRoll,2) : 0;
      extraInfo=`<div class="gem-result-row"><span class="gem-result-label">单次滚成功概率（每张瓦）</span><span class="gem-result-val">${fmt(pRoll)}</span></div>
      <div class="gem-result-row"><span class="gem-result-label">双瓦（2次）至少1次成功概率</span><span class="gem-result-val" style="color:var(--green);font-weight:600;">${fmt(pPerUse)}</span></div>`;
    } else {
      pPerUse=pRoll;
    }
  }

  const pAtLeastN=pPerUse>0?1-Math.pow(1-pPerUse,N):0;
  const expected=pPerUse>0?Math.ceil(1/pPerUse):Infinity;
  const typeLabel=isDouble?'双瓦（2张）':'单瓦（1张）';

  el.innerHTML=`
    <div class="gem-result-row" style="background:rgba(204,120,92,0.06);padding:8px 12px;border-radius:6px;margin-bottom:4px;">
      <span class="gem-result-label" style="color:var(--accent);font-weight:600;">腐化方式：${typeLabel}</span>
      <span class="gem-result-val" style="color:var(--accent);">目标：${modeDesc}</span>
    </div>
    ${extraInfo}
    <div class="gem-result-row"><span class="gem-result-label">每次使用成功概率</span><span class="gem-result-val gem-result-main" style="color:${pPerUse>0.3?'var(--green)':pPerUse>0.15?'var(--amber)':'var(--accent)'}">${pPerUse===0?'0%（已上限）':fmt(pPerUse)}</span></div>
    <div class="gem-result-row"><span class="gem-result-label">${N} 次使用中至少成功一次</span><span class="gem-result-val gem-result-main" style="color:${pAtLeastN>0.7?'var(--green)':pAtLeastN>0.4?'var(--amber)':'var(--accent)'}">${pPerUse===0?'0%':fmt(pAtLeastN)}</span></div>
    <div class="gem-result-row"><span class="gem-result-label">期望使用次数</span><span class="gem-result-val">${pPerUse===0?'∞':expected+'次'}</span></div>
    ${hasCost&&pPerUse>0?`<div class="gem-result-row" style="background:rgba(204,120,92,0.08);border-left:3px solid var(--accent);padding-left:12px;">
      <span class="gem-result-label">💰 期望成本（每次 ${costPerUse.toFixed(2)}D = ${vaalsPerUse}张瓦）</span>
      <span class="gem-result-val" style="color:var(--accent)">约 ${(expected*costPerUse).toFixed(2)}D</span>
    </div>`:''}
    <div class="gem-result-row" style="margin-top:4px;font-size:11px;">
      <span style="color:var(--text-3);">当前宝石：等级 ${lvl}${lvl>=21?' (满级)':''}，品质 ${qual}%${qual>=23?' (上限)':''}</span>
    </div>`;
}

// ── IMPORT / EXPORT ──
function today(){return new Date().toLocaleDateString('zh-CN').replace(/\//g,'-');}
function downloadJson(obj,filename){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function exportCurrentItem(){
  const item=getActive();if(!item)return alert('没有选中的装备');
  downloadJson({version:5,exportedAt:new Date().toISOString(),exportedBy:'苑神双瓦计算器',items:[item]},`双瓦_${item.name}_${today()}.json`);
}
function exportAllItems(){
  if(!store.items.length)return alert('没有任何装备记录');
  downloadJson({version:5,exportedAt:new Date().toISOString(),exportedBy:'苑神双瓦计算器',items:store.items},`双瓦_全部装备_${today()}.json`);
}
function importItems(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const data=JSON.parse(e.target.result);
      let importList=[];
      if(Array.isArray(data.items)) importList=data.items;
      else if(Array.isArray(data.entries)) importList=[{id:String(_idCounter++),name:data.config?.name||'导入的装备',config:data.config||{},entries:data.entries,notes:[]}];
      else throw new Error('文件格式不正确');
      const existingIds=new Set(store.items.map(i=>i.id));
      let addedItems=0,addedEntries=0;
      importList.forEach(imp=>{
        const exist=store.items.find(i=>i.id===imp.id);
        if(!exist){const impItem={...imp,notes:imp.notes||[]};if(!impItem.config)impItem.config={};if(!impItem.config.equipType)impItem.config.equipType='helmet';store.items.push(impItem);addedItems++;addedEntries+=(imp.entries||[]).length;}
        else{
          const eids=new Set(exist.entries.map(e=>String(e.id)));
          (imp.entries||[]).forEach(en=>{if(!eids.has(String(en.id))){exist.entries.push(en);addedEntries++;}});
          if(!exist.notes)exist.notes=[];
          const nids=new Set(exist.notes.map(n=>String(n.id)));
          (imp.notes||[]).forEach(n=>{if(!nids.has(String(n.id)))exist.notes.push(n);});
        }
      });
      if(addedItems>0&&!activeItemId)activeItemId=importList[0].id;
      saveStore();renderAll();
      alert(`✅ 导入完成！\n新增装备：${addedItems} 个\n新增腐化记录：${addedEntries} 条`);
    }catch(err){alert('❌ 导入失败：'+err.message);}
    event.target.value='';
  };
  reader.readAsText(file,'utf-8');
}

function rollOutcome(){
  const r=Math.random();
  if(r<0.25)return'good';
  if(r<0.50)return'dead';
  if(r<0.75)return'safe';
  return'white';
}
function rollAffixes(affixData){
  const affixes=affixData.affixes;
  function pick(excludeId){
    const pool=affixes.filter(a=>a.id!==excludeId);
    const total=pool.reduce((s,a)=>s+a.weight,0);
    let r=Math.random()*total;
    for(const a of pool){r-=a.weight;if(r<=0)return a;}
    return pool[pool.length-1];
  }
  const a1=pick(null);
  const a2=pick(a1.id);
  return[a1,a2];
}

function setSimSpeed(s){
  if(!_simState)_simState={results:[],running:false,timer:null,speed:s,targetN:parseInt(document.getElementById('sim_n')?.value)||100};
  else _simState.speed=s;
  document.querySelectorAll('.sim-speed-btn').forEach(b=>b.classList.toggle('active',b.textContent===({slow:'慢速',fast:'快速',instant:'极速'})[s]));
}

function startSim(){
  const n=Math.max(1,Math.min(10000,parseInt(document.getElementById('sim_n')?.value)||100));
  if(_simState?.timer)clearTimeout(_simState.timer);
  _simState={results:[],running:true,timer:null,speed:_simState?.speed||'fast',targetN:n};
  const btn=document.getElementById('simRunBtn');
  if(btn){btn.disabled=true;btn.textContent='⏳ 模拟中...';}
  const speed=_simState.speed;
  const aff=getEquipAffixes();
  const item=getActive();
  const{baseCost=0,vaalCost=2,d2c=0,baseCostUnit='D',vaalCostUnit='D'}=item?.config||{};
  const toD=(val,unit)=>(unit==='C'&&d2c>0?val/d2c:val);
  const costD=toD(baseCost,baseCostUnit)+toD(vaalCost,vaalCostUnit);
  if(speed==='instant'){
    for(let i=0;i<n;i++){const outcome=rollOutcome();_simState.results.push({outcome,affixes:outcome==='good'?rollAffixes(aff):[],costD});}
    _simState.running=false;
    updateSimDisplay(true);
    const b=document.getElementById('simRunBtn');if(b){b.disabled=false;b.textContent='▶ 重新模拟';}
    return;
  }
  const batchSize=speed==='slow'?1:10;
  const delay=speed==='slow'?200:30;
  function runBatch(){
    if(!_simState?.running)return;
    const done=_simState.results.length;
    if(done>=n){_simState.running=false;updateSimDisplay(true);const b=document.getElementById('simRunBtn');if(b){b.disabled=false;b.textContent='▶ 重新模拟';}return;}
    const toRun=Math.min(batchSize,n-done);
    for(let i=0;i<toRun;i++){const outcome=rollOutcome();_simState.results.push({outcome,affixes:outcome==='good'?rollAffixes(aff):[],costD});}
    updateSimDisplay(false);
    _simState.timer=setTimeout(runBatch,delay);
  }
  runBatch();
}

function updateSimDisplay(final=false){
  if(!_simState?.results?.length)return;
  const results=_simState.results;
  const n=results.length;
  const targetN=_simState.targetN;
  const fmtPct=(v,t)=>t===0?'0%':(v/t*100).toFixed(1)+'%';
  const cnt={good:0,dead:0,safe:0,white:0};
  let totalCost=0;
  const affixHits={};
  results.forEach(r=>{cnt[r.outcome]=(cnt[r.outcome]||0)+1;totalCost+=r.costD;});
  const prog=document.getElementById('simProgress');
  if(prog)prog.style.width=Math.min(100,(n/targetN*100).toFixed(1))+'%';

      <div class="sim-stat"><div class="sim-stat-val" style="color:var(--amber)">${cnt.safe}</div><div class="sim-stat-label">已腐化</div><div class="sim-stat-sub">${fmtPct(cnt.safe,n)}</div></div>
      <div class="sim-stat"><div class="sim-stat-val" style="color:#dcdcdc">${cnt.white}</div><div class="sim-stat-label">全白孔</div><div class="sim-stat-sub">${fmtPct(cnt.white,n)}</div></div>
      <div class="sim-stat"><div class="sim-stat-val" style="color:var(--text-3);font-size:14px">${totalCost.toFixed(1)}D</div><div class="sim-stat-label">总成本</div><div class="sim-stat-sub">均 ${(totalCost/n).toFixed(2)}D/次</div></div>

  }
  if(!final)return;
  const rc=document.getElementById('simResultCard');if(rc)rc.style.display='';
  const lc=document.getElementById('simLogCard');if(lc)lc.style.display='';
  results.forEach(r=>{

      const key=fa.id+'|'+fb.id;
      if(!affixHits[key])affixHits[key]={name1:fa.name,name2:fb.name,count:0};
      affixHits[key].count++;
    }
  });
  const topAffixes=Object.values(affixHits).sort((a,b)=>b.count-a.count).slice(0,8);
  const maxAffCount=topAffixes[0]?.count||1;
  const devGood=cnt.good-0.25*n;
  const cs=Math.max(-100,Math.min(100,(devGood-(cnt.dead-0.25*n))/Math.max(1,Math.sqrt(n))*20));
  let emoji,verdictCls,title,sub;
  if(cs>=40){emoji='🌟';verdictCls='svb-godlike';title='模拟运气爆棚！';sub=`成功率 ${fmtPct(cnt.good,n)}，远超期望 25%！`;}
  else if(cs>=15){emoji='😊';verdictCls='svb-great';title='模拟运气不错';sub=`成功率 ${fmtPct(cnt.good,n)}，略高于期望。`;}
  else if(cs>=-10){emoji='😐';verdictCls='svb-avg';title='中规中矩';sub='结果分布接近理论期望，是标准样本。';}
  else if(cs>=-30){emoji='😕';verdictCls='svb-bad';title='模拟运气欠佳';sub='消失率偏高，成功偏少，再来一轮？';}

  let maxGoodStreak=0,curGs=0,maxDeadStreak=0,curDs=0;
  results.forEach(r=>{
    if(r.outcome==='good'){curGs++;maxGoodStreak=Math.max(maxGoodStreak,curGs);}else curGs=0;
    if(r.outcome==='dead'){curDs++;maxDeadStreak=Math.max(maxDeadStreak,curDs);}else curDs=0;

  const anaEl=document.getElementById('simAnalysisArea');

      ].map(r=>{
        const exp=0.25*n;const dev=r.v-exp;const ds=(dev>=0?'+':'')+dev.toFixed(1);
        const dc=Math.abs(dev)<1?'neu':(r.inv?(dev>0?'neg':'pos'):(dev>0?'pos':'neg'));
        return`<div class="sim-analysis-row"><span class="sar-label" style="color:${r.lc};font-weight:600;">${r.label}</span><span style="display:flex;align-items:center;gap:8px;"><span class="sar-val" style="color:${r.c}">${r.v}次 (${fmtPct(r.v,n)})</span><span style="font-size:11px;color:var(--text-3)">期望 ${exp.toFixed(1)}</span><span class="lrv-delta ${dc}">${ds}次</span></span></div>`;
      }).join('')}
      <div class="sim-analysis-row"><span class="sar-label">连续最长成功</span><span class="sar-val" style="color:var(--green)">${maxGoodStreak} 次</span></div>
      <div class="sim-analysis-row"><span class="sar-label">连续最长消失</span><span class="sar-val" style="color:var(--red)">${maxDeadStreak} 次</span></div>
      <div class="sim-analysis-row"><span class="sar-label">总成本</span><span class="sar-val">${totalCost.toFixed(2)}D <span style="color:var(--text-3);font-weight:400">（均 ${(totalCost/n).toFixed(2)}D/次）</span></span></div>
    </div>
    ${topAffixes.length?`<div style="margin-top:14px;">
      <div style="font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:8px;">🎲 成功词缀组合命中频次 Top ${topAffixes.length}</div>
      <div class="sim-affix-top">
        ${topAffixes.map((a,i)=>`<div class="sat-row" style="flex-direction:column;align-items:flex-start;gap:4px;padding:8px 12px;">
          <div style="display:flex;align-items:center;gap:8px;width:100%;">
            <span class="sat-rank">${i+1}</span>
            <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
              <span style="font-size:12px;color:var(--green);font-weight:600;">词缀①：${escHtml(a.name1)}</span>
              <span style="font-size:12px;color:var(--green);font-weight:600;">词缀②：${escHtml(a.name2)}</span>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;">
              <span class="sat-count">${a.count}次</span>
              <div class="sat-bar"><div class="sat-bar-fill" style="width:${(a.count/maxAffCount*100).toFixed(0)}%"></div></div>
            </div>
          </div>
        </div>`).join('')}
      </div>
    </div>`:''}
    <div style="margin-top:16px;padding:16px 18px;background:${cs>=20?'rgba(76,175,125,0.07)':cs>=-15?'rgba(110,110,110,0.07)':'rgba(224,82,82,0.07)'};border:1px solid ${cs>=20?'rgba(76,175,125,0.25)':cs>=-15?'rgba(110,110,110,0.2)':'rgba(224,82,82,0.25)'};border-radius:var(--radius-sm);">
      <div style="font-size:11px;font-weight:700;color:${cs>=20?'var(--green)':cs>=-15?'var(--text-3)':'var(--red)'};margin-bottom:8px;letter-spacing:0.5px;text-transform:uppercase;">📜 本次腐化总结</div>
      <div style="font-size:13px;color:var(--text-2);line-height:1.8;">${escHtml(longQuip)}</div>
    </div>`;
  }
  // log — show all results, highlight success with affixes
  const logEl=document.getElementById('simLog');
  const logCountEl=document.getElementById('simLogCount');
  if(logCountEl)logCountEl.textContent=`共 ${n} 条`;
  if(logEl){
    const outcomeLabel={good:'✦ 成功',dead:'✕ 消失',safe:'◈ 已腐化',white:'○ 全白孔'};
    const outcomeCls={good:'lo-good',dead:'lo-dead',safe:'lo-safe',white:'lo-white'};
    const display=results.slice().reverse();
    logEl.innerHTML=display.map((r,i)=>{
      const idx=n-i;
      if(r.outcome==='good'&&r.affixes.length===2){
        return`<div class="sim-log-row" style="background:rgba(76,175,125,0.05);">
          <span class="sim-log-num">${idx}</span>
          <span class="sim-log-outcome lo-good">✦ 成功</span>
          <span style="flex:1;display:flex;flex-direction:column;gap:2px;padding:2px 0;">
            <span style="font-size:11px;color:var(--green);font-weight:600;">词缀①：${escHtml(r.affixes[0].name)}</span>
            <span style="font-size:11px;color:var(--green);font-weight:600;">词缀②：${escHtml(r.affixes[1].name)}</span>
          </span>

function randPick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function getQuip(outcome){
  if(outcome==='good')return randPick(PRAISE);
  if(outcome==='dead')return randPick(ROAST);
  if(outcome==='safe')return randPick(SAFE_QUIP);
  return randPick(WHITE_QUIP);
}
function getAutoQuip(cs){
  if(cs>=40)return randPick(PRAISE.slice(0,10));
  if(cs>=15)return randPick(PRAISE.slice(10,20));
  if(cs>=-10)return randPick(SAFE_QUIP);
  if(cs>=-30)return randPick(ROAST.slice(0,10));
  return randPick(ROAST.slice(10));
}
function getLongQuip(stats){
  // stats: {n, good, dead, safe, white, costStr, goodPct, deadPct, cs}
  const cs=stats.cs;
  if(cs>=20)return randPick(LONG_PRAISE)(stats);
  if(cs>=-15)return randPick(LONG_AVG)(stats);
  return randPick(LONG_ROAST)(stats);
}

  const outcomeConfig={
    good:{emoji:'🎉',label:'✦ 腐化成功！',color:'var(--green)',bg:'rgba(76,175,125,0.08)',border:'rgba(76,175,125,0.3)'},
    dead:{emoji:'💀',label:'✕ 装备消失',color:'var(--red)',bg:'rgba(224,82,82,0.08)',border:'rgba(224,82,82,0.3)'},

  const affixHtml=r.outcome==='good'&&r.affixes.length===2?`
    <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px;">
      <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(76,175,125,0.1);border-radius:6px;">

        <span style="margin-left:auto;font-size:10px;color:var(--text-3);">权重 ${r.affixes[1].weight}</span>

function doManualVaal(){
  const btn=document.getElementById('manualVaalBtn');
  if(btn){btn.classList.add('mvb-flash');setTimeout(()=>btn.classList.remove('mvb-flash'),300);}
  const aff=getEquipAffixes();
  const item=getActive();
  const{baseCost=0,vaalCost=2,d2c=0,baseCostUnit='D',vaalCostUnit='D'}=item?.config||{};
  const toD=(val,unit)=>(unit==='C'&&d2c>0?val/d2c:val);
  const costD=toD(baseCost,baseCostUnit)+toD(vaalCost,vaalCostUnit);
  const outcome=rollOutcome();
  const affixes=outcome==='good'?rollAffixes(aff):[];
  if(!_manualState.results)_manualState.results=[];
  _manualState.results.push({outcome,affixes,costD});
  // update result display
  const disp=document.getElementById('manualResultDisplay');
  if(disp)disp.innerHTML=renderLastManualResult();
  // re-render full panel to update stats + success list
  renderSimManualPanel();
}

function resetManual(){
  _manualState={results:[],count:0};
  renderSimManualPanel();
}
